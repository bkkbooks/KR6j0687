body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二約真如熏無明成其淨用為五十五位因分三初明染淨同源阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想議曰此通躡前以顯染淨同源也十二類生皆依一念妄想而有但隨習氣熏變雖各類自有元熏本習以成當類然此一心融通身心互涉世界則已遍具於諸類矣故曰如是衆生亦各各具十二顛倒第約重輕而感故本習感當類餘習帶熏諸類又為彼各各因此所謂不思議熏變而衆生業力微矣以此而觀吾人日用未造真修舉心動念無非妄想用事念念皆為十二類生生死之因可不懼哉以此顛倒盡是妙圓真淨明心具足如斯虗妄亂想是知全真起妄全妄即真吾人苟能達妄原虗則了衆生體空本來是佛故五十五位之真修本於衆生十二之顛倒也故下文明真依妄立二明真依妄立分二初正明汝今修證佛三摩提於是本因元所亂想立三漸次方得除滅次喻顯如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露議曰此明真依妄立也以顛倒元是妙圓真心故今修證佛三摩提不必別求即就衆生本因元所亂想立三漸次若顛倒不生即是如來真三摩地而十二類顛倒則當下除滅故如淨器先貯毒蜜但除其毒洗滌其器然後可貯甘露矣三正明因行階差分二初總明依三漸次頓悟一心為返妄歸真之本分二初徵標云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業議曰此徵列三漸次以明頓悟一心為返妄歸真之本也除助因者以衆生積劫習氣念念熏變已是難斷若外加助發之因則愈益熾盛故斷習氣之要先除助因為第一也刳正性者習有多種唯淫欲為生死之根故曰一切衆生皆以淫欲而正性命是知在衆生中但以淫欲為正性也刳者剜去之義如人被毒箭所傷必剜去毒肉則可不傷性命故云刳者斷其毒根也違現業者以舊熏種子習氣內鼓發為現業若現業不違而新熏益熾何由能出生死哉故真修必違現業現業不行則正性自枯欲流可涸矣所以依三漸次建立行本也次釋分三一除助因云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛説一切衆生皆依食住阿難一切衆生食甘故生食毒故死是故衆生求三摩提當斷世間五種辛菜是五種辛熟食發淫生啖增恚如是世界食辛之人縱能宣説十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次舐其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為説法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次議曰此別釋三種漸次之初相也大蒜茖蔥慈蔥蘭蔥與興渠是為五辛氣味極濁衆生以此為食而淫機元為命本以無明內熏淫習鼓動故妄有緣氣依附肉團為妄想心若食此五辛濁氣返熏則淫機益熾故能助發淫性是須必斷也若不斷辛天仙嫌其臭穢諸鬼時與周旋善神不守魔王得便墮落邪途為地獄種故修菩提者永斷五辛則神清氣爽觀行易成名為第一增進修行漸次也二刳正性云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無啖生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進修行漸次議曰此釋第二漸次之相也衆生生死以淫欲為本今願出苦輪必永斷淫心而生死可出也飲酒則助發淫心而昏迷自性食肉則恣殺業而增盜貪冤債相牽無由得脫是故斷淫必兼持四重以此為生死之本故也且淫欲從渴愛生若不大生恐怖則不生厭離故視如毒蛇則自不敢狎也如見怨賊則自知逃避也四棄八棄雖嚴猶屬小乘但能執身不行而已若修菩薩觀智照破無明則執心不起所謂摩登伽在夢誰能留汝形此觀照之力也不淫則不相生不食肉則無殺業不盜則免酬債是以先持四重皎如冰霜相生死根機永斷身心清淨心見發光故得宿命清淨也宜矣三違現業云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸修隨所發行安立聖位是則名為第三增進修行漸次議曰此釋第三漸次之相也前問行之初首示三決定義而以四重為妙行之本今立聖位又從三種漸次為進趣之階正性之中雖兼殺盜而正意在淫若淫心既斷則殺盜何由而起耶所謂皮既不存毛將安附故今違現業專以斷淫為第一義何也以廣大無邊清淨法界如來藏心具有恆沙稱性功德神通妙用孰能奪之獨淫欲一事則能全舉而覆奪之金剛心地誰能壞之唯淫機一動而盡壞之是知破涅槃城蕩法王家絶菩提種戕害法身而斷慧命者無尚此矣如來大慈出世專為此一大事因緣故修斷之功萃於此經而始終以此再三致意焉故首以此為發教之端及問行門又以斷淫為上今躋聖位皆從斷淫一行建立淫心一斷立登佛果豈不至重至要哉故違現業而為聖位之本也以順欲流故有生死今則返流則旋元自歸為復性之要塵既不緣境空也根無所偶心空也心境皆空則返欲流而全一真六根消復六用不行塵境既空則身心內外一時清淨而十方皎然猶如琉璃內懸寶月豈不快哉斯乃頓破根本無明使八識種子一時迸裂此通論全功故下經云識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地入於如來妙莊嚴海圓滿菩提歸無所得故曰一切如來密圓淨妙皆現其中是人即獲無生法忍諸説無生法忍八地乃得今於三漸次中已證無生而五十五位從此建立則迥異餘經故後結云如是皆以三增進故善能成就五十五位真菩提路所謂以果地覺為本因心是為真修之要也足知諸位如涉海履空無階級中之階級耳豈可以漸次地位而擬之哉上總明依三漸次為返妄歸真之本竟次別明圓依一心三觀之相漸斷無明為轉凡成聖之因分三初世間差別因分三初由中道妙觀攝假入真證空如來藏分三初乾慧地阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧謂空有其慧無力斷惑名乾慧地欲習初乾但乾欲流未乾無明流未與如來法流水接議曰此下明進趣因位也華嚴明因有二種地前三賢名差別因地上名平等因天台判三賢為外凡四加行為內凡地上名聖位信前為觀行位十信為相似位十住已後為分真位諦觀此經總不如是逈異諸説以上文云違其現業即獲無生法忍又云從是漸修隨所發行安立聖位是則始從觀行以乾慧心即名聖位又何外凡內凡之可分哉此在聖心所履境界固非妄識可知然就聖言比量明文自有昭著以理為準庶可依通耳是善男子即上修三漸次之行人也由違現業塵既不緣根無所偶故得欲愛乾枯根境不偶現前殘質不復續生此結上三漸次之功行也前二決定義云欲取菩提應當審詳煩惱根本此無始來發業潤生誰作誰受以此經宗真修專以斷淫為本故因地先審發業潤生二種無明為所斷之惑故今證果之初約觀行心先斷此二種無明為發軔初步其根境不偶則發業不生不復續生則潤生永絶此二不生即真無生忍也無生忍即不生滅心也故此證果專以不生滅心斷此二種無明是以果覺為我因心故從乾慧即名聖位不比他經分破分證之説也執心虗明是伏二種無明不起也已離欲染無煩惱障故純是智慧以入流亡所一根返源六根解脫無復隔礙故慧性圓明鎣十方界此但觀慧圓明未見真理故乾有其慧名乾慧地但乾欲習無明全在故未得與如來法流水接此觀行初心單約斷欲故立此位諸經所無二十信即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住議曰此約觀行增進初心立十信位也此十信位即在乾慧觀心中入以中道直觀八識漸漸研窮故曰即以此心中中流入正如除結當心也逆流而入入之既深則心精發化故云圓妙開敷此乃自心發悟如蓮華開真心忽現大論云性戒清淨猶如妙華開敷發生自他善因果故即從所悟重發觀慧故曰從真妙圓重發真妙是則的信自心本無生滅故曰妙信常住此則一切生滅妄想永不現行如是漸增聞所聞盡故曰滅盡無餘唯一精真湛不搖處故曰中道純真名信心住謂能安住信心也真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住議曰此第二信由此妄想滅盡純真信心圓明精了故一切圓通陰處界三不能為礙此以初信圓成七識不行故捨身受身一切欲愛習氣皆現在前此見惑已盡思惑漸斷故能憶念不忘名念心住妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心議曰此第三信進斷思惑故妙圓純真由真精觀智消鎔愛習變習成智故曰通一精明此正二乘涅槃是則習消智明唯以精明進趣真淨妙理以盡聞不住故名精進心心精現前純以智慧分破無明名慧心住執持智明周遍寂湛寂妙常凝名定心住定光發明明性深入定慧並運唯進無退名不退心議曰此第四信以習氣既消故心精現前二惑已除故純是智慧名慧心住此已觀智圓明故第五信即執持此智明遍照本體湛然照寂雙流則寂妙常凝名定心住第六信位由智得定定久發光則慧性圓明定慧並運故明性深入智能會理故唯進無退名不退心一向判位當七信為不退斷見思惑得六根清淨今於三信已斷見思六根圓通而六信得不退者彼約先斷見思以及塵沙後及無明今經發覺初心三漸次中即以中道徑破根本無明任運粗垢先落如澄濁水沙土自沈清水現前單約中道觀智故迥別諸位不可概論也心進安然保持不失十方如來氣分交接名護法心議曰此第七信前雖有進無退尚有進趣猛利之相至此七信進趣功純定慧兩全故曰心進安然保持不失見思緣影已盡仗中道觀分破無明法身漸顯故與十方如來氣分交接名護法心也覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心議曰此第八信由前觀智增明保持既久心光發暉妙契法身故曰能以妙力回佛慈光向佛安住理智融通故如鏡交光重重相入名回向心心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住議曰此第九信以微密觀照返照心源頓契寂滅清淨心體故曰心光密回獲佛常凝無上妙淨自然任運而入不假作為故曰安住無為以憑觀照之力一念失照即墮無明故名戒心住住戒自在能遊十方所去隨願名願心住議曰此第十信前雖不失猶未純熟常防其失故未自在至此功用已純故曰住戒自在遊歷性空隨願斷惑名願心住按此信位雖列十名實是觀行成就圓成一心以中道純真故非相似比也向後三賢只以此一心研窮三觀次第而入故為差別因也十住乃以中道妙觀攝假入真以顯本覺出纏證空如來藏三十住阿難是善男子以真方便發此十心心精發暉十用涉入圓成一心名發心住議曰此十住位謂以觀行研窮開發本覺常住真心所謂盡聞不住以無住為住故得住名華嚴每位約觀行有入住出三相總躡前位以為勝進然後進入後位故此文云以真方便發此十心是以三漸次及乾慧地為真方便為入發此十種信心為住但十種心歷別未圓至十信滿心寂照雙流融成一味使十心涉入無次第相圓成一心名發心住為出是以十信觀行勝進功圓總成初住一位也始覺有功本覺乃顯故曰心精發暉以此心初顯故云發心住其無始無明須漸次研窮深入所謂理須頓悟乘悟併消事非頓除因次第盡故向後四十四心由是而立也心中發明如淨琉璃內現精金以前妙心履以成地名治地住議曰此第二住以中道觀圓照自心故曰心中發明所觀理境了然現於觀智心中故如淨琉璃內現精金即以前微妙觀智遊履此心淨治無明故曰以前妙心履以成地名治地住治字平聲呼心地涉知俱得明了遊履十方得無留礙名修行住議曰此第三住由前治地以智照理理隨智現故曰心地涉知境智歷然故曰俱得明了智照既明理境亦大盡十方際成一真境故曰遊履十方理智冥符不落空有空不能留有不能礙故曰得無留礙心心無間名修行住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住議曰此第四住由修行位以中道妙智觀中道妙理心境不異故曰行與佛同初以智熏真如而真如漸顯亦返熏智智得所如故曰受佛氣分念念證真故曰如中陰身自求父母始本暗合故曰陰信冥通融會藏性故曰入如來種以本覺種子今彼觀智新熏發生名生貴住以般若尊重特以貴名以智攝理故如入胎既遊道胎親奉覺胤如胎已成人相不缺名方便具足住容貌如佛心相亦同名正心住身心合成日益增長名不退住十身靈相一時具足名童真住議曰此五六七八四位通約住胎之相以明觀智之功也以始覺觀照含育本覺故曰親奉覺胤觀行已成故曰如胎已成名方便具足住方便即觀智也謂非觀智本覺不顯乃由方便而具足者理智不二心境一如故曰容貌如佛心相亦同名正心住理智冥合理隨智增有進無退名不退住本覺圓滿一念頓證故曰十身靈相一時具足具體而微名童真住形成出胎親為佛子名法王子住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住議曰此第九十二位約出胎之相以明觀智也始覺有功本覺乃顯故曰形成出胎名法王子住始本合一名究竟覺由華嚴位位成佛故如王子長成堪紹覺位名灌頂住輪王授太子位取四大海水以灌其頂名為授職是為真子覺位亦然故稱灌頂上前十住位以中道妙觀觀三諦理任運先證空如來藏竟二由中道妙觀帶真涉假證不空如來藏十行阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行善行利益一切衆生名饒益行自覺覺他得無違拒名無瞋恨行種類出生窮未來際三世平等十方通達名無盡行一切合同種種法門得無差誤名離癡亂行則於同中顯現羣異一一異相各各見同名善現行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行種種現前咸是第一波羅蜜多名尊重行如是圓融能成十方諸佛軌則名善法行一一皆是清淨無漏一真無為性本然故名真實行議曰此十行位乃出真入俗起假觀用證不空藏也以如來藏循業發現隨染業用故起染行隨淨業用故起淨行以此藏性具有恆沙稱性功德向被無明障蔽今無明既破性德用顯故具足無量如來妙德不住果覺故十方隨順理滿心足名歡喜行此躡十住滿心融成一味生大法樂故歡喜耳自利功滿能轉己功以利衆生名饒益行以觀衆生隨順覺性永無違拒名無瞋恨行以瞋恨起於違拒故稱法界性不休不息窮未來際三世平等而無出沒十方通達而無往來現無盡身度無盡生名無盡行佛界衆生界一界無二界故一切合同鑒機説法故得無差誤不著法相名離癡亂行我以妙明不生不滅合如來藏而如來藏唯妙覺明圓照法界故離癡亂是故於中一為無量無量為一同中現異異中現同事理無礙名善現行於一毛端現寶王剎坐微塵裏轉大法輪現塵現界不相留礙名無著行凡所示現無非大用現前全彰法界故咸是第一波羅蜜多名尊重行滅塵合覺故發真如妙覺明性如是圓融妙行能成十方諸佛軌則名善法行一切諸法會歸藏性以事得理融理能奪事故一一皆是清淨無漏妙行無思成事稱性而行一真無為性本然故名真實行此十行位依理發行從體起用涉俗利生所謂覺所覺空故顯證不空如來藏也三由中道妙觀空假互入證空不空如來藏十向阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅除度相回無為心向涅槃路名救護一切衆生離衆生相回向壞其可壞遠離諸離名不壞回向本覺湛然覺齊佛覺名等一切佛回向精真發明地如佛地名至一切處回向世界如來互相涉入得無罣礙名無盡功德藏回向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向即一切法離一切相唯即與離二無所著名真如相回向真得所如十方無礙名無縛解脫回向性德圓成法界量滅名法界無量回向議曰此回向位由前涉假以入中道也菩薩修行回向三處謂回向實際回向菩提回向衆生以本覺出纏遠離空有入空不留入有無患故曰遠離留患當度衆生回向衆生也滅除度相以衆生如故本來平等回向實際也回無為心向涅槃路回向菩提也以衆生即已終日度生不見有生可度故名離衆生相回向可壞者無明煩惱乃雜染衆生相也故壞其可壞離相亦無故曰遠離諸離名不壞回向空有不住一心清淨寂滅湛然故覺齊佛覺名等一切佛回向寂滅心地精真顯現故如佛地無往不真名至一切處回向一真法界依正互融世界依報也如來正報也互相涉入名無盡功德藏回向既依正互入圓融交涉通為一真則草芥塵毛皆是成佛真體故云地中各各生清淨因即此是為涅槃妙行依佛真因故云依因發揮名隨順平等善根回向已證平等法界則真根既成而一切衆生純一真如故云皆我本性以成就自性即是成就衆生故云不失衆生名隨順等觀一切衆生回向全理成事事能奪理故即一切法全事即理理能奪事故離一切相理事無礙故二無所著名真如相回向以真得所如則無不如者縛脫兩亡名無縛解脫回向法界性德中道圓成唯一真心則法界量滅所謂空覺極圓名法界無量回向此十回向依前十行念念證真心心寂滅妙契中道故云回向然雖三觀歷然中道理顯猶存歷別未極一心之源故為差別因必須泯前修相妙證寂滅一心平等法界方得圓滿菩提故須四種妙圓加行融前四十一心以為一味以平等難證必用四加行以為入地之功行但泯前心非離前位別有四行故此四心為登地勝進良有旨哉二出世間平等因分二初遣差別因相四加行分四初暖位阿難是善男子盡是清淨四十一心次成四種妙圓加行即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地二頂位又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地三忍位心佛二同善得中道如忍事人非懷非出名為忍地四世第一位數量銷滅迷覺中道二無所目名世第一地議曰此四加行為入地之勝進也總前四十一心通名清淨則乾慧已真而信非相似明矣將證平等一心立四加行位者以融前歷別修相意在亡能所絶對待泯前觀智方證一真義當空所空滅以其觀智難亡故須展轉四重離即離非名妙圓耳前已覺齊佛覺即以所顯之果覺為今入地之因心因心已極故云若出觀智未忘故云未出有如鑽火之暖相名為暖地又以己因心成一真境界成佛所履但觀智似忘未忘故云若依其實將忘故云非依以法界如空無所依故故如登高山身雖在空足未離地有此微礙名為頂地以心境一如故心佛二同平等一心故善得中道前雖以中中流入但任運次第見三諦理故未為善今圓滿一心不思而合故云善得觀智將泯故非懷緣影未斷故非出名為忍地直至一往理行斷證功夫一切俱泯故云數量消滅十信尚迷為有三賢屬覺為空至此中道泯絶無寄故云二無所目方有出世之分名世第一地由是而觀足見三賢位乃通以中道觀智總照無明住地任運淺深而顯約此以明次第殆非分斷分證者比也上總明差別因下明平等因然前差別因以屬生滅門中對待之真如今此十地唯依寂滅一心建立不屬對待故為平等因也二正入平等因相分二初有功用行分二初列位次阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地異性入同同性亦滅名離垢地淨極明生名發光地明極覺滿名𦦨慧地一切同異所不能至名難勝地無為真如性淨明露名現前地盡真如際名遠行地一真如心名不動地發真如用名善慧地次結因圓阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位次無功用行慈陰妙雲覆涅槃海名法雲地三結果滿如來逆流如是菩薩順行而至覺際入交名為等覺議曰此入地位由四加行勝進功圓會入圓覺寂滅一心故善達菩提覺通如來盡佛境界名歡喜地差別事理因果同歸一心同亦不立名離垢地法界一心有大智慧光明義由淨極而光通達故為明生名發光地明至極處覺性圓滿名焰慧地從此差別理事同異所不能至名難勝地無為真如全體顯露故曰性淨明露名現前地俱生無明名為遠行今盡真如際已捨藏識名遠行地純一真如不假功用永絶動搖湛寂一心名不動地華嚴説此地菩薩墮寂滅真如不捨此定故十方諸佛説三加七勸而拔起之出真如定從體起用便能説法居法師位故發真如用名善慧地遠從乾慧以來通名修習因位今修習功畢行極理圓所謂生滅既滅故此地收功名修習位結前因圓若第十地於法性空布慈陰雲覆涅槃海融前九位通成一心名法雲地正寂滅現前如來圓證一心雖居果位不捨因門故逆流而出菩薩修行逆生死流順法性流而入果海因果相接故曰覺際入交名為等覺結果滿則忽然超越世出世間入妙覺矣三結指觀行圓證一心泯同果海成無上妙覺之果分二初正結阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地如是重重單復十二方盡妙覺成無上道是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入阿難如是皆以三增進故善能成就五十五位真菩提路次勸修作是觀者名為正觀若他觀者名為邪觀議曰此結觀行以明圓證一心泯同果海成無上妙覺之果也始終乾慧二地從古解者不一學者難憑但未觀佛法源頭耳以九界衆生因三種流名五住煩惱感二種生死五住者欲愛住地色愛住地無色愛住地見一切住地無明住地三種流者謂欲流有流無明流前四煩惱為欲流有流感分段生死此在初信已斷無明住地名無明流感變易生死至佛果乃斷今經約生死染緣重在流字故六根則曰流逸奔境返妄觀行則曰返流全一入流亡所專約三種流相以為真妄之本也今首楞嚴大定總名金剛如幻三昧故下文云是種種地皆以金剛觀察漸次深入是知從初乾慧即用金剛觀照發心之初志在直斷生相無明何待等覺後心耶以此證之則初乾慧地乃用金剛心任運先斷欲有二流出分段生死故曰欲愛乾枯根境不偶現前殘質不復續生如澄濁水沙土自沈清水現前名為初伏客塵煩惱此明文的證也其無明流從入信以來即志斷之但無明深厚故歷五十四位直至等覺後心生相無明才乾以此無明在觀心中斷故曰是覺始獲金剛心中初乾慧地五住究盡二死永亡無明流至此才乾乃入妙覺出變易生死所謂去泥純水名為永斷根本無明是則位有始終觀無先後以力行深淺為次耳以此證明決無疑矣又何牽強多説哉如是重重者亦有多解但約華嚴位位勝進自然明了初以三種漸次為發覺初心圓成一心為勝進乃入信位位位歷別及至第十融成一心入住行向位位皆然其四加行又融前三賢觀智乃入初地前九猶是歷別因十地融前諸位為因窮等覺為果滿會歸寂滅一心乃入妙覺故曰重重以先歷次為單後融一心勝進為復蓋單十復十有二也奢摩他止也毗婆舍那觀也天台三止三觀正符此義初云從是漸修安立聖位故此結云如是皆以三增進故善能成就五十五位真菩提路觀此結文則初乾慧地通為基本為一位十信至十地為五十五是則以前為因以等覺為果華嚴不立信位唯云初發心時即得菩提與今經從三漸次安立聖位義同但彼圓宗以十二因緣原是如來普光明大智願海一念信心即得安住因果同時唯説稱性法門橫周法界故曰即得菩提不説斷證此經意在逆生死流豎盡一心故曰安立聖位此為別耳觀者應知從前請問位次至此通顯三觀之用約真如熏無明以顯淨用并圓證一心泯同果海竟四結三觀之名分二初文殊請問經名爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持次世尊具答五目佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持議曰前七卷半經説理行因果已周修證義了故文殊請問經名此經以首楞嚴大定為宗始終不離一心三觀故結經即結觀名耳如來具答五目一名大佛頂等者表此藏性具體相用三大如題中説故云大佛頂梵語悉怛多般怛囉此云白傘蓋喻顯藏性清淨故曰白覆庇衆生故如傘蓋以實相印印定諸法故名寶印大海不唯不受死尸而草葉亦不留也眼裏不容纖塵如來藏清淨真心纖塵不立故喻如海眼此克體相立名也亦名救護等者約用立名也亦名如來等者三世果人資為密因若修若證皆為究竟故云了義乃合體用而名也亦名大方廣等者謂體具三大清淨無染出生諸佛為大總持此約體用勝益而名也亦名灌頂等者謂是法身所演中道名言一切因人資為萬行總稱大定此約觀行以名故判此章通為結觀行之名也佛説五名而結集題中巧含多義存三隱二可知上結三觀之名竟從前初卷阿難啓請以來通科大開修證之門竟二曲示迷悟差別分二由前一往開示迷悟因果至此已周法會已圓即可罷座大衆應散今復重興後問以啓七趣升沈之説五十陰魔之談者意明迷悟之差別耳義謂元依一心妄想祇合熏成一類衆生何以備有七趣升沈之狀悟止一心一悟便了何有二乘魔外之差此羣疑所潛故有後説七趣乃示迷中之差別陰魔乃示悟中之差別耳初精研七趣曲示迷中差別之相分三初經家敘益説是語已即時阿難及諸大衆得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱二當機啓請分三初陳自益即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沈惑令我今日身心快然得大饒益二正陳所疑分六初疑真本無妄六道從何而有世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道二疑六道為是本有為從妄習生世尊此道為復本來自有為是衆生妄習生起三疑妄性無體妄業如何受報世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄四疑衆生既是無生如何生陷地獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄説一切法空生身陷入阿鼻地獄五疑世界既無所住地獄可有定處此諸地獄為有定處為復自然六疑妄業是同受報何以各別彼彼發業各各私受三結請意惟垂大慈發開童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯議曰此呈益讚謝復請後疑也三界九地每地各具思惑九品今聞開示實證二果實斷下界一地前六品思惑故曰微細煩惱約觀行研窮俱生無明故曰善開微細沈惑此讚謝也若此妙明下總躡前義含有六疑據答甚明由問位之初乃曰妙性圓明離諸名相本來無有世界衆生又云清淨本然周遍法界則一切皆是如來成佛真體故此疑云佛體真實既本無妄六道從何而有此一疑也故下答云因彼妄見有妄習生二疑六道為是本來自有為是從妄習生起故下答云此等皆是自妄想業之所招引於中含有妄想是一何以六道不同故下答云因有情想不同故有七趣升沈三疑妄性既是無體妄業如何受報如寶蓮香淫業招報故下答云自妄所招還自來受四疑衆生既是無生云何生陷地獄如琉璃王殺業善星妄語墮無間獄故下答云非從天降不從人興自妄所招五疑世界既本無住地獄可有住處故下答云衆私同分非無定處六疑妄業既是一同受報如何各別故下答云因各各私衆私同分以此六疑總顯迷中差別之狀故世尊委答曲盡迷情先舉答意以質問端三世尊曲示分二初讚許佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝説議曰此讚許也愜佛本懷故稱快哉次開示分五初通示七趣根本分三初約妄見妄習立內外分為三界之因阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分二約內外情想為染淨生死之因分二初內分純染阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液阿難諸愛雖別流結是同潤溼不升自然從墜此名內分次外分兼淨阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧盼雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沈自然超越此名外分議曰此答七趣升沈之元也實本清淨本無妄也妄見妄習迷輪始也約內外分而分情想以定升沈內分者由自心內愛習凝結而為情也由內而發故云內分外分者由虗想而發自外而感故云外分三約情想多寡示七趣升沈之相分三初總明生死交際之相阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交二約情想多寡細示升沈之相分二初列示其相分六初天道純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生二天仙神道情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持咒者或護禪定保綏法忍是等親住如來座下三人道情想均等不飛不墜生於人間想明斯聰情幽斯鈍四畜道情多想少流入橫生重為毛羣輕為羽族五鬼道七情三想沈下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫六地獄道九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄純情即沈入阿鼻獄若沈心中有謗大乘毀佛禁戒誑妄説法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄二略示報地循造惡業雖則自招衆同分中兼有元地議曰此備言七趣升沈之所以也生為循情故云順習臨終惡業果報現前故云變流二習相交謂方生方死之際善惡殊途升沈遂別故純想即飛必生天上此純想業也若兼福慧淨願故生淨土此純淨想也若情少想多故升為神仙之類有護法心者親住佛座此亦習使然也若情想均等則為人類但約情想厚薄以分智愚若六情四想則為毛羽羣族七情三想下沈水輪受氣猛火若八情二想則為餓鬼見水成火故能害己若九情一想則入地獄純情即沈阿鼻若加謗法五逆十重則永無出期此三惡之狀循造惡業自招地獄則同受而各有元地非無因也三廣示七趣輪回因果之相分二初各示其相分七初示地獄道因果之相分五初總標十因六報阿難此等皆是彼諸衆生自業所感造十習因受六交報議曰此結前起後十因六報詳示地獄苦狀以顯情習之感也造十習因委明地獄但約情習而言謂習約一念妄心而報則六根交受者以念念妄想融涉六根故報亦同受如十二類則一一類各具十二今地獄苦報則一習為因六根同果足見衆生業性不可思議熏變之力昭然可覩矣十習謂淫貪慢瞋詐誑怨見枉訟也輪中根本煩惱六謂貪瞋癡慢疑邪見此中具四隨煩惱十謂忿恨惱覆誑諂憍害嫉慳此中誑即彼之誑怨枉即該忿恨惱害四法詐即是諂訟即是覆其憍屬慢嫉屬瞋慳屬貪前四重律謂淫殺盜三總為貪今則單以淫為首者是諸業之本故也二別釋其相分二初徵十習因相分十初淫習分四一因能感果云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸暖相現前二舉果驗因二習相然故有鐵牀銅柱諸事三諸佛所呵是故十方一切如來色目行淫同名欲火四行人當避菩薩見欲如避火坑議曰此徵釋淫習為生死根衆罪之首也男女交接二妄相磨故暖相現前此命終所現之境也二習燒然故果感鐵牀等事此所感地獄苦報也下倣此諸佛目淫為欲火行人當避如火坑也二貪習分四一因能感果二者貪習交計發於相吸吸攬不止如是故有積塞堅冰於中凍冽如人以口吸縮風氣有冷觸生二舉果驗因二習相陵故有吒吒波波羅羅青赤白蓮寒冰等事三諸佛所呵是故十方一切如來色目多求同名貪水四行人當避菩薩見貪如避瘴海議曰此貪通約貪著而言也故曰於有有具染著為性彼此妄計貪取故曰交計貪取不止故如吸攬吸生冷觸故感寒冰等相陵謂憑陵競尚不休之意吒波羅忍寒之聲也青赤白蓮寒凍之色也諸佛名貪為水以沒溺故行人當避如瘴海也三慢習分四一因能感果三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二舉果驗因二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事三諸佛所呵是故十方一切如來色目我慢名飲癡水四行人當避菩薩見慢如避巨溺議曰慢有多種此指我慢而言也謂恃己陵他高舉為性自他相慢故曰交陵陵乃欺侮之意恃謂恃己貢高慢之不已故曰馳流不息故感奔波等相彼此皆有傲慢之氣故曰相鼓故感灰河等事諸佛名慢為飲癡水溺於不明行人當避如巨溺也四瞋習分四一因能感果四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵橛劍樹劍輪斧鉞鎗鋸如人銜冤殺氣飛動二舉果驗因二習相擊故有宮割斬斫銼刺槌擊諸事三諸佛所呵是故十方一切如來色目瞋恚名利刀劍四行人當避菩薩見瞋如避誅戮議曰瞋習以怒氣相加故曰交衝忤逆也忤結不息火盛而氣益剛鑄氣為金故感刀山等相兩相傷刺故曰相擊故有宮割等事諸佛目瞋名利刀劍行人當避如誅戮也五詐習分四一因能感果五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二舉果驗因二習相延故有杻械枷鎖鞭杖檛棒諸事三諸佛所呵是故十方一切如來色目姦偽同名讒賊四行人當避菩薩見詐如畏豺狼議曰詐乃誑詐為獲利譽矯現有德詭詐為性邪命為業誑惑於人故曰誘曰調引謂緣引故感繩木絞校等相校枷也相延謂纏蔓不已故有杻械等事如來目姦偽同名讒賊行人當畏如豺狼也六誑習分四一因能感果六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二舉果驗因二習相加故有沒溺騰擲飛墜漂淪諸事三諸佛所呵是故十方一切如來色目欺誑同名劫殺四行人當避菩薩見誑如踐蛇虺議曰此誑不同於詐乃欺罔之意謂罔冒他人諂曲為性矯設方便以取他意故曰交欺相罔以飛心造姦故感塵土屎尿等相以心穢惡故感如此相加諸交欺也故有沒溺騰擲等事如來目欺名劫殺行人當避如踐蛇虺七怨習分四一因能感果七者怨習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二舉果驗因二習相吞故有投擲擒捉擊射拋撮諸事三諸佛所呵是故十方一切如來色目怨家名違害鬼四行人當避菩薩見怨如飲鴆酒議曰怨習謂彼此相嫌由銜恨而發故感飛石投礰等相遞相吞食故有投擲等事如來目怨名違害鬼行人當避如飲鴆酒八見習分四一因能感果八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見二舉果驗因二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辨諸事三諸佛所呵是故十方一切如來色目惡見同名見坑四行人當避菩薩見諸虗妄遍執如臨毒壑議曰此惡見也謂於諸諦理顛倒推度染慧為性能障正見招苦為業彼此非其明而明之故曰交明薩迦耶此云惡見此見有五謂一身見執我我所二邊見謂執斷常二邊三邪見謂謗無因果四見取非果計果如以無想為涅槃之類五戒禁取謂非因計因如外道持牛狗等戒臥棘投灰等苦行為業無益勤苦故曰邪悟以各執己見故有王使執證等相相交謂交哄諍論故感勘問考訊等事如來目見為見坑行人見遍執者如臨毒壑九枉習分四一因能感果九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二舉果驗因二習相排故有押捺捶按蹙漉衡度諸事三諸佛所呵是故十方一切如來色目怨謗同名讒虎四行人當避菩薩見枉如遭霹靂議曰枉謂誣枉讒謗狠戾為性即惱害也能障不惱蜇螫為性乃追懷往惡多發囂暴凶鄙粗言蜇螫他故故曰交加謂交相加害發於誣謗故有合山磕石等相以二習相排排謂擠陷故感押捺諸事如來色目怨謗名為讒虎行人見枉如遭霹靂十訟習分四一因能感果十者訟習交喧發於藏覆如是故有鑒見照燭如於日中不能藏影二舉果驗因二習相陳故有惡友業鏡火珠披露宿業對驗諸事二諸佛所呵是故十方一切如來色目覆藏同名陰賊四行人當避菩薩觀覆如戴高山履於巨海議曰此訟習訟其覆也訟即是覆謂於自作罪恐失利譽隱藏為性能障不覆損惱為業彼覆此訟故曰交喧以其覆故故有鑒見照燭等相陳謂陳列罪狀故感業鏡對驗等事如來目覆名為陰賊行人觀覆如戴山履海此上十習發業為因因必趣果故感地獄種種苦具且十種習各由一念妄想而發以此妄想融涉六根故受苦報六根互變名為交報二釋六交報相分二初標六報總相云何六報阿難一切衆生六識造業所招惡報從六根出議曰此徵標六交報相也以六識總造惡業遍熏六根故報從六根而出通受其苦次釋六報別相分六初見報分二初當根招報分三初現報云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界二生報亡者神識飛墜乘煙入無間獄三後報發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐次六根交報如是見火燒聽能為鑊湯洋銅燒息能為黑煙紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界議曰此見業交乃眼識造業招引惡果也易卦離為火為目故見業交先見猛火方生方死之際亡者神識將捨暖觸故隨見業所感之境識從習變乘之入無間獄古釋極善極惡皆無中陰故如射箭頃徑入地獄以見不離明暗二塵故發明二相一者明見惡境遍現故生畏二者暗見寂無所見故生恐此本識業因下明六交報果本識見火能燒當根經文缺也聞根屬水故為鑊湯洋銅鼻息為氣故為煙𦦨味觸二塵以報舌身心屬火故星火煽空此由見火交燒五根各隨塵習而變諸苦具此業為不可思議也下倣此二聞報分二初當根招報分三初現報二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地二生報亡者神識降注乘流入無間獄三後報發明二相一者聞聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沈沒次六根交報如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄議曰此聞業交耳識造業招引惡果也易卦坎為水為耳故聞業先見波濤神識乘流識從習變也聞以開聽為用故閉則無聞聞注當根變為詰責之聲見火聞水相激若陰陽相激而為雷吼水被火蒸故為惡毒氣水隨氣變故注息為雨霧毒蟲膿血糞尿皆習所變也水火相激故為電雹三嗅報分二初當根招報分三初現報三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近二生報亡者神識從地踊出入無間獄三後報發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地次六根交報如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛沙礰擊碎身體議曰此嗅業交鼻識招引惡果也鼻主出入息故先見毒氣鼻為土故識從地踊鼻由通塞取境故通聞毒氣塞則氣掩嗅衝當根則為質履質礙塞也履猶通也氣衝見火則為炬氣衝聞水則為沒溺洋沸之聲氣衝味則變敗為餒為爽魚敗曰餒爽失其味也衝觸則為綻爛肉山合觸塵也脾土主思故為飛沙等事四味報分二初當根招報分三初現報四者味報招引惡果此味業交則臨終時先見鐵網猛焰熾烈周覆世界二生報亡者神識下透挂網倒懸其頭入無間獄三後報發明二相一者吸氣結成寒冰凍冽身肉二者吐氣飛為猛火焦爛骨髓次六根交報如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下議曰此味業交舌識招引惡果也舌根不但取味而妄語綺語兩舌惡口或謗三寶毀汙賢善等其業最廣大故感報亦甚故臨終先見鐵網猛𦦨等相神識乘之入無間獄舌以吸吐二習吸則取味吐則發語故吸則為寒冰等吐則為猛火等歷當根為承為忍以惡語傷人令他承忍故報亦如之歷見為然金石以見火鑄氣為金金得水淬而更利故歷聞為利刃非語乘氣籠絡於人故歷息為鐵籠利舌傷觸於人故歷觸為弓箭等事由意造姦而飛語橫發故飛鐵從空雨下五觸報分二初當根招報分三初現報五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路二生報亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄三後報發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂次六根交報如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙議曰此觸業交身識招引惡果也以衆生妄識堅執四大為我依之造業故臨終先見大山四面來合向未離身故死無出路以身為衆惡所歸故神識乘鐵城衆多惡事入於地獄觸由離合二塵故合則合山逼體離則刀劍觸身歷觸當根為道觀等者以生依此身如房舍故歷見則為火燒爇見屬火故歷聽則撞擊而有聲剚以刀刺入肉也以聞聲即動觸想故為剚射以息充一身故為括袋考縛等事歷嘗能為耕鉗斬截者以味充舌為滋觸故歷思為飛墜煎炙者以妄想一動遍身火然隨因感果宜其然矣六思報分二初當根招報分三初現報六者思報招引惡果此思業交則臨終時先見惡風吹壞國土二生報亡者神識被吹上空旋落乘風墮無間獄三後報發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍次六根交報如是邪思結思則能為方為所結見則能為鑒為證結聽則能為大合石為冰為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰議曰此思業交意識招引惡果也六識以緣氣集聚妄想如風故臨終見風乘入地獄思以生滅二塵迷覺約根迷無所止故荒走不息覺則明了故知苦痛思歷當根生以妄想為心地故能為方所歸向之地思發知見故為鑒證思土聽水故為冰霜土霧思以籠冒息氣成火故結為火車等思由舌發聲故為叫喚等思執根身故為生死偃仰等是六交報皆以不思議業力之所熏變唯佛眼能見非凡妄識情所知故唯心所變地獄苦具不可解者甚多但約義據理而言非真知見力也總屬自心所現非心外法故下文云若悟菩提則本無所有凡在迷情可不畏哉三結示所由阿難是名地獄十因六果皆是衆生迷妄所造議曰此總結妄業由迷情有也四校量輕重分三初六根同造若諸衆生惡業同造入阿鼻獄受無量苦經無量劫二六根各造六根各造及彼所作兼境兼根是人則入八無間獄三三業分造分三初三業兼造身口意三作殺盜淫是人則入十八地獄二三業不兼三業不兼中間或為一殺一盜是人則入三十六地獄三六根獨造見見一根單犯一業是人則入一百八地獄五結答略問由是衆生別作別造於世界中入同分地妄想發生本非來有議曰此示因果輕重之次也同造謂十因六報具足也六根各造謂先後不一單兼一根一境則輕次前若身口意三根唯造殺盜淫三業餘不兼涉則又輕次前若於三業唯造二不兼餘則又輕次前若一根獨造單犯一業則又輕次前見見長水音現謂六根唯一造一業不兼餘也以不相涉故云見見別作別造謂各各私造也其業是同故感同分獄由前問云為是本有為是造成故此結云皆是妄想發生非本來有上顯十因六報之狀下示輪回之相二示鬼道因果之相分三初標示因果總相復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形議曰此從地獄出復受鬼形以顯輪回之狀也前十習因所感地獄若但由習則報盡可出若非破律儀等則其苦更長故復受鬼形非破律儀破比丘戒也犯菩薩戒則破大乘性戒也毀佛涅槃謂一闡提斷佛種性也此斷善根受苦時長故復受鬼類上總標下別列二別示因果別相分十初貪習若於本因貪物為罪是人罪畢遇物成形名為怪鬼二淫習貪色為罪是人罪畢遇風成形名為魃鬼三詐習貪惑為罪是人罪畢遇畜成形名為魅鬼四怨習貪恨為罪是人罪畢遇蟲成形名蠱毒鬼五瞋習貪憶為罪是人罪畢遇衰成形名為厲鬼六慢習貪慠為罪是人罪畢遇氣成形名為餓鬼七誑習貪罔為罪是人罪畢遇幽為形名為魘鬼八見習貪明為罪是人罪畢遇精為形名魍魎鬼九枉習貪成為罪是人罪畢遇明為形名役使鬼十訟習貪黨為罪是人罪畢遇人為形名傳送鬼三結示因由分二初結升墜因由阿難是人皆以純情墜落業火燒乾上出為鬼次結答有無所以此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有議曰此貪習也所貪者物故附物成形以巧計而取故為鬼猶怪淫習貪色以淫心欲火故遇風成形名為魃鬼旱鬼也詐習惑人名為貪惑故遇畜成形即狐狸精魅現美色以惑人故為魅鬼怨習懷恨故為貪恨恨積惡毒故遇蟲成形如蛇虺蝮蝎以毒傷人故為蠱毒鬼瞋習懷恚不忘故為貪憶乘虗而入故遇災衰成形名為厲鬼即瘟疫時病瘧症皆此鬼作也慢習陵人傲物故為貪傲憍矜恃氣故遇氣成形空腹高心故為餓鬼誑習罔冒欺人故為貪罔暗昧良心故遇幽成形魘惑寐者故為魘鬼見習妄執邪見以為明悟故為貪明遇精明處即附成形如山靈木石之精名魍魎鬼以見逐光影故鬼亦似有若無枉習搆架無辜以成有罪故為貪成以精思求過故遇明成形勞役心神故為役使鬼即擔沙負石之鬼訟習黨護己罪彼此相訟故為貪黨因人造姦故遇人成形發人隱惡名傳送鬼即巫師之類訐露陰事以上十因所招地獄純情墜落業火燒盡餘習未盡故出而為鬼皆是妄業招引妙圓心中本無此事蓋由迷情所感之妄相耳三示畜生道因果之相分三初標示因果總相復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債二列示因果別相分十初貪習物怪之鬼物銷報盡生於世間多為梟類二淫習風魃之鬼風銷報盡生於世間多為咎徵一切異類三詐習畜魅之鬼畜死報盡生於世間多為狐類四怨習蟲蠱之鬼蠱滅報盡生於世間多為毒類五瞋習衰癘之鬼衰窮報盡生於世間多為蛔類六慢習受氣之鬼氣銷報盡生於世間多為食類七誑習綿幽之鬼幽銷報盡生於世間多為服類八見習和精之鬼和銷報盡生於世間多為應類九枉習明靈之鬼明滅報盡生於世間多為休徵一切諸類十訟習依人之鬼人亡報盡生於世間多為循類三結示因由分三初結示輪回因由阿難是等皆以業火乾枯酬其宿債傍為畜生二結答有無所以此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有三牒示問意如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結議曰此從鬼道出為畜生類也以情多少之不一故沈地獄之不同地獄罪畢復出為鬼既經苦趣則情想之業二皆報盡故曰俱空但怨債未忘以身酬值故為畜生亦因本習各從其類且如貪習為怪鬼畜為梟類以貪他物而為己有故土梟附塊為兒習使然也物能害己故梟子食母業使然也淫習為魃鬼淫為病徵故餘習出為咎徵如商羊舞水江豚拜風之類詐習魅鬼而為狐類狐能魅人亦餘習也怨習蠱鬼而為毒類如蛇蝎等瞋習厲鬼乘衰入身而為蟯蛔慢習餓鬼往受飢虗故為食類以充人腹誑習為魘昧之鬼因誑罔冒於人虗飾外儀故為服類凡畜物皮毛可為服飾或驢騾馬等可乘服者皆其類也見習魍魎名和精鬼和雜精明而為鬼也畜為應類即應節序而先鳴者預知先報蓋見習也枉習役使之鬼託明以生名明靈鬼畜為休徵之類休美也休徵乃美事之先見者即麟鳳之類如吏勵精圖治窮詰民情而為明所謂神明之宰皆其類也訟習為傳送故名依人之鬼即世健訟能起滅訟事一向因人故鬼為傳送畜為循類即人所畜養貓犬之類專愛依人習使然也此十畜類皆以業火乾枯酬償宿債而為畜生皆妄業所招若悟菩提則此三惡道本無所有如汝所言寶蓮琉璃善星等業皆自心發明元非天降人與乃自妄作其因自受苦果於菩提心中皆妄想凝結耳可不哀哉四示人道因果之相分三初標示因果總相分二初示因果酬償復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直二示輪回不已阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢議曰此言畜生酬足復生人類蓋三惡報盡而幸生為人非善業所感也故首論酬償先債然債非獨殺盜而十習因中皆有負債之義其貪詐等皆以邪命自活妄取他財豈非夙負故畜生類中總言償債償足而止言酬越過分者謂或多售其價過用其力或過貪其味挫糜其身皆為過越使彼含冤必返徵其剩此其所以輪回不已也如彼有力即於人中酬償者如不孝敗家之子弟狐媚騙財之朋友與夫劫賊官訟之類令其破産蕩財皆往業所招非無因也又若負錢物而以身償還如值而止若更殺其身而食其肉皆為過也故相食相誅輪轉不已自非禪定之力及遇佛懺悔決無停寢之日也二列示因果別相分十初貪習汝今應知彼梟倫者酬足復形生人道中參合頑類二淫習彼咎徵者酬足復形生人道中參合異類三詐習彼狐倫者酬足復形生人道中參於庸類四怨習彼毒倫者酬足復形生人道中參合狠類五瞋習彼蛔倫者酬足復形生人道中參合微類六慢習彼食倫者酬足復形生人道中參合柔類七誑習彼服倫者酬足復形生人道中參合勞類八見習彼應倫者酬足復形生人道中參於文類九枉習彼休徵者酬足復形生人道中參合明類十訟習彼諸循倫酬足復形生人道中參於達類三結示輪回之相阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者議曰此列十種酬償人類也梟本貪習從怪鬼出今幸為人參合頑類頑謂頑嚚無知也以因地多貪而性愚癡故今為顓蒙無知之類言參合者參預也合混為一也謂人中愚頑自有本因今從鬼畜而來得參預混合而為人意蓋謂雖得人身而似非分也咎徵本淫習從魃鬼出以多淫者邪心苟合故參異類狐本詐習從畜魅鬼出參於庸類謂庸鄙自用由詐習欺人故今返習庸鄙也毒本怨習從蟲毒鬼出故參合狠類以怨天尤人而不揣己習使然也蛔本瞋習從癘鬼出參合微類微者眇賤不為人所齒録也以瞋陵毒於人故感報微眇食本慢習從餓鬼出慢習貢高故感柔怯以食類為強所陵故為人亦柔怯服本誑習從魘鬼出以因勞苦役力故人亦為勞形治生之類應本見習從和精鬼出而人為文類此文非大名家蓋小有才情動止可觀者耳休徵本於枉習從明靈鬼出故人參明類此世智聰明非明智也訟習從傳送鬼出而人為達類此非達者之達乃通達世情以訟習主刁詞起滅鬼為傳送發人禍福故人參達類習使然也此上十類非正因為人故皆云參合乃三途餘業酬畢復形各從習類實業計顛倒耳以未聞正法法爾輪轉此輩名為可憐愍者上人趣畢五示仙道因果之相分三初標示因果總相阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙議曰此標仙趣也仙道亦因修得以不依正覺修三摩地但依妄念存想固形所謂修長生者各從其術而有十種二列示因果別相分十初地行仙阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙議曰此地行仙因服餌所成謂服藥餌以此養形而得壽考行不離地為地行仙二飛行仙堅固草木而不休息藥道圓成名飛行仙議曰此飛行仙因餐松噉拍黃精芝朮之類服久身輕而得飛舉非吸風露者比三遊行仙堅固金石而不休息化道圓成名遊行仙議曰此遊行仙乃煉丹沙點化五金八石遊戲人間故曰化道名遊行仙四空行仙堅固動止而不休息氣精圓成名空行仙議曰此空行仙常消息陰陽之候以子午卯酉為運氣工夫故云動止久而身輕蟬脫名空行仙五天行仙堅固津液而不休息潤德圓成名天行仙議曰此天行仙因鼓天池津液吐故納新日久功成如八洞神仙之類能謁天帝故曰天行仙六通行仙堅固精色而不休息吸粹圓成名通行仙議曰此通行仙乃吞日精月華呼吸導引久而壽永心通名通行仙七道行仙堅固呪禁而不休息術法圓成名道行仙議曰此道行仙因持呪禁符術而得成功如天師之類名道行仙此道乃禁術非大道也八照行仙堅固思念而不休息思憶圓成名照行仙議曰此照行仙以存想丹田泥丸為命元如莊子曰泥垣之審為淵名照行仙非慧照也九精行仙堅固交而不休息感應圓成名精行仙議曰此精行仙謂固守精氣陰陽交媾如嬰兒姹女之類胎息存形名精行仙十絶行仙堅固變化而不休息覺悟圓成名絶行仙議曰此絶行仙乃習出陽神改形易質往來自由故曰變化久而心通故曰覺悟餘仙之所不及故曰絶行仙三結示輪回之相分二初揀不解真修阿難是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境次示輪回根本斯亦輪回妄想流轉不修三昧報盡還來散入諸趣議曰此結仙趣也以此仙趣乃人中煉心別得生理故勝於人壽千萬歲故不如天不修正覺故曰妄想流轉報盡墮落故散入諸趣以非天非人故別列此趣上仙趣畢六示天道因果之相分二初通示三界因果之相分三初欲界六天分二初列示器界因果之相分六初四天王阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄鎣生明命終之後鄰於日月如是一類名四天王天議曰此後言天趣也三界中先從欲界六欲天始於四王也忉利已下名地居天未離飲食男女之欲但因重輕為六天之次皆不知修禪正以十善之因所感耳四王居須彌山腰鄰日月宮四面居之為護世四王此經論天不説十善單以淫欲一事為本從經所宗也四王有正妻妾恩愛未捨但不邪淫故感生此天二忉利天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天議曰此忉利云三十三天乃地居頂天稱帝釋天居須彌頂中四方各統八天故云三十三以欲氣粗濁故欲薄則上升此天雖有妻房而淫愛微薄即淨居時不得全味有微愛故人中愛薄即感生此天日月在下故超日月明三夜摩天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天議曰此欲界第三空居第一天也須𦦨摩此云時分此天無日月光而有身光以蓮華開合為晝夜由昔人中欲氣漸薄故感生此天逢欲暫交未離欲也去無思憶無愛心也不馳欲境故動少欲淡心清故靜多身心不染而無穢濁故朗然空居自有光明四兜率天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天議曰此欲界第四天也兜率此云知足有內院外院外院乃實報天人所居內院乃彌勒一生補處為主其在釋迦末法弘法菩薩及修行發願待彌勒下生助揚法化者居之以淫機不動故一切時靜未能息機故應觸不違以行勝前故云上升精微然三災壞至三禪而此云不壞者蓋指內院而言也五化樂天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天議曰此欲界第五天也以樂變化五欲之境而自受用故得此名我無欲心淫機已息也而欲境橫陳在彼有心在我無味故如嚼蠟則至淡也越者超也言在人中能有此行則徑生此天不歷下位故云越也化地即此天六他化天無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天議曰此欲界第六天也無世間心同世行事故全無欲也以未離世緣故云於行事交非言欲事蓋與妻妾相接而中心了無相干故云超越若言猶與欲交則非此天之行也俱舍云六受欲交抱執手笑視淫但目視而已豈有交耶化謂第五天無化謂下四天超者謂由人中徑生此天也此天受用乃他所變化故云他化自在二總結當界得名阿難如是六天形雖出動心迹尚交自此已還名為欲界議曰此結欲界天名也人趣欲穢雜亂心多動搖而天已離人故云出動言心迹尚交者蓋約六天通相而言也其實粗細不同非可例觀也以未出欲故通名欲界上欲界六天竟
