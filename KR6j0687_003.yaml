body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二會六入初會眼入復次阿難云何六入本如來藏妙真如性阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入是故當知眼入虗妄本非因緣非自然性議曰此總徵六入本如來藏也說者槩以六入為六根謂根乃六塵所入之處諦觀經義不然以明言見精聞性等豈浮塵根而可擬哉經云元以一精明分成六和合此中特言見聞覺知蓋推初分六湛之源也意謂如來藏性唯一堅密身了無能所本不可入良由一念妄動遂起無明迷此真心而為八識所謂識精元明也以此識具有自證見相三分由見相對待則吸習塵相中歸藏識以吸故名入發起見聞覺知而為六用之元湛淵之體因此而分六受用根依之而立以此遂為六塵所入耳非謂浮塵根也即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相此言根識同源也目根也乃清淨四大即無明殼屬相分為六根之元勞指見分為七識之元菩提瞪發勞謂生相無明即自證分意顯相見同一自證則根識同一識精元明之體但因無明熏習而發見聞覺知以為六用之元耳是知瞪喻無明勞喻相見同是菩提瞪發勞相是則由無明力熏習真如故有八識三分耳以此推之若了三分無體元一真心則根塵識三全無自性故不屬因緣自然皆本如來藏妙真如性矣二會耳入阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性議曰此會耳入也曰聽聞性名聞性揀鼻入也辨無自性本如來藏矣三會鼻入阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相因於通塞二種妄塵發聞居中吸此塵象名嗅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當回嗅汝鼻空自有聞何關汝入是故當知鼻入虗妄本非因緣非自然性議曰此會鼻入也亦曰聞性曰聞機義與耳同在耳曰聽聞在鼻曰嗅聞體同而用異所謂性中相知用中相背也四會舌入阿難譬如有人以舌舐吻熟甜令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是嘗苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入是故當知舌入虗妄本非因緣非自然性議曰此會舌入也以舌抵物曰䑛吻唇吻也曰知味性又曰知味根則根性一源也五會身入阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性議曰此會身入也在身為覺名覺知性也六會意入阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無請知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於知華畢竟無性若從空生自是空知何關汝入是故當知意入虗妄本非因緣非自然性議曰此會意入也眠則為忘寤則為憶莊子其寐形交其覺形開故曰開合憶則為生忘則為滅生法暫停曰住住不久留曰異謂吸撮此生住異滅為內法塵較前指塞耳而有聲急畜鼻而有冷觸舌舐吻而有苦甜手相摩而有冷暖則知塵非外來意顯根塵識三唯識所變且意吸生滅而為塵豈有實法哉見聞逆流流不及地者謂見聞等五根往外順流緣五塵境今不外緣但內緣五塵落謝影子生滅不停故云逆流以生滅法塵但歸意地而八識本體非見聞所及故云流不及地名知覺性以統收六根但云見聞覺知而已一一辨妄無體皆本如來藏矣三會十二處初會色處復次阿難云何十二處本如來藏妙真如性阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性議曰此總徵十二處也初約色塵以對眼根以顯根塵十二處虗妄說者謂十二處正破在色經文明言即色與見二處虗妄豈單在處耶今皆無體則本如來藏矣二會聲處阿難汝更聽此祗陀園中食辦擊鼓衆集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處阿難若復此聲來於耳邊如我乞食室羅筏城在祗陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祗陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性議曰此會聲處也聲不來耳邊耳不往聲所是則音聲聞性兩皆寂然而妄生分別二妄無體則本如來藏矣三會香處阿難汝又嗅此爐中栴檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生栴檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非栴檀云何鼻中有栴檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恆香應常在何藉爐中爇此枯木若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即嗅與香二處虗妄本非因緣非自然性議曰此會香處也香無定在聞根本空二皆無體則本如來藏矣四會味處阿難汝常二時衆中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中祇有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性議曰此會味處也約味以辨味若生於舌則一舌而不能知多味若生於食則食自知而無預於舌若生於空則根塵無干何名知味是知二皆無體則本如來藏矣五會觸處阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性議曰此會觸處也約觸以辨以手摩頭而為身之觸也若觸在手頭不應知觸若在頭則不待手觸若頭手皆有觸則有二知應有二身若頭手是一則不成觸若頭手二體則觸無定在是知覺觸與身俱無處所二俱虗妄此以自手觸身故一體二體以辨畢竟無體則本如來藏矣六會法處阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所阿難若即心者法則非塵蓋法已是心則非塵矣既非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量若有知而又異汝則非汝之法塵應同他心量矣即汝即心若有知而即汝之塵乃即汝之心矣云何汝心更二於汝若異汝而非知者此塵既非色聲香味離合冷暖及虗空相當於何在今於色空都無表示不應人間更有空外縱計空外則心非所緣處從誰立是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性議曰此會法處也約法塵以辨以意中所緣善惡無記三性生成法則名為法塵以此法塵唯意識所變故即心離心推之若此法塵即心而有法則是心而非塵矣既非法塵則非汝心所緣之塵矣云何成處耶此言即心而有者妄矣若此法塵離心而有必別有方所若有方所則法自性為有知耶是無知耶若知則非塵當名汝之心矣若有知而又異於汝則非是汝之法塵應同他人之心量矣且異汝而又有知而言即是汝之塵即是汝之心故云即汝即心斯則云何汝心更二於汝耶此則異汝而言有知者非也若異汝而非知將為汝之法塵者此塵既非色聲香味離合冷暖之實法又不同於虗空畢竟當何所在耶此言離心而非知者妄矣今於色空求之都無表示不應人間更有空外而為汝之法塵也此喻五塵之外別有法塵也縱許法外有法則非汝心所緣之境矣處從誰立耶以此觀之都無實體一切總非則空如來藏之義於是乎顯矣四會十八界初會眼識界復次阿難云何十八界本如來藏妙真如性阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立若從色變則譏亦變界相自無不變則恆既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性議曰此徵會十八界也以根塵和合識生其中故就根塵以辨識無體前後辨法要顯無生之義中論云諸法不自生亦不從他生不共不無因是故說無生從根生自生也從色生他生也根塵合生共生也虗空生無因生也此四生法前後間出總顯無生之義所謂不生滅性即如來藏矣二會耳識界阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知既無所知之境亦無能知之根知尚無成識何形貌知根尚且無成所生之識作何形貌若取耳聞無動靜故聞無所成聞性尚且無成云何耳形雜色觸塵名為識界既無動靜又無耳根則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生若此識果從聲生許聲因聞而有聲相是則識已被聞聞應間識不是聞聲矣不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界根塵既雜則中界不成界無中位則內外相復從何成是故當知耳聲為緣生耳識界三處都無則耳與聲又聲界三本非因緣非自然性議曰此會耳識界也耳聞聲塵故約動靜以辨若因耳生下約根以辨若耳識但因耳生何假動靜若無動靜則根不成知必無所知之境亦無能知之根知根尚且無成而所生之識作何形貌若取耳聞為根無動靜時則聞亦無成聞性尚且無成豈有耳形雜色觸塵便為耳識界耶既無動靜又無耳根則耳識界復從誰立此計因耳生識者妄矣若生於聲下約境以辨若耳識因聲而生則此識因聲而有既因聲有則不關汝聞性矣若聞既是聲則有聞便有聲無聞則無聲相所在矣若果識從聲生又許此聲因聞而有聲相是則識已被聞識既被聞則聞聲應是聞識不是聞聲矣若不聞識又非聲界若是聞識則識已同聲識既同聲已被聞矣將誰又知聞識耶若無知者則終如草木矣此計因聲生識者妄矣不應聲塵與聞根共處雜成中界此破共生也反覆推之根塵無體而識界竟從何立識界既空則本如來藏矣三會鼻識界阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取嗅知動搖之性若取肉形肉質乃身身知即觸名身非鼻名觸即塵觸即身塵不名鼻識鼻尚無名云何立界若取嗅知若以知性為鼻又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在知性尚無將何為鼻鼻根尚無又從何而生識耶以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及栴檀木二物不來汝自嗅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有香尚無體界從誰立若因香生識因香有香即是識如眼有見不能觀眼因香有故應不知香知即非生不知非識若不知香即非鼻識香非知有香界不成識不知香因界則非從香建立既無中間之識不成內外根境彼諸聞性畢竟虗妄是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性議曰此會鼻識界也辨識界文皆約根塵獨此一段有嗅知之性以從鼻形兼嗅知性雙辨無體也謂若鼻識因鼻而生先審以何為鼻是取肉形之相耶為取嗅知之性耶若取肉形則肉質乃身也若身知香名身則非鼻名觸即是身塵而鼻尚無名云何立界此計從肉鼻生者妄矣若取嗅知之性以為鼻者則汝心中以何為知耶若以肉為知則是肉之知元是身觸非鼻識也若以空為知則虗空是汝而汝身非知則阿難應無所在矣此則知性尚無將何為鼻此計以知為鼻者妄矣若以香為知則知自屬香何預於汝若香臭氣必生汝鼻則香臭不生伊蘭及栴檀矣二物不來汝自嗅鼻為香為臭若香臭齊聞則有兩鼻若鼻是一而香臭無二臭既為香香復成臭二性不有則香尚無體知從誰立知尚無體識從何生此計香為知者妄矣若因香生下約境以辨若鼻識因香而生則此識亦因香有香即是識如眼不見眼既因香有則識已是香應不更知香矣若又知首即非從香生矣若不知香則非鼻識矣若香不待知而有則香界不成若識不知香而因界則非從香建立矣此計從香生識者妄矣既無中間則內外不成而聞香之識畢竟虗妄三處都無而識自無體無生之義於茲顯矣四會舌識界阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味自不生云何立界若因味生識自為味同於舌根應不自嘗云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心識舌味和合根塵共生即於是中元無自性云何界生是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性議曰此會舌識界也若因舌生下約根以辨此識若因舌生何假衆味而顯也若無衆味當自嘗舌為甜為苦若舌成味誰來嘗舌舌不自嘗誰為知覺舌性非苦味自不生此計從舌生識者妄矣若同味生下約境以辨此識若因味生則識自為味同於舌根舌不自嘗云何識知是味非味又味非一物則識應多體若識體是一而識從味生則識一而多味通成一味應無分別矣既無分別何名舌識耶此計從味生識者妄矣根塵無體不應虗空生汝識也若舌與味和合共生即於是中元無自性矣從根生自生也從味生他生也和合共生也從空生無因生也前後皆據此義以顯無生獨此段文最顯微細推窮三處都無了無自體本如來藏矣五會身識界阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰有非身和合離者阿難物不觸知物不因觸而有知身知有觸身因有知而即有觸知身即觸身知即因觸而顯知觸即身知觸即因身而顯是則身觸不相離也即觸非身若即觸則非身矣即身非觸若即身則非觸矣身觸二相元無處所合身即為身自體性觸若合身即為身自體而至觸矣離身即是虗空等相觸若離身即是虛空內外不成中云何立中不復立內外性空則汝識生從誰立界是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性議曰此會身識界也若因身生下約根以辨此識若從身生必無合離二緣則身何所識耶是識不從身生也若因觸生下約境以辨此識若因觸塵而生是則但有觸而無身矣豈有非身而知合離者且物不因觸而有知身因有知而即有觸知身則因觸而顯知觸即因身而顯是則身觸不相離也若即觸則非身矣若即身則非觸矣然則身觸二相元無處所若觸合身即為身自體而非觸矣若觸離身即是虗空相矣內外性空則識從何以立界耶一切無性而無生之義顯矣六會意識界阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性議曰此會意識界也意根約法塵以辨意識無體謂意識若從意根而生然於根中必有所思之法塵方發明是汝之意根若無法塵則意根尚無必無所生之識矣若離所緣之法塵則根亦無形縱有汝識將何所用以無可分別故此約根塵既無則識亦無體矣下約同異以辨根識又汝識心指意識也與諸思量指七識意根也此二兼有了別性此識與根為同為異同意即但是根云何而為所生之識耶若異意根則不同意應無所知之識云何說名意根所生之識耶若異意而又有知識即名意根矣云何意根而又識意根耶且同異二妄尚無體性而界云何立耶此計從根生識者妄矣下約塵辨此識若因法塵而生然世間諸法不離五塵分明以對五根都有相狀皆非意所攝今汝諦觀法塵之法作何相狀以法塵乃五塵謝落之影子故約五塵對辨無體五塵乃色空動靜通塞合離生滅也越此諸相終無所得是則生但諸法等生滅但諸法等滅所因之法既無則因生之識作何形相耶此計從塵生識者妄矣根塵既空識界何有則當下無生藏性顯矣從初卷阿難啓請妙奢摩他以來至此始則破妄顯真次則會妄歸真而所顯之理從淺至深總該四時所說之教初徵心辨見以破身見阿含教義也破見分識精方等教義也五蘊三科會歸藏性根塵識界一一本空般若教義也本如來藏妙真如性則法法全真通歸實相法華終教義也若下文七大遍周一一圓融周遍法界則引歸華嚴理事無礙法界總顯三諦圓融空如來藏性以為空觀之體所謂融會入於如來妙莊嚴海此通途之大旨也按理而推是豈可局於時哉上會三科以顯即事即理竟二會七大以顯事理無礙分五初當機疑請阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬惟垂哀愍開示衆生中道了義無戲論法議曰如來一往開示可謂理極情忘而阿難猶執常談因緣自然為疑者豈阿難顓愚至此耶蓋理有未盡故疑有未決所以示同未悟耳當機以中道之義為請而此判屬空藏者所謂一空一切空無假無中無不空也二許說誡聽爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世問戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨議曰佛謂阿難厭離小乘勤求大法已為開示第一義諦矣而猶自妄想纏繞良由一向多聞久執名言未有真修如說藥人真藥現前不能分別也三總出妄計阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息四特示一源阿難如水成冰冰還成水議曰此總答問義也阿難執謂四大和合發明世間種種變化以不達性真圓融周遍之理妄計和合佛言大性若不和合則不能與諸大雜如猶如虗空不和諸色若和合者則同於變化生滅相續生生死死未有休息是則不可言和合非和合也若了真妄一體如水成冰冰還成水則一切妄計當下情忘矣五遍示大性分七初示地大汝觀地性粗為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合汝元不知如來藏中性色真空性空真色清淨本然周遍法界隨衆生心應所知量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示地大周遍也意約體空以示性真且此地大乃積微塵所成者故析微塵以至鄰虗析鄰虗以成虗空由是而知虗空出生色相而地大之體本空也若言和合而成大地此鄰虗塵用幾虗空和合而有以鄰虗極微乃地大之始也若析鄰虗而為虗空當用幾色相以合成虗空耶若合色則非空若合空則非色色可析而空不可合此計四大和合發明者妄矣此地大體汝元不知如來藏中循業發現本非和合而有也若了循業發現則性真周遍之義顯矣二示火大阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一衆衆誰為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有汝猶不知如來藏中性火真空性空真火清淨本然周遍法界隨衆生心應所知量阿難當知世人一處執鏡一處火生遍法界執滿世間起起遍世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示火大周遍也以手執鏡於日求火諦觀此火不從日來不從鏡出不從艾生又非無從自有則非和合明矣汝猶不知如來藏中周遍法界而性火真空本然周遍故一處求火一處火生若遍界求則滿世間起足知循業發現之義矣三示水大阿難水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求大陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方珠所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空生無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知如來藏中性水真空性空真水清淨本然周遍法界隨衆生心應所知量一處執珠一處水出遍法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示水大周遍也方諸水精珠也但觀幻師以方諸求水此水不從珠出不從月來不從空出又非無從自有汝尚不知如來藏中性水真空本然周遍元非和合遍法界求滿法界生則循業發現可知矣四示風大阿難風性無體動靜不當汝常整衣入於大衆僧伽梨角動及傍人則有微風拂彼人面此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有汝宛不知如來藏中性風真空性空真風清淨本然周遍法界隨衆生心應所知量阿難如汝一人微動服衣有微風出遍法界拂滿國土生周遍世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示風大周遍也風體難言故借整衣有風拂彼人面以辨性空此如來妙辨最可思也因整伽黎則有微風拂彼人面此風為復出於袈裟為發於空為生彼人面若出於袈裟則汝披風衣當飛搖而去矣豈我衣中有藏風地耶若生於空空性常住而風亦常生風滅而空亦當滅若有生滅非虗空矣若風自生被拂人面既從彼面而生則當拂汝云何彼人倒拂耶三處無體豈成和合汝宛不知如來藏中性風真空本然周遍寧有方所循業發現非識心計度可知也五示空大阿難空性無形因色顯發如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝全不知如來藏中性覺真空性空真覺清淨本然周遍法界隨衆生心應所如量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示空大周遍也虗空因色而顯以空是色之體故假鑿井以發明之虗空融貫大地但見色礙而不見空因鑿井出空則知虗空為處不遍矣故曰喻如虗空遍至一切色非色處今觀鑿井之空不因土出不因鑿出又非無因若了此虗空性圓周遍則知現前地水火風均名五大性真圓融本如來藏循業發現矣豈以因緣自然而計度哉此虗空并前四大皆八識之相分六示見大阿難見覺無知因色空有如汝今者在祗陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出若見聞知性圓周遍本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅阿難汝性沈淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異汝曾不知如來藏中性見覺明覺精明見清淨本然周遍法界隨衆生心應所知量如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然遍周法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示見大周遍也見大乃八識之見分亦名見精無知者以此見元是妙明之智光本無對待今迷而為妄見因對色空之妄境遂形了別以本無所知故約明暗虗空一異以破若一則既一於明而不到暗必一於暗而不到明兩不相到則不能雙見明暗矣若異則離於虗空明暗之外別求此見形相而不可得異此三處從何立見且明暗相背難言或同離三無體難言或異空見不分難言非同明暗遷而性不改難言非異況見有知而空頑無知非和合矣又非無從而有畢竟無體則見性本空若見聞知性圓周遍本不動搖則知虗空并其四大性真圓融皆如來藏不生不滅性矣汝曾不知如來藏中性見覺明本然周遍但隨衆生心量循業發現耳豈可以因緣自然計之哉七示識大阿難識性無源因於六種根塵妄出汝今遍觀此會聖衆用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若無所因突然而出何不日中別識明月汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅阿難汝心粗浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有汝元不知如來藏中性識明知覺明真識妙覺湛然遍周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義議曰此示識大周遍也識性無源因於六種根塵妄出故約見相二分以破八識假見分七識為根以親相分為境離此二分別識性本空故曰識從何發若生於空則非相非見若非見則瞢然無辨若非相則無前緣而見聞覺知無處安立矣若言是空則同於無若言是有又不同物亦非無因突然而出若此識心本無所從則知了別見聞覺知皆本無從兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅矣汝元不知如來藏中性識明知覺明真識妙覺湛然遍周法界含吐十虗循業發現殊非妄心計度可知也上約不生不滅會妄歸真以顯真空藏性竟已上三科七大通云會妄歸真以顯真空藏性而所顯之理亦為門不同按華嚴法界觀門中有四句義一會色歸空二明空即是色三空色無礙四泯絶無寄今經三科會歸藏性正當觀中初句會色歸空當論中如實空義今七大之文一一皆云性真圓融循業發現即當觀中第二明空即是色第三空色無礙義當論中如實不空義論云如實不空謂一切境界悉於中現不出不入不失不壞今以論不空收入此經空藏體者以論宗楞伽等經理齊終教此經引歸性海帶顯圓融理該華嚴圓教故以彼不空入此中空藏者義顯妙有真空圓融無礙之空非遠離一切心境界相之空也此空藏體即當華嚴理法界門四句通收十門齊會若約七大色心周遍圓融則已帶顯觀中理事無礙十門中初二門義以即真故相遍由相遍故無礙以此而觀足見此經理收五教是知向下顯不空如來藏前當華嚴理事無礙法界後八門義若約毛端現剎塵裏轉輪則又帶顯事事無礙法界矣義顯此經為引攝教以一切因果攝歸果海故請觀法界觀文決無疑矣三當機領悟說偈陳情爾時阿難及諸大衆蒙佛如來微妙開示身心蕩然得無罣礙是諸大衆各各自知心遍十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精遍圓含裹十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛議曰此當機領悟也阿難大衆初但認蕞爾之身以為心在身內今蒙如來微妙開示則各自知心遍十方矣向以虗空為大今悟妙心廣大故觀十方空如手持葉物耳向以目前諸物作障不達唯心所現今則了一切物皆即妙明真心此心周遍含裹十方矣向以祇認父母所生之身為實而生愛戀今則反觀此身如十方空中之一塵湛巨海浮一漚起滅無從了不可得矣一向迷真但執妄想生滅為心今則了悟自知獲本妙心常住不滅矣自非如來大悲開示何以一旦超悟至此哉故說偈陳情讚佛妙湛總持不動尊首楞嚴王世希有議曰初句讚佛此單讚佛法身而三身具焉不必別也清淨妙法身湛然應一切故曰妙湛以此法身為諸法體三德具足故曰總持佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座故曰不動舉一體而具三身故為聖中尊所以單讚法身者以阿難最初但見如來三十二相心托愛樂故從佛出家以所見之佛不真而所發之心亦是妄想今既蒙開示妙悟自心乃見佛法身故此特讚此句有以三觀配之者若言法身則無不具矣次句讚法阿難初請妙奢摩他三摩禪那佛許云有三摩提名大佛頂首楞嚴王從前一往破妄顯真以極一心之源通顯大定之空體圓融三諦總合真空已悟此定體故讚此法為世希有銷我億劫顛倒想不歷僧祗獲法身議曰此二句通陳獲益也從前所徵破者而佛呵云皆由執此顛倒妄想誤為真實今皆了悟盡淨消除以前但認幻妄身心今悟即此五蘊而頓獲法身不須更歷僧祗乃呈悟獲益之速也正所謂狂心不歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證也願今得果成寶王還度如是恆沙衆將此深心奉塵剎是則名為報佛恩議曰此陳願也初句已悟法身則成佛不遠依此修行則聖果可期小乘一向未有成佛之心今自信已心乃上求佛果也次句謂下化衆生也小乘一向不肯利生今悟無心外之衆生故願度恆沙之衆也上求下化是謂深心將此深心以奉多佛所感佛恩而無可報者唯此利生可報耳伏請世尊為證明五濁惡世誓先入如一衆生未成佛終不於此取泥洹議曰此請佛加被以成大願也五濁惡世難入而今誓入仗如來加被庶遠魔事故請證明誓願度盡衆生方成佛道此大願也四十年來小乘一向未有發此願也大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場議曰此請益也阿難雖悟法身但初見道而已猶有無明微細結惑深密難斷非已智可知必仗雄猛慈悲之力方能破除故請佛審諦一一破除此惑一盡則成佛不遠故曰早登意欲速證菩提於十方現坐道場也舜若多性可銷亡爍迦羅心無動轉議曰此誓不退堅固心也舜若多此云虗空爍迦羅此云堅固意謂虗空無形可使銷亡而我願力堅固之心永無動轉此非大定之力何以有此願力哉前開空如來藏竟
