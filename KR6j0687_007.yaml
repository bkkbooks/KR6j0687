body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二令持祕密神呪熏斷俱生習氣分二初明現行易制阿難汝問攝心我今先說入三摩地修學妙門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺夫心尚不緣色香味觸一切魔事云何發生二明宿習難除分三初教誦呪若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛羅無上神呪二顯呪妙斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪三顯呪力且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚婬女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險三令依清淨戒師深防邪誤若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就四令擇阿蘭若處止絕外緣戒成以後著新淨衣然香閒居誦此心佛所說神呪一百八徧然後結界建立道場五請佛冥加冀觀行易就求於十方現住國土無上如來放大悲光來灌其頂上示修相乃前四根本戒三刻期修證阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪婬持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日四感應冥符我自現身至其人前摩頂安慰令其開悟議曰此明現行易制宿習難除將為建立壇場發啟也前說四重律儀乃制現行之軌則以四重為根本戒故能持此四種皎如冰霜則一切枝葉自然不生即三業六根永絕發業之因矣一切魔事由著塵境而生心尚不緣六塵則一切魔事何從而發耶此現行猶易制也唯有多生宿習最為難除如器盛穢物雖去穢物而穢習尚存必須洗滌之功以無量劫來婬殺盜妄習氣種子染於藏識之中極為深潛固密即觀照之力自不能攻必假佛心印祕密神呪之力冀可熏斷如請上方之劍以討賊耳故曰若有宿習不能滅除汝教是人一心誦我無上神呪此呪乃無為心佛所說所謂祕密心印非尋常比也且摩登歷劫恩愛習氣一聞此呪愛心永脫成阿羅漢彼尚婬女無心修行其效如此況汝有決定成佛之志者乎欲成就誦呪之功須坐道場理宜深防邪誤必須第一清淨禁戒比丘以為其師是為勝侶先使戒根成就然後然香閒居誦此心呪加持結界乃可建立道場更要請十方佛放光加被方使祕呪易成耳故末世行人戒清淨者坐道場中六時行道經三七日我自現身摩頂令其開悟是所謂攝心軌則也上答攝心軌則竟二問安立道場分二初當機重請道場軌則阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則議曰此問道場結界軌則也入道第一要身心平等次要心境一如以造業因境為助緣而真修亦然故須問軌則也二世尊詳示修治法式分二初詳答分十一塗地法式佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沈水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地議曰此塗地法式也雪山純一無雜白牛無染香草純味清水純潔而茹退亦純栴檀其樹無影通表清淨法身功德也意顯道場依法身建立也去地五尺取其黃土黃乃中色和十種香謂由法身中道調和十波羅密而為行耳故曰以塗場地二立壇法式方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沈水無令見火取白牛乳置十六器乳為煎餅并諸砂糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩議曰此言立壇法式也壇法舊解各有所表大槩以蓮華表因心鏡表智體香表觀行等其所用物各有表顯非特言理也三供養法式每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以樓兜婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩議曰此供養法式也諸佛菩薩本不受食今修供養意表妙行熏修始覺以向本覺之意必須緣影盡淨方乃合一故投酥蜜燒令煙盡也四設像法式令其四外徧懸旛華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩火頭金剛并藍地迦清面金剛諸軍茶利三目金剛與毗俱胝持鬘髻金剛四天王等頻那猪頭夜迦象鼻張於門側左右安置議曰此設像法式也盧舍那為法界主餘十方佛及諸菩薩乃其伴也意取主伴互融其八部皆護法眾意取遠諸魔事耳五觀行法式又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉議曰此觀行法式也壇中先安八鏡而壇內之境已現影於鏡中今仍懸八鏡相對則壇中之鏡若影皆互相涉入重重無盡是所謂諸佛法身入我性我身還共如來合此圓融自在觀心若此可與諸佛智體相應也六行道法式分三初七禮拜稱名於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八徧二七專心發願第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教三七一向持呪第三七中於十二時一向持佛般怛羅呪七感應道交至第七日十方如來一時出現鏡交光處承佛摩頂議曰此行道法式也行道若無次則心散而難攝功行難成從初七以至三七日內各有所行故身心不倦至於第三七日則感應道交十方如來一時出現也鏡交光處乃行人心契佛心之地故承佛摩頂以攝受也八結顯功效即於道場修三摩地能令如是末世修學身心明淨猶如瑠璃議曰此顯功效也以表裏俱淨故身心猶如瑠璃此所以不起道場而令成就也九使離過絕非阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就議曰此言離過絕非也壇中有一不清淨者多不成就意要永離諸過純一無偽乃可剋期成功耳十刻期取證從三七後端坐安居經一百日有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬二結示汝問道場建立如是議曰此刻期取效也由三七後即端坐安居百日之內可證初果當觀行成就也雖未登聖果業已自知決定成佛不謬矣道場之法建立如此結答次問也前示利他妙淨事行竟三示俱利妙嚴密行分三初當機三業顯請阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞惟願大慈重為宣說悲救此會諸修行輩末及當來在輪迴者承佛密音身意解脫於時會中一切大眾普皆作禮佇聞如來祕密章句議曰此請妙嚴密行也顯密雙修自他俱利方盡真因未說經先佛已放光說呪敕令文殊將呪往護阿難尚未親聞但冥獲其力耳故請重說神呪以益在會末及未來將為法利也二如來光相密酬分三初現瑞爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆徧示現十恒河沙金剛密迹擎山持杵徧虗空界二眾仰大眾仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣說神呪議曰此光相密酬也佛三十二相肉髻第一從此放光表尊勝頂法由中道妙智所發也光中涌蓮表妙智勝因蓮中化佛表因果一契化佛頂復放光光中示現金剛神眾表從果體復起妙用殊非心識境界也化佛說呪表此呪乃無為心佛所說故功力愈見殊勝耳三說呪五會第一會南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫薩怛他佛陀俱胝瑟尼釤南無薩婆勃陀勃地薩跢弊南無薩多南三藐三菩陀俱知南娑舍囉婆迦僧伽喃南無廬雞阿羅漢跢喃南無蘇盧多波那喃南無娑羯唎陀伽彌喃南無盧雞三藐伽跢喃三藐伽婆囉底波多那喃南無提婆離瑟𧹞南無悉陀耶毗地耶陀囉離瑟𧹞舍波奴揭囉訶娑訶娑囉摩他喃南無䟦囉訶摩泥南無因陀囉耶南無婆伽婆帝嚧陀囉耶烏摩般帝娑醯夜耶南無婆伽婆帝那囉野拏耶槃遮摩訶三慕陀囉南無悉羯唎多耶南無婆伽婆帝摩訶迦羅耶地唎般剌那伽囉毗陀囉波拏迦囉耶阿地目帝尸摩舍那泥婆悉泥摩怛唎伽拏南無悉羯唎多耶南無婆伽婆帝多他伽跢俱囉耶南無般頭摩俱囉耶南無䟦闍囉俱囉耶南無摩尼俱囉耶南無伽闍俱囉耶南無婆伽婆帝帝唎茶輸囉西那波囉訶囉拏囉闍耶跢他伽多耶南無婆伽婆帝南無阿彌多婆耶哆他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝阿芻耶哆他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝沙闍耶俱盧吠柱唎耶般囉婆囉闍耶跢他伽多耶南無婆伽婆帝三補師毖多薩憐捺囉剌闍耶跢他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝舍雞野母那曳跢他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝剌怛那雞都囉闍耶跢他伽多耶阿囉訶帝三藐三菩陀耶帝瓢南無薩羯唎多翳曇婆伽婆多薩怛他伽都瑟尼釤薩怛多般怛㘕南無阿婆囉祝耽般曪帝揚岐囉薩囉婆部多揭羅訶尼揭囉訶揭迦囉訶尼䟦囉毖地耶叱陀你阿迦囉蜜唎柱般唎怛囉耶儜揭唎薩囉婆槃陀那目叉尼薩囉婆突瑟吒突悉乏般那你伐囉尼赭都囉失帝南羯囉訶娑訶薩囉若闍毗多崩娑那羯唎阿瑟吒冰舍帝南那叉剎怛囉若闍波囉薩陀那羯唎阿瑟吒南摩訶揭囉訶若闍毗多崩薩那羯唎薩婆舍都嚧你婆囉若闍呼藍突悉乏難遮那舍尼毖沙舍悉怛囉阿吉尼烏陀迦囉若闍阿般囉視多具囉摩訶般囉戰持摩訶疊多摩訶帝闍摩訶稅多闍婆囉摩訶䟦囉槃陀囉婆悉你阿唎耶多囉毗唎俱知誓婆毗闍耶䟦闍囉摩禮底毗舍嚧多勃騰罔迦䟦闍囉制喝那阿遮摩囉制婆般囉質多䟦闍囉擅持毗舍囉遮扇多舍提婆補視多蘇摩嚧波摩訶稅多阿唎耶多囉摩訶婆囉阿般囉䟦闍囉商羯囉制婆䟦闍囉俱摩唎俱藍陀唎䟦闍囉喝薩多遮毗地耶乾遮那摩唎迦啒蘇母婆羯囉跢那曥遮那俱唎耶夜囉菟瑟尼釤毗折藍婆摩尼遮䟦闍囉迦那迦波囉婆嚧闍那䟦闍囉頓稚遮稅多遮迦摩囉剎奢尸波囉婆翳帝夷帝母陀囉羯拏沙囉懺掘梵都印兔那麼麼寫第二會烏𤙖唎瑟揭拏般剌舍悉多薩怛他伽都瑟尼釤虎𤙖都嚧雍瞻婆那虎𤙖都嚧雍悉躭婆那虎𤙖都嚧雍波羅瑟地耶三般叉拏羯囉虎𤙖都嚧雍薩婆藥叉喝囉剎娑揭囉訶若闍毗騰崩薩那羯囉虎𤙖都嚧雍者都囉尸底南揭囉訶娑訶薩囉南毗騰崩薩那囉虎𤙖都嚧雍囉义婆伽梵薩怛他伽都瑟尼釤波囉點闍吉唎摩訶娑訶薩囉勃樹娑訶薩囉室唎沙俱知娑訶薩泥帝阿弊提視婆唎多吒吒甖迦摩訶䟦闍嚧陀囉帝唎菩婆那曼茶囉烏𤙖莎悉帝薄婆都麼麼印兔那麼麼寫第三會囉闍婆夜主囉䟦夜阿祇尼婆夜烏陀迦婆夜毗沙婆夜舍薩多囉婆夜婆囉斫羯囉婆夜突瑟叉婆夜阿舍你婆夜阿迦囉蜜唎柱婆夜陀囉尼部彌劍波伽波陀婆夜烏囉迦婆多婆夜剌闍檀茶婆夜那伽婆夜毗條怛婆夜蘇波囉拏婆夜藥叉揭囉訶囉叉私揭囉訶畢唎多揭囉訶毗舍遮揭囉訶部多揭囉訶鳩槃茶揭囉訶補丹那揭囉訶迦吒補丹那揭囉訶悉乾度揭囉訶