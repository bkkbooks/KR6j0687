降魔乘此呪以應塵國含此呪以轉法輪持此呪以得摩頂授記依此呪以濟拔羣苦隨此呪以供佛承法行此呪以攝受小乘誦此呪以成無上覺入大涅槃傳此呪以付佛法事究竟住持是知十方諸佛出世始終事業皆依此呪心而得成就非無上祕密心印何功力若此之殊勝哉即此而觀從上諸祖傳佛心印者未有不由呪力而成功行者也是所謂如來密因修證了義的指此呪為行本也即菩薩萬行令二乘人遠諸魔事無不資始乎此今人修行捨此呪力又何以斷習氣收速效乎妙在壇場勝友乃可剋期成功惜乎此土無結壇之具故多因循漫視耳雖無壇場而密呪斷不可捨置也上顯如來密因竟二菩薩萬行分二初能成萬行分二初自利行分十初能遠魔事若我說是佛頂光聚般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恒沙劫終不能盡亦說此呪名如來頂汝等有學未盡輪迴發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處議曰此通顯呪心源遠而益大也以此呪從一真法界清淨妙心所演故無始無終窮劫不盡而諸修行者不持此呪無以遠諸魔事也此下通言有十種利益二能遠毒害阿難若諸世界隨所國土所有眾生隨國所生樺皮貝葉紙素白㲲書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害阿難我今為汝更說此呪救護世間得大無畏成就眾生出世間智若我滅後末世眾生有能自誦若教他誦當知如是持誦眾生火不能燒水不能溺大毒小毒所不能害如是乃至天龍鬼神精祗魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味議曰此能遠毒害也如不能誦若書寫隨帶其利益亦等呪乃佛心持呪即持佛心故能成出世間智而遠世間毒害也三能令惡神守護一切惡星并諸鬼神磣心毒人於如是人不能起惡頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護議曰此能令惡神守護也持呪即呼召而囑之故能轉惡心而為守護也四能知宿命阿難當知是呪常有八萬四千那由他恒河沙俱胝金剛藏王菩薩種族一一皆有諸金剛眾而為眷屬晝夜隨侍設有眾生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恒河沙劫周徧了知得無疑惑議曰此能知宿命也以呪乃金剛心也向未發悟但為八萬四千塵沙煩惱今執而用之故有如是金剛藏王晝夜隨侍以此心無動轉相故亂心憶持而金剛王亦常隨侍能令行人頓破無明記憶八萬四千恒沙劫也五能離惡道從第一劫乃至後身生生不生藥义羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處議曰此能離惡道也以呪純無漏故永離惡趣生生不受生彼處也六能生善處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處議曰此能生善道也呪力似如意珠故劫劫不生貧窮下賤處也七能成善行此諸眾生縱其自身不作福業十方如來所有功德悉與此人由是得於恒河沙阿僧祗不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處熏修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒議曰此能成善行也以持此呪即得佛心與佛同體故自不作福而十方諸佛所有功德皆悉與之以心心相印故同生一處熏修永無分散也以如來果覺為我因心故齋戒不持而自持不精進而亦得精進智慧矣八能離染行阿難是善男子持此呪時設犯禁戒於未受時持呪之後眾破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一往悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也議曰此能離染行也以法界性無染淨離止作罪性本空而動亂恒一故能滅破戒之罪穢於未受時亦同淨故雖不入壇而與入者等也問曰前言持呪必須結壇種種清潔如一不淨必不成就今言破戒散心皆獲成就何相舛耶答曰前言真修必務嚴潔為主今但言呪力殊勝非言一槩可成也九能滅眾業若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮議曰此能滅眾業也五逆無間罪業四棄八棄皆不通懺悔者今以呪力悉皆除滅也四棄即四根本重業梵語波羅夷此云棄謂永棄佛法邊外也又如世之大辟曰棄市謂永斷慧命也八棄者謂加比丘尼四棄共名八棄尼四棄者謂觸八覆隨觸者不得與染心男身相觸八者謂不得與染心男捉手捉衣入屏處屏處共立共語共行身相倚相期等八事覆者謂不得覆他重罪隨者謂不得隨舉大僧供給衣食即為僧所舉未與作共住法者不得隨彼也通上共名八棄僧所舉即舉詰之義十能消積障阿難若有眾生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍議曰此能消積障也無量劫來所積輕重諸罪今以呪力而能消者正如千年暗室一燈能破也此上十種利益通顯呪力不可思議也上約自利益下約利他益次利他行分二一能隨所願復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形議曰此約利他益能隨所願也求男女即得男女求果報即得果報求往生即得往生永離邊地雜形之報者蓋稱真法性心境一如永離邪曲故也二能滅災難阿難若諸國土州縣聚落饑荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有眾生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆消滅阿難在在處處國土眾生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生眾生種種災異有此呪地悉皆消滅十二由旬成結界地諸惡災祥永不能入議曰此能消眾生災難也種種諸難起於逆理故致災祥今順法性永離諸過故一切災祥永不能入也支提此云可供養處脫闍此云幢也二結成真行是故如來宣示此呪於未來世保護初學諸修行者入三摩提身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及眾中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語議曰此結成真行也以印契佛心故永離魔冤一生取辦也前顯說中性比丘尼得阿羅漢今密呪之功一生克果足證二種般若其功等也上正行成益竟二保護盛益分二一諸神守護說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏復有無量山神海神一切土地水陸空行萬物精祗并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事議曰此諸神守護也華嚴說四十二位異生神眾皆是毗盧遮那海印三昧威神所現各得如來一種三昧以為法界所統故今此呪心乃法界心印故凡所在處諸神守護正如大將兵符符到令行諸人皆得而左右之況如來不思議力乎二菩薩守護爾時八萬四千那由他恒河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒眾常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恒令此人所作如願議曰此菩薩守護也首楞嚴定亦名如幻聞熏聞修金剛三昧故五十五位最後等覺俱用金剛心斷惑以根本無明最極微細堅固非金剛心不能破以一迷真心始起無明名為生相由此無明發業潤生則有生死故變一心而為八萬四千塵沙煩惱造生死業今此呪乃金剛心中所流直斷根本無明故變煩惱而為護法以迷時純為染業今逆流純成淨用故八萬四千金剛藏王常隨守護也魔有侵者即碎其首猶如微塵顯此呪力一念能碎堅固無明不假餘力故守護之功妙極於此是所謂妙圓密行也從前四卷中請入華屋以來至此總顯三觀之相竟三顯三觀之用分二初當機特請修證階差阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大眾一心佇佛慈音瞪瞢瞻仰次世尊特示迷悟因果分二初讚許爾時世尊讚阿難言善哉善哉汝等乃能普為大眾及諸末世一切眾生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說阿難大眾合掌刳心默然受教議曰此下問修證位次以顯三觀之用也謂約位次以顯三觀具有能斷能證之力用故乾慧地者謂欲愛乾枯根境不偶即天台信前五品觀行位也華嚴以信為行本三賢已前總依信位更不別開故通有四十二位此經備開十信故有五十五位以乾慧為最初之因涅槃為至極之果由初信至四加行故曰四十四心并前乾慧十地故成五十五也等覺乃因圓之果刳者剜物見空曰刳如所謂剗去知見也次正說分二初立一真法界如來藏性為生死涅槃因分三初直指一心佛言阿難當知妙性圓明離諸名相本來無有世界眾生二真妄因依因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號三即妄明真阿難汝今欲修真三摩地真詣如來大涅槃者先當識此眾生世界二顛倒因顛倒不生斯則如來真三摩地議曰因問修證位次先立一真法界為生死涅槃之因也妙性圓明本無眾生世界等者直指一心真源永離諸妄也以最初一念妄動因而有生因生遂有滅因有生滅則名為妄因滅生滅無生滅性則名為真真妄因依故有轉煩惱為菩提轉生死為涅槃二轉依號此凡聖二路皆由迷悟而立本非有也今欲真修返妄歸真不須別求但能識破眾生世界顛倒之因便是真三摩地矣豈更有別法哉在即妄以明真非捨妄以求真也二委示一心染淨熏成迷悟因果差別之相分三初約無明熏真如成染法為十二類生因分二二約真如熏無明成淨用為五十五位因分二三結指觀行圓證一心泯同果海成無上妙覺之果議曰此下十二類生約無明為染法之因也問曰阿難本問從乾慧地以至等覺五十六位修證次第而如來先答十二類生者何也答曰此經專依一真法界如來藏心為迷悟聖凡之本以其此心本無迷悟不屬聖凡又何修證之有但以最初一念妄動而有無明不思議熏變由此妄有顛倒之眾生若識顛倒之因則了生本無生由是故有二轉依號是知迷悟不出一心凡聖本乎一念今既以一念妄動而為十二類生豈不能以一念無生圓成五十七位要顯真妄因依迷悟一體故先指十二類生為發心之地捨此眾生別無修證之果矣故因問真修先示妄本元依一心轉變也此先約無明熏成染法故總標二種顛倒之因初中分二初總明眾生世界之本阿難云何名為眾生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸眾生議曰此總標十二類生之因也標中眾生二字應云二種以此八句總標故當雙舉後有別列故知二字之誤也由性明心此特顯一真法界妙圓真心以為迷悟因依之大本即前所云性覺妙明也性明圓故即前所謂若此不明名為覺者則無所明意有強明也因明發性者性乃妄相即前因明立所前之所字謂通含虗空世界眾生業果等相此乃單約眾生正報以明無明熏變生死之狀以為諸妄之本故但言性而不言相指體而言顯此眾生世界乃由無明熏變而起也故曰因明發性性妄見生者即前所妄既立生汝妄能謂由所發之妄相遂起能見之妄見此則眾生世界宛然而生死輪迴因之而立是從畢竟無而成究竟之有矣此有所有下四句顯妄無體也此有者無明也所有者眾生世界也非因所因謂無明與眾生世界本無所因與之為因也能住者眾生所住者世界謂此眾生世界全一虗妄了無根本則顯眾生世界之本無也謂一真法界本無所住之相本此無住之真建立眾生世界之妄法耳是所謂從無住本立一切法也前三種相續中世界的指外器世界此世界端指正報色蘊之身眾生乃四蘊之心所謂諸識合集名為眾生以前云使汝流轉生死速證安樂妙常同是六根更無他物故此二轉依果皆依眾生六根而立經意隱然而示三細六麤之相但就眾生顛倒身心以明從真起妄要顯妄元無因所謂達妄元虗即凡心而見佛故五十六位依十二類而立也二別名二種顛倒之因分四初眾生顛倒迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有眾生顛倒議曰此別示眾生顛倒也經文應有云何名為眾生顛倒一句錯簡在前迷本圓明下四句明妄依真起本無體也由迷本圓明湛寂之真心是生虗妄之妄相而此妄性無體非有所依但了妄無依則真常頓復不假更起修為也以眾生本空不容有心求復將欲復真纔有欲真之心則早墮生滅已非真真如性矣以一真界中不容起見舉心即錯動念即乖若以生滅心求復真常之性則真常之性亦成生滅故曰宛成非相所謂未出輪迴而辯圓覺彼圓覺性即同流轉矣以眾生本無何有生住生住尚無何有心法言生住該異滅言心法該身受意謂本無生滅眾生也今於本無之中而妄見有生住心法之眾生相故總言非但以無明生相未泯耳良由一念生相無明不覺展轉發生積久而愈有力由此生力發明故六麤相顯以無明不思議熏以成業性既因發業則有潤生故同業相感因此所感之業相滅相生由是故有眾生顛倒也生力發明即六麤中智相相續也熏以成業即執取計名字也同業相感則起業繫苦也若了無明本空則生死頓絕故指妄元無因為觀行之要耳二世界顛倒阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化眾生成十二類三示熏變之相是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復四示輪迴之狀分二初總列十二類生之名乘此輪轉顛倒相故是有世界卵生胎生溼生化生有色無色有想無想若非有色若非無色若非有想若非無想議曰此別示世界顛倒也是有者指無明妄心所有者指妄身以無明妄心依真而立本無分段但由吸攬四大外色而成根身則所妄既立明理不踰故分段妄生因此而有左右前後一定之界限故曰因此界立以妄心無體非有因為之所因妄身本空故無有住為所住之世界於無住中妄執為住故妄心生滅遷流不住遂形三世之妄相故曰因此世成由方世和合不思議熏不思議變故變化眾生成十二類是知十二類生皆由一念無明妄心之所熏變也是故世界下正示熏變之相以妄心住於妄身之中無明內熏憶識誦習之習氣猛發鼓動心體則妄有緣氣於中積聚假名為心故曰因動有聲然聲乃妄想風耳非外境也因此動念則隨其本習容現塵相故因聲有色則習境妄現因此妄境返熏自心故曰因色有香香乃妄境之氣分也因此緣氣返觸其心而心亦趣境故因香有觸心境相觸則綿著其味愛而不吐故曰因觸有味因此味著則知為法塵此總顯一念妄想由習氣內發而為六塵非外塵境故不次耳以此六亂之妄想熏成業性以為生因所熏不出身心之外故十二區分以為受生之果故下結云由此六亂妄想生滅不停是故眾生世界但以聲香味觸習染之六塵窮十二變為一旋復是知一念妄想則為十二類生之因所謂熏以成業不待更造而生死苦果念念隨之矣豈不痛哉下正示輪迴之狀以知見每欲留於世間業運每常遷於國土故曰乘此各具旋復輪轉顛倒相故是有十二類生之苦果此先列名也舊解卵唯想生故卵居首胎因情有故因次之溼以氣合而感化以離形而應其餘八類亦各以情想熏變而成此指眾生日用現前之情狀殆非約理而推也次別示十二類生之果分二初示行分十二一卵生阿難由因世界虗妄輪迴動顛倒故和合氣成八萬四千飛沈亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞議曰此卵生類也輪迴言生滅妄想也雖云四生受形之因各別大槩十二類生皆云妄想之所熏成何獨卵唯想生故列首耶細詳經意諸類通以六亂妄想為因始因一念妄動習氣內鼓而為妄想之本故曰因動有聲此召類之元也故今卵生則曰虗妄輪迴乃初起一念生滅心也認此動念為心故云動顛倒然以生滅為心以動為境故心境和合習氣內發妄有緣氣故云氣成生滅不停故云飛沈亂想因此而有卵羯邏藍此云凝滑以妄想吸此而成形故有魚鳥龜蛇之類是推妄想初起因動有聲約習氣熏變之始故列卵生居首非是眾生之初先有此類也第約情想偏重而言故以情屬胎其實卵生未嘗無情也皆有交遘豈非情耶二胎生由因世界雜染輪迴欲顛倒故和合滋成八萬四千橫豎亂想如是故有胎遏蒱曇流轉國土人畜龍仙其類充塞議曰此胎生類也欲習熏起故曰雜染輪迴欲顛倒以染欲相交故曰和合滋成情有偏正故曰橫豎亂想流愛為種納想為胎故曰胎遏蒱曇此云胞乃胎中二七之相也人畜龍仙胎生類也龍亦有卵生仙亦有化生蓋舉其重者而言也三溼生由因世界執著輪迴趣顛倒故和合煖成八萬四千翻覆亂想如是故有溼相蔽尸流轉國土含蠢蠕動其類充塞議曰此溼生類也附合習氣熏起故曰執著輪迴執著者謂希求附合也執取勢利妄生苟合如世之逐氣尋香趣勢附利故曰趣顛倒有氣𦦨處即便合之故曰煖成心無定向故曰翻覆亂想如世之翻雲覆雨之徒蔽尸此云軟肉蠢蠕受形之始也四化生由因世界變易輪迴假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞議曰此化生類也詐習熏起故曰變易謂附離而感望勢即變其所守失勢即易其本心假權貴而變姓名托勢利以為己有故曰假顛倒觸勢而變故曰觸成棄舊迎新故曰新故亂想羯南此云堅肉乃化生受形之始如鷹化為蛤𧏙蜋化蟬之類故云轉蛻飛行五有色由因世界留礙輪迴障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞議曰此有色類也凝習熏起故曰留礙此外道以日月星辰為父母故吸日精月華餐霞飲露以為修真養性心生固結而不化障蔽妙明故曰障顛倒凝想既久精光昭著故曰著成大而為日月星辰在物而為螢火蚌珠之類故曰精耀但以色相而顯故曰休咎精明之物類也六無色由因世界銷散輪迴惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沈其類充塞議曰此無色類也惑習熏起銷礙入空故曰銷散惑取虗無故曰惑顛倒昏昧無知故曰暗成幽潛神識暗昧心靈故曰陰隱無色羯南是為空散銷沈之類也七有想由因世界罔象輪迴影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞議曰此有想類也憶習熏起若有若無故曰罔象奉事神明邪著影像故曰影顛倒憶想神明潛結狀貌故曰憶成潛結亂想但由想成故為有想羯南或幽而為鬼神或昧而為精靈即今樟柳耳報之類也八無想由因世界愚鈍輪迴癡顛倒故和合頑成八萬四千枯槁亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞議曰此無想類也癡習熏起妄計無情有命金石堅牢固守愚癡故曰愚鈍癡顛倒頑成無知精神枯槁故曰頑成枯槁亂想如黃頭化石華表生精想至無情故曰無想九非有色由因世界相待輪迴偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞議曰此非有色類也偽習熏起遞相假待造作詐偽故曰相待偽顛倒習染成類因依求食故曰染成因依亂想如世之假造偽印書畫古器遞相聲勢或結連朋黨起滅詞訟騙財自活如水母無眼求食賴蝦原不露形故非有色相待色成形故成色羯南以妄想愈謬故生理愈乖因果感召固其然也十非無色由因世界相引輪迴性顛倒故和合呪成八萬四千呼召亂想如是故有非無色相無色羯南流轉國土呪詛厭生其類充塞議曰此非無色類也誘習熏起音聲相誘故曰相引習與性成故曰性顛倒即世之婬詞歌曲以聲挑引意在順情寄聲成事如相如琴心御溝紅葉并邪術詛呪之類故曰呪成呼召亂想假他色相故非無色藉聲誕形故曰無色佛戒比丘歌唱之處不許故往觀聽不許親習外道邪術正防微也十一非有想由因世界合妄輪迴罔顛倒故和合異成八萬四千迴互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞議曰此非有想類也欺習熏起非合而合罔冐欺人以為不知故曰合妄罔顛倒本非同體故曰異成誠恐人知故曰迴互亂想此即世之托孤繼嗣忘本父母而托他人或抱他子以為己子故感螟蛉之類以異質故非有想以相成故成想羯南十二非無想由因世界怨害輪迴殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞議曰此非無想類也恨習熏起故曰怨害由怨而害故曰殺顛倒子成而食其父母最為怪事故曰怪成鴟梟附塊為兒破鏡抱毒樹果為子塊果本無想而成想故云非無想相無想羯南破鏡鳥未詳舊解引史記祀百祠用土梟破鏡按道安法師檄魔文云梟獍競起是則鏡當作獍獸名孤山謂如貙而虎眼今經為鳥又非獍也俟再考之次結名是名眾生十二種類議曰妙淨明心離諸名相本來無有世界眾生是故世界眾生但因妄想而有也上約無明熏真如成其染法為十二類生之因竟
