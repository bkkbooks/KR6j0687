body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二色界四禪天分二初列示當界因果之相分四初禪三天分二初列示其相分三初梵眾天阿難世間一切所修心人不假禪那無有智慧但能執身不行婬欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵眾天議曰此下色界四禪十八梵天也梵者淨也以此諸天不知真修無漏但修欣厭禪謂厭下苦麤障欣上淨妙離名欣厭定以為正因此經專依斷婬而為次第未得真修故云不假禪那無有智慧但能執身不行婬欲而已若婬心不動於一切時想念俱無愛染不生謂不起愛心已伏欲界惑故無留欲界身為梵侶名梵眾天此梵民也二梵輔天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天議曰此初禪第二天也愛染已斷故云欲習既除初禪定心顯現故云離欲心現此結上行也於定共戒愛樂隨順防護不失淨戒成就能輔梵主名梵輔天此梵臣也此上二天修禪尚有尋伺三大梵天身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵眾為大梵王如是一類名大梵天議曰此初禪第三天也禪觀轉勝受生微妙故云妙圓戒德已成故云威儀不缺結上行也定能發慧故云加以明悟此則慧解超勝故能統眾而為梵王俱舍云威德光明獨一而住無尋無伺定力所感劫成先來外道不知遂執為常謂能生人為世間主三結示當天得名阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪議曰此結德立初禪名也已離欲界八苦故云苦不能逼以欣厭伏惑故云非真三昧已離欲染故心清淨已離欲散麤動故云諸漏不動初禪論名離生喜樂地初禪有五支謂覺觀喜樂一心以初心入禪名覺細心分別禪味名觀忻慶心生名喜忻悅心生名樂心與定一名一心已離欲界雜惡心得輕安此初禪行相也二二禪三天分二初列示其相分三初少光天阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天議曰此二禪初天也此天主梵故云統攝具戒定慧故云圓滿梵行結上行也此天定心增明故云澄心不動定光發越故云寂湛生光此天已離覺觀無有語言但以定心發光以光勝劣分位次喜相初生慧光初發故名少光二無量光天光光相然照耀無盡映十方界徧成瑠璃如是一類名無量光天議曰此二禪第二天也從前少光心光漸勝故云光光相然以境隨光淨徧成瑠璃光隨定徧名無量光三光音天吸持圓光成就教體發化清淨應用無盡如是一類名光音天議曰此二禪第三天也此天已離語言光能說法故云吸持圓光以為教體但見光明心即了悟宣流淨行故云發化清淨隨機開演故云應用無盡以二禪無前五識但用光明而為表詮以光為音名光音天二結示當天得名阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中麤漏已伏名為二禪議曰此結德二禪天名也已超欲界故云勝流極喜調適名定生喜樂地故一切憂懸所不能逼雖非真修離欲心中欲染麤漏至此已伏名為二禪此天有四支謂內淨喜樂一心以心無覺觀之渾濁故云內淨忻心自慶名喜恬然靜慮名樂澄心不動名一心三三禪三天分二初列示其相分三初少淨天阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天議曰此三禪初天也圓光成音乃前天行相也以光為教體表詮妙理今披光音顯發微妙故云露妙以所顯理發為妙行故云發成精行滅前喜相而生妙樂故云通寂滅樂初入此定故名為通始得此樂故名少淨二無量淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天議曰此三禪第二天也離諸喜動不著樂相故云淨空現前樂隨定徧故云引發無際徹意地樂故云成寂滅樂名無量淨天三徧淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名徧淨天議曰此三禪第三天也前雖徹意地樂止在身心未名為徧今則徧於依正世界身心無處不徧故云一切圓淨殊勝妙樂以成淨德故云淨德成就即此妙樂是所託處已證此樂故云歸寂滅樂名徧淨天二結示當天得名阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪議曰此結德三禪名也已離憂喜隨順勝定故云具大隨順得無量樂隨順自在樂極於此純一無雜故名畢具故此三禪名離喜妙樂地此有五支謂捨念慧樂一心捨二禪之喜名捨愛念三禪名念善巧解慧名慧愛樂安快名樂愛樂心息名一心四四禪九天分二初列示當界因果之相分二初當界凡夫四天分二初列相分二卐初凡夫天分三初福生天阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨麤重相滅淨福性生如是一類名福生天議曰此四禪共有九天今初天也然此地本唯三天於廣果中別開無想名外道天其五不還天乃三果聖流所居又是一類故有九天而分三種其福生等三乃凡夫所感實報天也復次下五句別前生後也俱舍論說第四禪離八災患者謂尋伺苦樂憂喜及出入息為八患也又不為三災所動故云不動地今云不逼即離前位苦也苦因下釋不逼之所以謂尋伺憂喜等是苦之因今既離之故無逼迫樂非常住者別明樂支前第三禪雖得徹意地樂樂必有壞故非常住壞即成苦故云苦生苦樂下正明此天苦樂俱捨以一一地皆云厭下苦麤障欣上妙淨離厭下苦樂故云麤重相滅欣上妙定故云淨福性生以離下染故云淨福二福愛天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天議曰此四禪第二天也以捨諸苦樂等法唯一捨心與定心圓融於捨心中決定忍可不為異緣引轉故云勝解清淨由勝解力於圓融定中愛樂隨順得無留礙受用無窮故云得妙隨順窮未來際問此有漏禪壽命有限何得窮未來際耶答此約得定壽報長遠動經劫數言窮未來非真無盡未來也三廣果天阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天議曰此四禪第三天也於福愛天中分二岐路一直往道即至廣果二迂曲道即至無想此標也若於下釋相若從發心以來不帶異計直修根本四禪離前地染故云無量淨光備歷四位至此福愛更增勝定故云福德圓明廣德所感名廣果天卐次無想外道一天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天議曰此四禪第四無想天也從福愛分出乃外道天以修四禪帶有異計故感報此天由前欣厭不已故云精研捨心相續不斷至福愛天徧窮捨道故云圓窮捨心既亡身心亦泯故云俱滅計此無想為涅槃也心慮下無想報也無想天壽五百大劫想心不行故云灰凝是人下判成虗妄也謂此天人初由不了不生滅心唯以欣厭勞累是以生滅為因也但見六識暫爾不行如冰夾魚不知微細生滅妄謂涅槃故云不能發明無生滅性初半劫下釋彼報行相準俱舍引婆沙論釋彼生死位中多劫有想初生此天經於半劫始入無想異熟名初半劫滅至無常時從異熟出最後半劫復有心生後始方死名後半劫生中間一向無想名無想天次結名阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪議曰此結德四禪四天名也此天離八災患勝前地故名不動地以有劫數壽盡還捨故云非真不動俱舍云然彼器非常情俱生滅凡夫修定味著受生名有所得以定慧均等能捨苦樂名功用純熟前三乃實報凡夫此名外道天次凡聖同居五天分三初總標因果總相阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心眾同分中安立居處議曰此標五不還天也此五天乃三果聖人所居不同凡外故別列之亦名五淨居亦名五不還天言下界等者二乘斷三界九地思惑九九八十一品成阿羅漢今那含乃三果人已斷三禪已下四地各九品惑種現俱無名為滅盡離欲界繫故亡苦離下三禪故亡樂已不續生故下無卜居此地名捨念清淨故捨心同分中安立居處二列示因果別相分五卐初無煩天阿難苦樂兩滅鬬心不交如是一類名無煩天卐二無熱天機括獨行研交無地如是一類名無熱天議曰此不還五天中初二名也前雖苦樂兩亡而欣厭尚存待心未泯今已滅對待故云鬪心不交以有對待覺識煩動無對待則無煩矣微煩曰熱唯一捨心故云獨行對境亦泯故云研交無地定障既寂心得清涼故云無熱卐三善見天十方世界妙見圓澄更無塵象一切沈垢如是一類名善見天卐四善現天精見現前陶鑄無礙如是一類名善現天議曰此五不還天中三四天也定慧圓明故云妙見圓澄定慧障亡更無塵象沈垢捨心圓明故名善見定慧功成故云精見現前陶鎔習氣不為留礙故云陶鑄無礙名善現天卐五色究竟天究竟羣幾窮色性性入無邊際如是一類名色究竟天議曰此五不還天中第五天也窮究至極故云究竟眾色極微故云羣幾色性性色之體也色以空為體窮至色邊際即入虗空故云入無邊際以究盡色際名色究竟天三結歎勝能阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間麤人所不能見次總結當界得名阿難是十八天獨行無交未盡形累自此已還名為色界議曰此結四禪天名也梵語那含此云不還以是聖人所居無漏定力殊勝故四禪天王有漏凡夫所不能見此十八天超越欲染一味定心故云獨行無交尚有色礙故云未盡形累三無色界四天分二初總示當界聖凡因果之相分二初列示分二初寄顯界外因果復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為迴心大阿羅漢議曰此標無色界從色界頂色究竟中分二岐路也一迴心羅漢即出界外二不迴心者即入空處以四禪通修捨定若於捨心發無漏智頓斷上地三十六品俱生煩惱便證無學仍又迴心向大乘道即不入空處名大阿羅漢蓋依色頂而修此定者也二正示界內因果分四初空處若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處議曰此標無色初天也此四天人無業果色有定果色依正皆然此乃定性聲聞與無想外道而來雜處皆無色蘊故名無色界皆依徧空修道初厭色依空二厭空依識三色空識等都滅而依識性四依識性以滅研窮而不得真滅是皆未出輪迴不成聖道者也前依捨心捨已成就但有色礙故消礙入空此厭色依空故名空處二識處諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處議曰此四空第二天乃厭空依識者也諸礙既銷躡前空處也無礙下名破空入識也銷礙入無則不依色無礙之無亦滅故不依空唯觀於識故唯留賴耶以末那為意根依內外門轉緣色空識三今六識已滅故不緣色空內緣八識見分為我故半分微細捨空依識名為識處三無所有處空色既亡識心都滅十方寂然迥無攸往如是一類名無所有處議曰此四空第三天也前天雖亡空色而存識心尚為所有今識心亦滅但依識性故十方寂然迥無所有名無所有處以識性幽緜行人至此以為極則非真究竟實生死本也四非非想處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處議曰此四空第四天也前未見識性尚有研窮今識性不動故滅研窮依湛不搖處以為究竟故云於無盡中發宣盡性識性現前故如存見相已泯故不存前七已消故若盡無明未破故非盡以不存若盡故非想以如存非盡故非非想也次結屬分四初結屬界外聖人此等窮空不盡空理從不還天聖道窮者如是一類名不迴心鈍阿羅漢二結屬界內外道若從無想諸外道天窮空不歸迷漏無聞便入輪轉議曰此總結名四空非真修也此等天人雖欲窮空但依欣厭未盡真空之理妄有取捨故非真修以此四天行人皆從色界五不還天并無想天而來若從不還不能頓斷上惑未出三界仍依無漏智斷消礙入空而生此天者名不迴心鈍根那含通稱羅漢也若無想外道與廣果天人能窮空者則來生此天若窮空不能銷礙是迷於有漏無所見聞於彼不來便入輪轉矣不歸不來也舊引經論釋無想外道業盡必墮是不來義也三結屬實報凡夫阿難是諸天上各各天人則是凡夫業果酬答答盡入輪四結屬寄位菩薩彼之天王即是菩薩遊三摩提漸次增進迴向聖倫所修行路議曰此結顯聖凡之別也其諸天天人皆凡夫業果酬答報盡必墜若諸天之王皆菩薩寄位遊戲出入諸禪三昧增進聖位以入菩提路也二別結當界得名阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界議曰此結無色界也此四空處色蘊既消妄想已滅故云身心滅盡有定果色名定性現前無業果色名無色界次總結三界之因此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沈溺補特伽羅各從其類議曰此略結三界虗妄也謂欲界已上由昔人中修因感果但不了妙覺明心雖欲修因其實積妄發生妄有三界之相未得真修報盡入輪故妄隨七趣沈溺永在生死故云補特伽羅各從其類梵語補特伽羅此云數取趣上明天趣竟七示阿脩羅道因果之相分二初標名復次阿難是三界中復有四種阿修羅類次辯相分四初卵生鬼趣攝若於鬼道以護法力乘通入空此阿脩羅從卵而生鬼趣所攝二胎生人趣攝若於天中降德貶墜其所卜居鄰於日月此阿脩羅從胎而出人趣所攝三化生天趣攝有脩羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿脩羅因變化有天趣所攝四溼生畜趣攝阿難別有一分下劣脩羅生大海心沈水穴口旦遊虗空暮歸水宿此阿脩羅因溼氣有畜生趣攝議曰此阿脩羅道也舊說非天謂有天名而無天德瞋習然也判屬天趣今經屬於四生非獨天也此言鬼趣所攝云從卵生未詳所以其與天爭權華嚴云與帝釋戰今云與梵王等且上界無瞋梵天無欲何爭之有此亦未詳其畜生趣攝者業報類也次總結虗妄阿難如是地獄餓鬼畜生人及神仙天洎脩羅精研七趣皆是昏沈諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒議曰此總結七趣之狀以答問義也七趣皆從無明發業所感故云昏沈諸有為相生因業果皆由妄想於妙明中本無所有如空中華更無根緒二結示迷悟因依分二初迷時妄有阿難此等眾生不識本心受此輪迴經無量劫不得真淨皆由隨順殺盜婬故反此三種又則出生無殺盜婬有名鬼倫無名天趣有無相傾起輪迴性二悟後元空若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不婬云何更隨殺盜婬事議曰此結三界轉變之相不識本心等妄想受生也隨順殺盜婬等妄想隨業也業因苦果有無相傾起輪迴性所謂迷時三界有也若得妙發三摩提等返妄歸真也以不識故沈生死若妙發三昧妙悟一心頓證三德祕藏妙常寂順次配般若法身解脫三德一心之圓證也有無二無則非生死無二亦滅則非涅槃此則妄因亦絕妄業頓空非此不足以絕輪迴也三結答問意阿難不斷三業各各有私因各各私眾私同分非無定處自妄發生生妄無因無可尋究議曰此結答問意也由前問云為有定處為復自然彼彼發業各各私受故此結云以不斷殺盜婬三業隨人別造故云各各有私別業同受故非無定處妄元無因故無可尋究四誡勗真修汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗偽如來說為可哀憐者汝妄自造非菩提咎五結指正說作是說者名為正說若他說者即魔王說議曰此結勸修也前云三緣斷故三因不生則汝心中狂性自歇歇即菩提故云要除三惑等言要必斷乃為真修也由前問云此道為復本來自有為是眾生妄習生起故此結云汝妄自造非菩提咎上精研七趣曲示迷中差別之相竟二詳辯陰魔曲示悟中差別之相分二初示五陰魔事分十二初世尊無問自說即時如來將罷法座於師子牀攬七寶几迴紫金山再來凭倚普告大眾及阿難言議曰此敘致下詳辯陰魔以示悟中差別之相也由初云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習故一往開示真修行法即以楞嚴大定通為五十五位真菩提路乃顯正悟而定中邪習邪悟猶未發明故判前七趣以明妄想是一而有七趣升沈之狀者特顯迷中差別之相也今此定中而有五十重陰魔者正顯悟中差別之相也前說定用直示真修而三乘人未經邪悟故非所知此是如來備歷境界且微細魔事非一切智不能明了亦無能問者故無問自說已前開示迷悟因果已圓故將罷法座有此未盡之意故再凭寶几普告大眾此最上深慈為最後教誨也二略示魔事因緣汝等有學緣覺聲聞今日迴心趣大菩提無上妙覺我今已說真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝子細分別阿難起立并其會中同有學者歡喜頂禮伏聽慈誨議曰此略示魔事因緣也諸三乘人迴心趣菩提者如前已說真修行法矣但禪定中微細魔事汝猶未識故須詳辯以防邪悟也若不說破恐魔境現前心中不明錯認為真如無聞比丘妄證謗法自取地獄故不得不為子細分別耳三示迷悟之本佛告阿難及諸大眾汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發徧迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂議曰將明動魔之由先示一真為迷悟之本也一真法界心佛眾生三無差別迷悟轉變不出此心虗空世界依之而立心本妙明良由一念無明妄想迷真背理故癡愛發生此言無明通為四惑之本也生相既發則全體皆迷故云徧迷空性依無明所變所謂迷妄有虗空也妄迷轉變而不已故云化迷不息有世界生所謂結暗為色依空立世界是則十方國土皆依妄想安立也真心至大故虗空生於妙心如片雲點於太清眇乎小矣況空中之世界豈不至微哉故今行人發真歸元無明一破則虗空消殞而空中國土無不振裂魔以暗昧為體世界為所依今國土振裂而魔宮必隳此實動魔之由也四示動魔之由汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚慴凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝議曰此言動魔致擾也上云發真歸元則虗空消殞今修禪定乃歸元之行也菩薩羅漢與能修人心精通㳷謂妄想既破心境一如無生體露故當處湛然虗空消殞而魔宮自振此實動魔之由也魔具五通有大神力魔以害善得名戀此欲境豈肯甘心令汝破壞其處是故於三昧中皆來惱汝理必然也五示悟則勝邪然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅冰煖氣漸鄰不日銷殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼羣邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定六示迷則邪勝若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中祇毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救議曰此言邪不勝正也魔依幽暗定心虗明故如吹光割水明暗二相了不相及故了不相觸明能破暗如湯消冰是從外來故如客邪不勝正故不能破壞以汝心迷故彼得其便但以禪那智照則魔自不容定力愈堅則魔不能擾以悟則勝邪若汝陰自迷故成就魔事以迷則邪勝且如摩登絕為眇劣彼假呪力猶但毀一戒況魔有大神力斷滅法身慧命破法王家固宜深防無令得便也七正陳魔事分五初色陰分三初當陰未破阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩提如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本議曰此示五陰迷悟之相以辯魔境也魔以幽暗為性陰以覆蔽為義由迷一真而成色心五陰葢覆真心是通以覺場而變為魔窟也是故眾生世界為魔所依今若返妄歸真必消此五陰身心以復一真之覺體是由一心迷悟故魔佛於是乎辯今以觀照研窮五陰將破未破之間而陰境隨心轉變以有積劫習氣化為種種境界所謂化迷不息也以唯心所現故悟則無咎以清淨心中纖塵不立一念纔著便墮魔類矣汝坐道場消落諸念等者乃初入禪觀照得力時也當住此處入三摩地是直心正念為定本也即於定中如明目人處暗正是色陰覆蔽之相區局也宇覆蔽也若色陰盡則十方洞開無復幽暗矣前劫濁依色陰而有劫者時也空為時初為色之體色陰一破則三際頓空故能越劫濁空晦暗中結暗為色故堅固妄想以為色本二示定境差別向下十段阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰將破而有十重境界也即前離念精明之中以觀精研妙明心體所有妄想融涉四大故交織不散今研心離色妄想不行故四大不織少選謂少時也當此不織則四大各離故身不拘心即能出礙但是精明流溢前境色陰實未破也功用暫得如是耳不作聖心則為功用善境若作聖解即受魔氣耳阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第二境界也復以前觀照精研心體心光內徹四大虗融洞然不礙故於身中拾出蟯蛔而身相不毀色陰雖未及破而色質已虗此特精明流溢形體暫時功用非聖證也又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞說法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第三境界也阿賴耶識所執受四大之身而在五臟各有所主隨得其名在肝曰魂在肺曰魄在脾曰意在腎曰志在心曰精神今以觀照研窮四大虗融五臟亦化魂魄無依故離身涉入互為賓主也由夙聞熏種子因定激發遂託神魂現說法聲也此乃精魂遞相離合非聖證也又以此心澄露皎徹內光發明十方徧作閻浮檀色一切種類化為如來於時忽見毗廬遮邪踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第四境界也以前觀心研窮身心皎徹色陰既融心光發明故現境界十方下所現之相以多生聞熏聖教名言習氣被定激發故見世界金色化佛說法蓮華等相以所染善種習氣故云靈悟以定力心光研窮明了照諸世界暫得如是非聖證也又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時徧滿不相留礙青黃赤白各各純現此名抑按功力踰分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第五境界也又以前定心精研妙明心體觀察不停則忽然虗空成七寶色五色純現者是謂寶覺明心無明未盡被定激發故現斯相此名功力逾分暫得如是非聖證也又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第六境界也以前定心研究澄徹精心發光從定中發故不動亂於夜暗室見種種物此非心光洞照但是心細密澄其見故視能洞幽非聖證也又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第七境界也前以定心虗融四大今以觀心圓入虗融又離於執受故忽同草木無知火燒刀割皆無所覺此名排四大性純入虗融暫得如是非聖證也又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明徧滿又見恒沙諸佛如來徧滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第八境界也以前定心研窮欣厭習氣內融故成就清淨內心既淨外器虗明成七寶色諸佛徧滿地獄天宮一時俱見得無障礙此名欣厭凝想日深隨想化成非聖證也又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪議曰此色陰第九境界也以前定心研窮深遠以真心本徧向為色礙故不遠見今以定力精研陰雖未破而心能遙遠見聞親戚眷屬皆隨習現此名迫心逼極飛出故多隔見非聖證也又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端說法通達妙義非為聖證不作聖心魔事銷歇若作聖解即受羣邪議曰此色陰第十境界也以前定心研究精極由昔經邪師聞熏邪種定研習變故見善知識形體變幻此由邪心含受邪魅或天魔入心無端說法非聖證也以定力愈深故魔事益盛故後四陰漸次深入理固然也三誡勗深防阿難如是十種禪那現境皆是色陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道議曰此結色陰將破十種禪那境界之相也故總指云皆是色陰用心交互若一念頓破根本無明五陰齊消則無此事今次第研窮習氣激發故云用心交互若迷而不識便言證聖墮大妄語今令宣示覺知魔事庶可保護成無上道也二受陰分三初當陰未破阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇議曰此示受陰未破之相也色陰盡者四大已消無復留疑觀心增明故諸佛心現於觀照之中如鏡現像然佛心無相而見現像者乃觀心所變緣影非真心也此有所得而未能用者蓋有含受之執故如魘人是名受陰區宇也若魘咎歇其心離身返觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本議曰此預示受陰盡相也受盡則無執受故心能離身身在心中故返觀己面四大已消無可執受故無復留礙見濁依受陰而有以見有根身可受領納執取故為見濁今受陰盡故能超之以含受虗明之相故名虗明妄想二示定境差別向下十段阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊蝱猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜議曰此受陰第一境界也以前觀心研消色陰故其心發明以見色消而用心太急內抑過分故發無窮悲此乃宿有悲種今被觀力激發故見蚊蚋猶如赤子此乃功用抑摧太過非聖證也不悟其非則有悲魔入心失正受矣阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祗一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜議曰此受陰第二境界也定中見色陰消則受陰明白見此勝相遂感激心生若感激過分則於定中生大勇猛志齊諸佛自謂三祗一念能超此名功用陵率過越陵謂陵蔑率謂自強非聖證也不悟其非則狂魔入心生大我慢又彼定中諸善男子見色陰銷受陰明白前無新證歸失故居智力衰微入中隳地迥無所見心中忽然生大枯渴於一切時沈憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜議曰此受陰第三境界也受陰未盡故無新證色陰已盡故歸失故居當進退兩難之間智力衰微中道隳頹心無所措故生大枯渴則以沈憶為精進相此名無慧自失非聖證也不悟其非則憶魔入心心如懸撮失正受矣又彼定中諸善男子見色陰銷受陰明白慧力過定失於猛利以諸勝性懷於心中自心己疑是盧舍那得少為足此名用心忘失恒審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜議曰此受陰第四境界也慧力過定失於猛利也以發勝性自心疑己是盧舍那妄以為足更不前進此名用心定少慧多故失恒審溺於知見非聖證也不悟其非則有下劣易知足魔入其心腑自言已得第一義諦故參禪須要定慧均等乃善用其心又彼定中諸善男子見色陰銷受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劍自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜議曰此受陰第五境界也當色消受明二際之間已失前心未獲新證如履懸巖自生艱險憂愁種子被定激發忽生憂惱欲早解脫此名修行失於方便非聖證也不悟其非則有常憂愁魔入其心腑失正受矣又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜議曰此受陰第六境界也定力研窮色消受明故身心安隱忽生歡喜自不能止此名輕安無慧自持非聖證也不悟其非則喜樂魔入其心腑此慧少定多不均之過也又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是㲲華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤眾生入無間獄失於正受當從淪墜議曰此受陰第七境界也色消受明定力研窮激發慢習故起諸慢謂恃己陵他高舉為性通稱我慢其慢有七稱量自他比校同德但稱為慢謂己獨勝名過慢於勝爭勝名慢過慢未得謂得名增上慢雖知卑劣返顧自矜名卑劣慢斥毀經像名邪慢總由慢習而發也故輕佛如來此名見勝無慧自救非聖證也不悟其非則有大我慢魔入其心腑失正受矣又彼定中諸善男子見色陰銷受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤眾生墮阿鼻獄失於正受當從淪墜議曰此受陰第八境界也以定研窮受陰虗薄定心精明於此定中圓悟精理理隨觀顯受不能障故云得大隨順身心調暢故忽生輕安將謂成聖得大自在此名因慧獲諸輕清非聖證也不悟其非則有好輕清魔入其心腑自謂滿足更不求進無聞比丘謂無多聞慧不達禪支妄生止足者也又彼定中諸善男子見色陰銷受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行婬穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜議曰此受陰第九境界也因前定力空慧現前受陰將盡得大明悟忽起空見故歸向永滅撥無因果遂生長斷滅見非聖證也不悟其非則有空魔入其心腑遂謗持戒破佛律儀以由定力內激邪見外引空魔失於正受又彼定中諸善男子見色陰銷受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行婬者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤眾生入無間獄失於正受當從淪墜議曰此受陰第十境界也受陰將盡內外虗明以此虗明將為勝境貪著生愛深入心骨愛極發狂便為貪欲者以定力激發貪習種子因而發狂此名定境安順入心以無慧照破遂誤入諸欲非聖證也不悟其非則有欲魔入心欲鬼所攝廣行婬欲及魔厭遭難必從淪墜三誡勗深防阿難如是十種禪那現境皆是受陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道議曰此誡勗深防也以定力精嚴無明未盡習隨定現故變現斯事理智未分故云用心交互迷而不識則墮大妄語誡令將如來語宣示末法諸修禪者早悟其相勿令天魔得其便也三想陰分三初當陰未破阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇議曰此言受盡想現之相也色受二陰既破則心無留礙故如鳥出籠從是凡身上歷菩薩六十聖位者如乾慧地欲愛乾枯根境不偶則能從是安立聖位雖後三陰未破而色受已盡離欲界繫無明雖在聖位可歷也言六十者連三漸次至妙覺也得意生身如羅漢山壁由之直度如意速疾故云無礙非地上三種意生身也以想陰未破故如人熟寐寱語以悟明圓理但未實證故如言已成音今參禪少有開悟未得大徹故但知解禪聞者雖悟而己實未了以落憶想窠臼乃想陰未破正此類也若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本議曰此預示想陰盡相也想相為塵識情為垢故想消如去塵垢想消行現故一倫生死首尾圓照以煩惱濁依想陰而有由妄想濁亂故想陰消則超煩惱濁以想能融通心生形取故云融通妄想二示定境差別向下十段阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明銳其精思貪求善巧爾時天魔候得其便飛精附人口說經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座說法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言災祥變異或言如來某處出世或言劫火或說刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第一境界也受陰已盡故不遭邪慮謂已離前十種境界故定力圓明激發貪習心愛圓明故云求巧乃精銳其思貪求善巧內心既著故外魔得便而飛精先附他人來求巧人前說法現種種相求巧之人信為菩薩口中好言者乃所說之事也此怪鬼本於貪習因而附人去則留難覺則無咎阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷爾時天魔候得其便飛精附人口說經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座說法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一眾聽人各各如是得未曾有是人愚迷惑為菩薩婬逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智消滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第二境界也定力研窮激發婬習以婬心浩蕩動亂身心故貪求經歷好行遊蕩故魃鬼本於婬習因而附人成就破壞也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛緜㳷澄其精思貪求契合爾時天魔候得其便飛精附人口說經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座說法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩緜愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第三境界也定力研窮激發詐習故心愛緜㳷貪求契合以詐偽欺人而欲求合故魅鬼本於詐習今年老成魔破壞定心又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析爾時天魔候得其便飛精附人口說經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座說法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絕都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第四境界也定力研窮想陰漸消行陰將現故定中愛窮根本物化始終貪求辨析蠱毒惡鬼本乎怨習以怨本深求今附人壞定蓋有因也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感爾時天魔候得其便飛精附人口說經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座說法能令聽眾暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛黏如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名厲鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第五境界也以圓定發明遂生懸應之心故貪求冥感引魔入心厲鬼本於瞋習雖與定境不類附必有由又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入剋己辛勤樂處陰寂貪求靜謐爾時天魔候得其便飛精附人口說經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座說法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後蹋尾頓令其人起不能得於是一眾傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒眾訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第六境界也以定力漸深故心愛深入想陰煩動今想漸消故樂處陰寂貪求靜謐謐深靜也內興邪念則外魔潛興故乘便附人言大力鬼即餓鬼也本於慢習又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命爾時天魔候得其便飛精附人口說經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座說法是人無端於說法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡冊符牘諸寄異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒眾不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣婬破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第七境界也以定中忽起一念好知見心貪求宿命故魔得其便是皆妄有希求忘失正行故招魔擾所謂忘失菩提心而修諸善根是謂魔業皆此類也山林等神本於誑習遇幽成形名為魘鬼又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便飛精附人口說經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座說法是人或復手執火光手撮其光分於所聽四眾頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙唯於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒眾訐露人事不避譏嫌口中常說神通自在或復令人傍見佛土鬼力惑人非有真實讚歎行婬不毀麤行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第八境界也以定中忽起愛神通心貪取神力故魔乘便附人以成破壞因愛神通故現神通之事山精等本於見習乃遇精成形名魍魎鬼又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化生貪求深空爾時天魔候得其便飛精附人口說經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座說法於大眾內其形忽空眾無所見還從虗空突然而出存沒自在或現其身洞如瑠璃或垂手足作栴檀氣或大小便如厚石蜜誹毀戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第九境界也以想陰漸破行陰將現故定中心愛入滅以行陰為生基故研究化性以貪求深空故魔現空事以破壞之休徵本於枉習貪明今麟鳳瑞徵為靈習使然也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細想常住爾時天魔候得其便飛精附人口說經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座說法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行累年不到因此心信疑佛現前口中常說十方眾生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見彌執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪迴迷惑不知墮無間獄議曰此想陰第十境界也定中忽起愛長壽心故貪求永歲已離欲界分段而頓希變易此妄想也細相常住以生滅細心為常住也故魔得其便以破壞之毗舍童子即毗舍遮食精氣鬼遮文亦其類也聽若妖魅若彼也前人所著之人也三誡勗深防阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正徧知覺讚歎婬欲破佛律儀先惡魔師與魔弟子婬婬相傳如是邪精魅其心腑近則九生多踰百世令真修行總為魔眷命終之後必為魔民失正徧知墮無間獄議曰此結想陰十種魔事也昔佛住世諸魔壞法佛神力故皆不能壞魔作誓言我於如來滅後依教出家破壞佛法佛即墮淚曰無奈汝何譬如獅子身中蟲自食獅子身中肉是知末世壞法比丘皆魔屬也九生九百年正法一千年此將盡時也一世三十年百世三千年末法之初正魔強法弱之時也汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信眾生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩議曰此勸留願弘宣以救末法也佛恩難報假使頂戴塵劫身為牀座皆不能報若不弘法畢竟無有可報恩者故宣佛語名報佛恩阿難如是十種禪那現境皆是想陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道議曰此結魔由叮嚀誡勗也以遵奉佛言則不墮魔網固宜弘宣以護行人也
