body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述四行陰分三初當陰未破阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恒一覺明虗靜猶如晴空無復麤重前塵影事觀諸世間大地山河如鏡鑑明來無所黏過無蹤跡虗受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二眾生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇議曰此示想盡行現之相也晝為想心夜形諸夢故想消則夢滅是以寤寐恒一心體本自圓明向為浮想煩惱覆蔽今想陰盡則圓明虗靜猶如晴空煩惱消則無麤重前塵影事八識精明之體照諸世間山河大地但如鏡中無別分析只以六識妄想暗蔽故曰想相為塵識情為垢故不明了今想陰既破六識已消故虗明之體如鏡鑑照不黏蹤跡雖有行陰生滅根元則無前六浮想習氣可入故云了罔陳習了絕也罔無也陳猶列也謂無習可陳故八識唯一精真而行陰微細生滅亦披露矣生滅下行現之相也行陰為同分生基想滅行現故十二眾生畢殫其類殫盡也各命由緒乃異熟種子其體深細故不能知而同分生基正是行陰之相今已披露故如野馬熠熠清擾野馬澤中陽燄也熠熠即閃爍之狀清擾行陰之相也已離想陰麤重故云清擾外浮根塵依為機紐故云樞穴樞門轉軸穴門臼也下示行盡之相若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超眾生濁觀其所由幽隱妄想以為其本議曰此預示行盡之相也以行陰乃八識體上生滅之相故云元性八識為湛淵之體唯一精明故曰澄曰一今行陰復歸元性則八識了無生滅故性入元澄如水無波瀾唯一止水名行陰滅以眾生濁依行陰有行陰既滅故能超之此陰所以不盡者以幽隱妄想而為其本也七識乃八識之見分幽深難知故云幽隱二示定境差別向下十段阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論議曰此示行陰第一妄計二無因也此先標其名定慧堅住故云凝明正心此想滅之相天魔依想陰有行陰乃見魔也想陰既消便得精研行陰窮生類本矣行陰已現則生元已露然此生元通依七識故云圓元以但見行陰就起妄計者則墮二無因論是知西天外道皆有禪定工夫但不知八識故起妄計耳一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有眾生業流灣環死此生彼祇見眾生輪迴其處八萬劫外冥無所觀便作是解此等世間十方眾生八萬劫來無因自有由此計度亡正徧知墮落外道惑菩提性議曰此示本無因也是人指修禪行人也以行陰現前生元披露故云生機全破乃乘眼根八百功德但見八萬劫來其中眾生業流灣環委曲輪迴生死之狀一一了知而八萬劫前冥然莫辯故妄計眾生從八萬劫來無因自有以未見藏識中異熟種子故妄計眾生本來無因故墮外道惑菩提性二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本豎畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因由此計度亡正徧知墮落外道惑菩提性是則名為第一外道立無因論議曰此示末無因也是人以定研窮既見生之根元則見人物有生受形之始八萬劫來無復改易妄謂前既不改而後亦不易謂人定生人鳥定生鳥不改別類以我本不見有菩提云何末後更有成菩提事由執本無因故執末亦無因故結云皆本無因且以末因又為後因之本也此第一計阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四徧常論議曰此示行陰第二計四徧常也以行陰乃八識體中微細生滅之相今以定力研窮以見生滅相續不斷故於圓常中起四徧常論實妄計也一者是人窮心境性二處無因修習能知二萬劫中十方眾生所有生滅咸皆循環不曾散失計以為常議曰此示初徧常計也以行人於禪定中窮心境二法故能執至二萬劫中眾生生滅循環而體不散失以不出生滅故計為常二者是人窮四大元四性常住修習能知四萬劫中十方眾生所有生滅咸皆體恒不曾散失計以為常議曰此示二徧常計也以行人定中但觀四大性故能知四萬劫中眾生生滅體常以四大乃八識相分今八識未破故四大未消眾生皆以四大為體四大常而眾生亦常矣三者是人窮盡六根末那執受心意識中本元由處性常恒故修習能知八萬劫中一切眾生循環不失本來常住窮不失性計以為常議曰此示三徧常計也梵云訖栗瑟吒耶末那此云染汙意乃七識也執受者乃八識也今行人以定力研窮六根以至末那執受者通言八識故云心意識中本元由處至此行雖未盡而識性已顯故云性恒常處故能知八萬劫中眾生本來常住以眾生各各皆具八識以八識體常而眾生亦常矣以窮不失性故四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常由此計常亡正徧知墮落外道惑菩提性是則名為第二外道立圓常論議曰此示四徧常計也生理乃行陰也行人定中一向但窮妄想以為流止生滅今麤浮想陰已滅而微細行陰一類相續不斷故妄謂生滅已滅則此行陰自然成不生滅矣乃以生滅為不生滅故妄計為常由此忘失菩提故墮外道四圓常論也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論議曰此示行陰第三計四顛倒一分無常一分常論也以七識執第八見分為我故或執我能生他則我常他無常或執我從他生則他常我無常故云於自他中起計是一分常一分無常一者是人觀妙明心徧十方界湛然以為究竟神我從是則計我徧十方凝明不動一切眾生於我心中自生自死則我心性名之為常彼生滅者真無常性議曰此示四倒見中第一計也觀智研窮妄想已消則八識精明徧十方界以不知是識體精明遂執為神我從此計為我徧十方一切眾生於我心中自生自死則我心性為常彼生滅者真無常性此單觀自也二者是人不觀其心徧觀十方恒沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常議曰此示四倒見中第二計也此人定中不觀自心但觀十方國土見劫壞處名究竟無常劫不壞處名究竟常此單觀他也三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性議曰此示四倒見中第三計也是人定中觀自心微密流轉十方性無改易故稱為我今在色蘊之中能令此身即生即滅其不懷者是我心性名我性常一切生死從我流出名無常性此自他共觀計自常他無常也四者是人知想陰盡見行陰流行陰常流計為常住色受想等今已滅盡名為無常由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論議曰此示四倒見中第四計也定中觀四陰先後今見行陰遷流相續不斷計為常性見色受想三陰已滅名無常性此合觀四陰起一分常一分無常計也此皆不了妙明故云惑菩提性又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論議曰此行陰第四計四有邊論也以定研窮想陰盡處行陰現前有四分位計為有邊無邊一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊議曰此行陰四有邊中初計也定中研窮見行陰現今流注不息過未不見名為有邊現相續心名為無邊此約三世分位也二者是人觀八萬劫則見眾生八萬劫前寂無聞見無聞見處名為無邊有眾生處名為有邊議曰此行陰四有邊中二計也定中觀八萬劫前無見聞處名為無邊見有眾生處名為有邊此約見聞分位計也三者是人計我徧知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性議曰此行陰四有邊中三計也定中見我之知徧一切處一切眾生現我知中是我得無邊性也彼眾生之知不見現我知中以彼未得無邊之心但有邊性耳此約彼此分位妄計也四者是人窮行陰空以其所見心路籌度一切眾生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊由是計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論議曰此行陰四有邊中四計也以觀研窮取行陰空以空處名滅見處名生即計一切眾生身中一半是生一半是滅世界亦然以現見處名為有邊以不見處名為無邊此約生滅分位計也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂徧計虗論議曰此示行陰第五計四種不死矯亂論也長水引婆沙論說外道計天常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂故有問時答言祕密不應皆說或不定答佛法呵云此真矯亂以於知見中不能決擇故有問者矯智亂答故云不死矯亂一者是人觀變化元見遷流處名之為變見相續處名之為恒見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句議曰此行陰四矯亂中初計也觀照研窮生滅根元故云觀變化元於一行陰生滅中別見八義謂常變生滅增減有無不見見者謂見不見之處也以理總觀變化之心用心別見生滅等八義故計以為宗有人來問則答云亦生亦滅等約八義以答以無定見故據兩楹令彼問人不得道理無決定見故云遺失章句二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言說議曰此行陰四矯亂中第二單計無也以觀研窮行陰生滅但見念念滅處名互互無遂計為無諸法皆然故云因無得證故有人來問但答云無之一字而已三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說議曰此行陰四矯亂中第三單計有也以觀研窮行陰生滅念念生處名各各有因是得證一切皆有故有人來問但答云是以雖觀生處名有且又見滅故不敢正言有但答是之一字擬防過也四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂徧計虗論議曰此行陰四矯亂中第四雙計有無也以觀研窮行陰生滅二相故雙計有無以其境枝不一故其心亦亂有人來問答云亦有即是亦無者意許亦有之中即有於無以見生即滅故亦無之中不是亦有者以見滅處不許有生謂無中不敢言有以此有無互相遮防故云無容窮詰總是妄計本無一定道理故云矯亂徧計虗論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒議曰此示行陰第六計死後有相起十六見也無盡流行陰也今見行遷不息都執死後有相以行為我故或自固身云色是我即色是我或見我圓含徧國土云我有色我大色小色在我中或彼前緣隨我迴復云色屬我離色是我或復我依行中相續云我在色色大我小我在色中皆計度言死後有相如是循環有十六相議曰此見行陰無盡故執死後有相初本計也自堅固色為我等有四而後三陰亦然今觀行陰為無盡流例觀前三亦皆無盡故計死後有相成十六相也以色陰已破亦同行陰無盡故自固身此計即色是我也或計我圓徧云我有色即我大色小色在我中也前緣即目前之色也色屬我即我離色別有我也行中相續云我在色即色大我小我在色中於色陰中作此四計於受想行陰亦復如是四陰共成十六相也從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論議曰此因計四陰死後有相故別計煩惱菩提不相陵奪兩性並驅畢竟後有例如四陰蓋顛倒論也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒議曰此行陰第七妄計死後無相也以觀研窮見前三陰已滅即知行陰亦滅故計死後無相見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相四陰因亡果喪從此或計涅槃因果一切皆空徒有名字究竟斷滅由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論議曰此約四陰現在因亡未來果喪故成八無相此便計涅槃因果一切皆空成斷滅見顛倒論也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論議曰此行陰第八妄計死後俱非相也於行存中兼受想滅雙計有無謂將已滅三陰例現存行陰作四箇非有句又將現存行陰例前已滅三陰作四箇非無句前後相望每陰皆有非有非無成四俱非現在既爾死後亦然故成八俱非相色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相議曰此出八相俱非所以也色等三陰先有今無例行亦爾此四非有也行遷流內觀無不無者謂若將行陰例前為無且今現見遷流不斷故又非無行既非無前三亦爾此四非無也如是循環窮盡陰界者現將四陰循歷相例一一皆見非有非無故云循環惟至死後故云窮盡陰界八俱非相隨得一緣謂隨舉一陰死後皆悉非有非無也有相即非無無相即非有又計諸行性遷訛故心發通悟有無俱非虗實失措由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論議曰此四俱非中別計也以觀四陰有無俱非故計諸行性遷訛故通悟一切皆是非有非無以非有無虗實不定故云失措以現前有無不定況死後昏瞢何可道耶特顛倒見耳又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論議曰此行陰第九妄計七斷滅也以觀行陰念念生滅處名後後無設生七處後皆斷滅七處者身滅人天也欲盡初禪也苦盡二禪也極樂三禪也極捨四禪及無色也是名七際謂七處皆現斷滅死後不復生也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論議曰此行陰第十妄計五涅槃也以觀行陰滅而復生名後後有妄計五處為涅槃果或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪迴生滅性故迷有漏天作無為解五虗安隱為勝淨依如是循環五處究竟由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論議曰此計五涅槃相也轉依者轉生死依涅槃也未離欲界於觀心中見圓明相即以欲界為轉依處或以初禪已離欲染無復憂心二禪離苦三禪極喜四禪苦樂二亡名為極捨以此五處即轉依處謂五現涅槃因修禪定得少輕安不知現在有漏便妄執為涅槃三誡勗深防阿難如是十種禪那狂解皆是行陰用心交互故現斯悟眾生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄議曰此結行陰十種狂解也以上十種皆是邪見因修禪定而發邪見故云狂解於生滅中妄起計度理觀不明故云交互汝等必須將如來語於我滅後傳示末法徧令眾生覺了斯義無令心魔自起深孽保持覆護銷息邪見教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指議曰此勸弘宣也前想陰中所引外魔故云天魔此行陰微細皆於定心自生邪見故云心魔乃自作災孽非外來也故令弘宣保護預知覺察不墮邪見故云不遭枝岐枝非根本岐非正路離此可至究竟安隱之處也五識陰分三初當陰未破阿難彼善男子修三摩提行陰盡者諸世間性幽清擾動同分生機倐然隳裂沈細綱狃補特伽羅酬業深脈感應懸絕於涅槃天將大明悟如鷄後鳴顧瞻東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沈發現幽祕此則名為識陰區宇議曰此明行盡識現之相也世間性謂行陰為世間生死之體也以眾生生死皆依行陰生滅故為同分生機前言基乃其本今言機乃樞機也謂此行陰最極深沈微細網羅諸趣結不可解故云綱紐今以定力研窮頓破故云倐然隳裂補特伽羅云數取趣十二類生由行陰所取今既隳裂則因亡果喪不受後有故云酬業深脈感應懸絕是知能滅行陰則永脫分段生死矣此行陰盡也五陰黑暗覆涅槃天為生死長夜今四陰已破故如天將明鷄後鳴則將明之時也識陰精明故如東方精色行陰既盡意根已銷則六識無體故六根虗靜不馳內照識體通一湛明湛入合湛更無可入故云內外湛明入無所入識陰乃十二類受命元由至此深達但觀識性執持根元習氣不行新業不起無受生分故云諸類不召十方世界十二類生身心世界唯識變現今觀歸識性故云已獲其同識精現前不昧故云精色不沈識體幽祕今以觀力研窮朗入觀境故云發現此則名為識陰區宇以但識陰顯現而未破故云區宇若於羣召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠瑠璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本議曰此明識陰盡相也羣召同中即識體之中若於此中以觀力研窮向以六根隔礙今則銷磨六門合成一體開其留礙使見聞覺知互相為用則六根清淨鈍一圓明清淨寶覺故身心世界如吠瑠璃內外明徹名識陰盡以命濁依識而立今識陰一破故超命濁罔象虗無謂似有若無乃法身之影明指最初生相無明以為識體也二示定境差別以下十段阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見是名第一立所得心成所歸果違遠圓通背涅槃城生外道種議曰此識陰初妄計也行陰已空故返識還元無明未盡尚有微細流注故於寂滅精妙未圓觀照圓明能令己身六根向隔而今合開但未全互用觀十方諸類唯識所現故覺知通㳷能入圓元覺性此特觀照之力未為究竟若於所歸之地便妄立為真常之因於此生決定解者是人則墮因所因執謂因識陰執為真常為萬法之因故云因所因以世間萬法因妄有生妄本無因故說無生今執定此識能生萬法則與外道所執冥諦無異矣以娑毗外道執冥初主諦從冥生覺等二十五法故以冥諦為生法之因非因計因謬起斯計故亡正知見是皆計有所得心為所歸地故違背涅槃成外道種故參禪人但存絲毫知見未亡便成外道邪見況妄計乎阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有眾生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我徧圓種議曰此識陰第二妄計也以觀照研窮行陰雖空而於寂滅一心未能圓悟若於所歸識性覽為自體以見識性圓滿徧虗空界則計十二類生從我身中一類流出以為決定如此則墮能非能執其實不能而妄計為能故云能非能摩醯首羅大自在天也外道計大自在天為常能生諸法現無邊身者執我身能現無量眾生也因既能為果成能事非正知見故違背涅槃成我徧圓種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沈迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種議曰此識陰第三妄計也所歸即識體也前覽所歸為自體今認所歸為他體故疑自身及一切法從彼生起故以識為都宣流地計為真常無生滅解尚在生滅便早計為真常不達真無生意且以生滅為不生故云既迷不生亦迷生滅二俱不識堅執不捨故安住沈迷以非常計常故云常非常執既計彼能生我便與計自在天我能生彼者類也因依識陰非果計果故云妄計果計生滅為不生故云倒圓又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知徧圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇徧知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種議曰此識陰第四妄計也所知乃所觀識陰也以觀識體圓徧其十方草木皆唯識所現不達此義遂妄計草木有知與人同體不揀有情無情故云無擇徧知以為決定此人則墮知無知執婆吒霰尼二外道名也計一切覺即草木有知故成其類妄計無情有知故成虗謬果為倒知種也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此羣塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種議曰此識陰第五妄計也以觀照研窮六根雖未及互用已得隨順四大漸融妄謂圓化一切發生遂計四大為常能成聖果故各各崇事以四大為常住解能生勝果其四大性實不能生妄計能生故云生無生執三迦葉波事火外道之儔也既迷唯心妄從物立因果顛倒化理故云顛化種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種議曰此識陰第六妄計也以觀照研窮觀識性虗明即於此中見前四陰已滅則一切永滅故云非滅羣化非絕滅也即計永滅為所歸依執決定見此人則墮歸無歸執斷滅非所歸地故云歸無歸執此即無想外道與四空成其類也舜若多空也此執圓虗無心斷滅為因故成空亡果為斷滅種也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種議曰此識陰第七妄計也以觀識陰圓常故欲固色身同於識陰妄求長生故云長不傾逝以色身無常本不當貪而妄貪長生故云貪非貪執謂貪其不當貪也阿私陀云無比乃長壽仙也固執妄識為因趣長勞果舊解勞作牢固之牢妄執延年故云妄延種又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵努恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種議曰此識陰第八妄計也識陰為十二類生受命元由今觀此識故見十方眾生之命彼此互通由此遂生妄計謂我命若盡則眾生之命亦盡即教誰證真常誰化眾生故留塵勞多增欲樂圖命久住以證真化物故起惑恣欲實非證真故云真非真執吒枳迦羅舊未詳釋意必魔王天名也以定中忽起邪思為因立熾塵果故生天魔種也又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精麤疏決真偽因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種議曰此識陰第九妄計也以觀照研窮以識體為精真以惑業為麤偽精麤二種因果相酬故修精真之因求感精應之果故見苦斷集慕滅修道也今既得滅便已為休得少為足更不前進此人則墮定性聲聞及四禪無聞之儔未得謂得為增上慢此以圓精應心成趣寂之小果沈空滯寂故云纏空種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不迴心者成其伴侶迷佛菩提亡失知見是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不能圓種議曰此識陰第十妄計也覺明即識精圓明而此識體四陰已消此亦將破無復麤垢故云圓融清淨於此研窮便為深妙立為涅槃此妄計也是人則墮定性辟支諸緣覺獨覺之類認識陰為圓覺合妄計為㳷心寂然不動未破無明故云湛明果捨生自度故不化圓種三戒勗深防阿難如是十種禪那中塗成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位眾生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進議曰此通斥妄計也以將破識陰而未極妙圓似覺未覺便生邪計故云中途成狂不了識陰妄生止足故云因依迷惑淺者為外道邪魔種深者墮二乘地八敕令弘宣汝等存心秉如來道將此法門於我滅後傳示末世普令眾生覺了斯義無令見魔自作沈孽保綏哀救消息邪緣令其身心入佛知見從始成就不遭岐路議曰此敕令弘宣也以識陰中魔皆依妄見故云見魔自心取著自壞真修故云自作沈孽非此法門不能保綏哀救消息邪緣入佛知見也心外取法故云岐路九諸佛同證如是法門先過去世恒沙劫中微塵如來乘此心開得無上道議曰此示諸佛同證也謂無有一佛不破識陰而得菩提者十陰盡功圓識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨瑠璃內含寶月如是乃超十信十住十行十迴向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得議曰此示陰盡圓證功用也從互用中即入金剛乾慧者此言識陰一破則不歷諸位一超直入圓證佛果所以然者以如來藏清淨真心本無迷悟但因一念妄動是為生相無明不生不滅與生滅和合成阿賴耶識變起色心諸法而成五陰之眾生今返妄歸真乃以金剛如幻三昧直觀八識根本無明即轉生死而為涅槃故不歷諸位一念頓證無上菩提此乃上根利智如觀音耳根圓通生滅既滅寂滅現前忽然超越世出世間故今識陰一破則六根互用從互用中即入菩薩金剛乾慧是則但破生相無明便成佛果不必定歷諸位也是知五陰次第未必一一經歷但約觀心通途故須一一開示耳故識陰盡者圓明精心於中發化此即上同諸佛慈力下合眾生悲仰普門示現利益眾生故云發化以身心世界諸佛眾生圓融交徹故如淨瑠璃內含寶月便能頓超諸位入於果海歸無所得如此方名究竟極則也十一先佛授受此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶議曰此言先佛授受心法以示行人也以三觀乃佛佛成道之本定中魔事乃先佛所經非今特說故須諦信也令預識魔事則魔境現前則不落邪見魔氣銷滅即可直至菩提心不迷悶有此大益故須弘宣十二重示密修若諸末世愚鈍眾生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂范議曰此再示密修功用也愚鈍眾生不知說法有修禪者恐遭魔擾則教一心持我佛頂神呪此是諸佛心印仗斯呪力則魔不能動此外無可降魔者唯此法門乃十方如來究竟修證出世密因實如來最後之垂範汝宜恭欽宣布以利將來作大法益也前明五陰魔竟二示五陰妄想分二初當機請問阿難即從座起聞佛示誨頂禮欽奉憶持無失於大眾中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界惟願如來發宣大慈為此大眾清明心目以為末世一切眾生作將來眼議曰阿難因聞從前開示五陰皆依妄想安立未知妄想以何為本上言破五陰相且五陰相不知頓漸次第亦不知五陰以何為界總伸三問冀佛最後開示也二世尊委示分五初總示妄元佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是眾生妄心計度阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者是故如來與汝發明五陰本因同是妄想議曰此總示五陰皆以妄想為本也將明妄想先立一真法界以為妄本故曰精真妙明本覺圓淨謂精真妙明本覺真心本來圓滿清淨中不留他故云非留死生及諸塵垢言其本來一法不立何有五陰差別之相其虗空世界眾生業果等事皆因妄想生起元從本覺妙明真精妙心中妄以發生世間諸相如演若迷頭認影之事無狀狂走故曰妄元無因以自妄想發生遞相為種故於妄想中立因緣性已是迷矣且迷因緣者又稱為自然豈非更迷哉故云皆是眾生妄心計度本非有也若知妄有起處可說因緣今妄元無則因緣無有何況又推自然耶迷之甚也由是與汝發明五陰同是妄想欲令了悟本非有耳二別示五陰本因分二初列分五初色陰汝體先因父母想生汝心非想則不能來想中傳命如我先言心想醋味口中涎生心想登高足心酸起懸崖不有醋物未來汝體必非虗妄通倫口水如何因談醋出是故當知汝現色身名為堅固第一妄想議曰此示色陰妄本也汝身非有初因父母妄想交遘汝心乘此納想為胎乃為色身之始汝心非想何來想中傳此命根是則汝身蓋因父母與己三處妄想和合而成然想雖虗妄而能成事如我先說想梅思崖口水足酸因之而出故妄想雖虗而實有酸水因知汝身從妄想有亦猶是也是故妄想凝結而成此身名為堅固第一妄想也二受陰即此所說臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想議曰此示受陰妄本也汝受非有但由虗想臨高而明受酸澀能動色體則可驗知違順損益苦樂二受皆因虗明妄想而有也三想陰由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想議曰此示想陰妄本也身為四大本屬無知但被妄想念慮所轉故心生形取與念相應即寤寐夢覺皆是妄想搖動妄情是皆妄想融通一身是故身以妄想為主也四行陰化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想議曰此示行陰妄本也行陰本無但由汝心生滅不停故使汝身遷流不住化理下六句通言行陰微細幽隱難知之相此若非汝下四句辯妄無體也行若非汝則何能遷體若實是汝何以不覺求之不得則知諸行念念生滅不停者名為幽隱妄想也五識陰又汝精明湛不搖處名恒常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想議曰此示識陰妄本也識陰本非有也元是真精妙明心體但受妄想熏習葢覆真性故名識耳然此識體元是真精湛不搖處在此身中不出見聞覺知皆識之用也若此識體果實是真則不容習妄以不受熏乃可名真如何昔年曾覩奇物久而不忘豈非熏習使然耶以此而推則汝所指精了湛不搖中念念受熏有何籌算如此安得為恒常耶故汝所執之湛非真湛寂第以微細流注生滅汝不覺知如急流水望之似恬以流急不見非是無流則汝識體若非想元寧受妄習今既受妄熏則非真常恒一矣若得此識純真非汝六根互用則此妄想無時得滅豈可以妄想所熏之識便以為真故汝現在見聞覺知麤現於外而其中有串習幾微生滅之相於湛了內似有若無不能窮詰者正是罔象虗無微細精想以為識陰之體由是觀之五陰皆以妄想為體妄想無體則陰非有也二結阿難是五受陰五妄想成議曰此結示五陰皆妄想成也此五即是眾生受報之地故通名五受陰又名五取蘊乃補特伽羅所數取故上答五陰本因三示陰界邊際汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際議曰此答二問因界淺深也因即界義亦是分義因依界分際分各別故云因界色謂形色空謂顯色俱色蘊攝唯色與空乃色邊際觸有違順離無違順唯一捨受三受乃受之邊際記憶與忘乃想邊際生滅四相乃行之邊際湛入合湛者湛乃八識之體所謂湛兮似若存以生滅乃從湛流出今旋歸妙湛故云湛入合湛為識之邊際也四示迷悟頓漸此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問議曰此答三問頓漸也以此五陰最初生起從阿賴耶識變起見相二分以此色心二法和合而成五陰之眾生故云生因識有今返妄歸真先破色陰後破識陰故云滅從色除若依圓理一念頓悟不歷漸次頓登佛地故云乘悟併銷但歷劫無明習氣須一一研窮故云漸除須因次第而盡如前所示巾結同異結解次第何所不明今再問耶此結責也五結勸修持汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界議曰此結勸也一切世界妄想所持今知五陰身心同一妄想則一切無非妄想建立若了妄想無性則身心世界當下銷亡有何涅槃之難證又何三界之可戀哉是故將此妄想根元傳示末法令知修行之要也前正宗分竟三流通分分四初較量功德阿難若復有人徧滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不議曰此勸流通先較功德令生信重也十方虗空廣大之處充滿七寶能施之多微塵諸佛所奉之眾心無虗度立心之堅如此殊勝獲福豈可思議哉二獲福殊勝阿難答言虗空無盡珍寶無邊昔有眾生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充徧皆施珍寶窮劫思議尚不能及是福云何更有邊際議曰此答供佛獲福殊勝也施七錢而感輪王之報所施者少所報者大況以滿空無盡之七寶以奉至極之如來如此之福豈可得而思議耶三總顯勝益佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及阿難若有眾生能誦此經能持此呪如我廣說窮劫不盡依我教言如教行道直成菩提無復魔業議曰此以厚施之福極重之罪總校不若弘法之勝益也四重十重之罪阿鼻極重之苦窮盡十方之廣此罪此苦不可思議矣若能以此法門一念開示末法則令前重罪頓銷苦具變成樂國足知此法之勝益也不唯滅罪又且獲福超前布施之人不可算數之倍者何其法之殊勝耶良以圓頓法門一念熏修即得無上菩提之果故此經說如來藏性功德無窮呪乃諸佛心印印持無盡顯密雙修成佛真要故說不能盡若依教修行直成菩提無復魔業是謂最勝法門也故弘宣之功不可思議矣四都結法會佛說此經已比丘比丘尼優婆塞優婆夷一切世間天人阿脩羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去議曰此結法會也以如來最極之至聖集凡聖同居之法會現無量光明之瑞相演祕密難思之神呪說微妙難解之法門斷歷劫生死之愛根銷五陰邪思之魔業得見所未見幸聞所未聞所以皆大歡喜也楞嚴通議補遺明南嶽沙門憨山釋德清述首楞嚴一經統收一代時教迷悟修證因果徑斷生死根本發業潤生二種無明名結生相續頓破八識三分故設三種妙觀攝歸首楞嚴大定是為最上一乘圓頓法門直顯一真法界如來藏性稱為妙圓真心據此大定列為三觀者以如來藏有三種義謂空如來藏不空如來藏空不空如來藏由此藏性迷為阿賴耶識變起見相二分藏性在識名自證分由本性不染名白淨識為證自證分按論真如生滅二門此證自證分即是真如其自證分即迷中本覺見分即前七轉識相分即虗空四大在外為世界山河大地及五塵境在內為根身為有執受五蘊之色受二蘊見即七識意根及六意識及前五識與同時分別意識今修楞嚴大定端在直破八識但此識體久迷由相見二分結為五蘊根身及外世界五塵為分別俱生麤細我法二執以執五蘊根身為我執貪外五塵為我所受用及計有所作為法執由此二執纏緜生死故今願出生死先破二執為最初方便也故阿難特請妙奢摩他三摩禪那為成佛之要佛特許以三摩提名大佛頂首楞嚴王此乃歷別而請佛據一心圓融大定而說也是知此經始終不出三觀究竟不離一心耳其經文雖未明言指歸其於破顯之文皎然明白第流通者未之究耳三觀者經妙奢摩他即當空觀三摩即假觀禪那即中道觀也皆云妙者意顯圓融三觀妙契一心舉一即三言三即一離即離非迥出思議之表也今議此經通以體相用標顯者意在先悟後修故首標觀體欲令先悟藏性三諦理體依之建立觀相所謂先悟毗盧法界也次示觀相者意謂無相真心今全迷為識結成五蘊根身器界有相之法要在即相而修故修道文中單指五蘊六根次即三科七大一一皆是悟入之門也證果分中以觀用標者正顯所修三觀有能斷能證之力用也故愚所謂始終不出三觀者此也問曰三觀以體相用分之者何也答曰名雖三觀為約如來藏三諦之理須以三觀證之其實總是一心故佛以首楞嚴大定許之意謂三觀不離一心也按起信論云有法能起摩訶衍信根所言法者謂眾生心是心總攝一切世間出世間法故不名心而名法然有法必有義以體相用三為一心之義所謂三大是也以此真心其體廣大故言體大以此本來無相今現十法界依正因果事相皆是有相之法故相亦大以迷此心而成六凡悟此心而成四聖皆一心轉變之妙用也故用亦大謂令先悟此心之體佛謂開示此體以便造修故首明觀體也既悟此體了知根身器界一切妄相皆依一心建立今將所悟之體一一照破妄相本是妙明真心故修但依妄相而修故云觀相正當修道之要也其五十五位皆依觀心建立要顯此三觀有能斷惑證真之大用故為三觀之用也以論勘經明文昭著妙契佛心故予判列無疑以見如來說法之本意且與行人易入也問曰三觀體中攝經三卷半文且空觀一科即該三卷經文至若三科七大本如來藏似顯空理其初以徵心辨見發揮以至二種妄見種種徵辨者主何意耶答曰此經純收五教即此一空觀體備該五教空理徹一代之談文簡義幽殊難領會故予通議備列破顯題綱使知節要至於破妄顯真經文止有卷半其義已收四十年前所說教義非淺淺也以吾佛出世說法四十九年談經三百餘會單為破眾生我法二執耳二執若破即證涅槃涅槃者即如來藏寂滅一心也以眾生迷此如來藏心不生不滅與生滅和合成阿賴耶識此識具有四分謂一證自證分即一心真如二自證分即迷中本覺當論中覺不覺義三見分即前七轉識四相分即外器界經中地水火風虗空乃外五大為世界內之根身即五蘊眾生以眾生既迷此真心但認五蘊幻妄身為己身心妄執為我名分別我執外世界五塵為我所受用名分別法執此分別二執皆六識所計以七識乃六識之根依內外門轉其實二識通計也又有俱生我法二執此單屬七識計八識見分為自內名我執修行妄有證得為法執此二微細名俱生二執若二種二執破盡乃可證入一心之源是名為佛阿難既迷真心正為二障所纏必須破盡乃是真菩提路故此三觀乃破麤細二執之具也其經文徵心辨見乃通破麤細二種我執二種妄見及後破和合乃通破麤細二種法執以此楞嚴大定乃圓斷五住煩惱齊了二種生死不比諸經有先後也以統收五教頓證一心故不證先後耳問曰諸教別說先斷分別二執次斷俱生二執此言總斷者何耶答曰七識乃我法二執之根依內外門轉若依外門與六識作根則有分別二執若依內門則執八識見分為我此乃俱生我執此執至七地中乃斷八地以上猶有俱生法執者以七識具染淨二分義故七地斷者乃染分末那向執八識見分為我者今此染分一斷則捨藏識名而此八識即轉識真如名白淨識尚有淨分末那執此真如謂我所證得是為微細法執即後經云菩提心生生滅心滅猶屬生滅以執真如有所證得能所未忘觀智未泯尚為微細法執此執若斷方入妙覺證一心源此義全合起信勘定甚明故云頓斷頓證問曰此經破執之文向所未明從來傳者但云徵心辨見而已至於二種見妄亦不知為何而說也今通議雖明列破顯之科正當破執之義先後次第猶所未明請細言之答曰所言精麤二執義關真妄二途總不出八識五蘊耳一代時教所破者唯此而已以迷一心成阿賴耶識此識具有四分其前三分即五蘊身心世界其證自證分即所證真如今麤細二執唯破四分唯識攝歸一心為極耳故勘定經文按此而破先破五蘊屬分別我執其破識蘊而俱生我執即兼帶其中其二種見妄乃破分別法執此凡夫二乘之所共執者故破二妄之後即顯本覺真心以此故知俱生我執已帶破在前矣至次章云汝雖先悟本覺明心汝猶未明如是覺元非和合生非不和合等此正破俱生法執即此經後云菩提心生生滅心滅猶屬生滅故此執一破則頓歸藏性矣故下文發明一一皆如來藏者意顯前破所顯者乃但空耳下會三科七大之文乃顯妙有實相真空義耳此實破妄之闕鍵也細心深思乃見其妙問曰破執經文科雖分截但通途次第尚未了然請詳言之答曰分別二執即一切眾生所執五蘊身心世界此屬八識相見二分是也其俱生我執乃八識自證分向被七識內執為我我者經中見精即自證體乃迷中本覺佛性故經中二妄既破即顯此本覺真心此屬緣因佛性從斷所顯者未是離障真如也以淨分末那猶執此覺為我所證得此正微細法執所謂法執不忘己見猶存華嚴八地菩薩迷於真如理中必待三加七勸方能捨者以異熟未空顯最難斷也即從八地進入等覺勘此經文二妄之後佛言汝雖先悟本覺明心汝猶未明如是覺元非和合生及不和合意在破和合覺謂始覺合乎本覺名究竟覺猶屬和合對待故此和合一破即顯如來藏性頓證一心之源矣是知八地以上乃破俱生法執耳論說佛有淨分末那義在此也其破分別二執之文從初請定直至破見精後通破五蘊身心而俱生我執亦在所破二妄之文單破分別法執其旨甚明問曰初破五蘊而如來乃首約徵心而科云乃破色受二蘊意猶未明請直示之答曰八識相見二分相乃四大見乃轉識以最初見分摶取四大少分為我根身論中所指乃受執處遂成五蘊之眾生故經云一迷為心決定惑為色身之內者此也以色受二蘊正是執受所依之處名雖徵心意顯此根身本空非可依處欲修大定先須內脫身心故先破色受二蘊色身既破則無所執受則妄心無依故後進破六識為想蘊耳問曰徵心之後阿難重請奢摩他路如來放光復詰其心科為破六識想蘊者何也答曰初徵心為破色受二蘊正破小乘身見意顯欲修大定必須內脫根身也以凡夫但認妄想為心外道依此妄計小乘但斷六識上二界天人但滅六識故佛最初即云一切眾生皆由執此生死妄想誤為真實雖云修行不成聖果故修大定必首破之以此妄想一向執此根身為所依處舉此執心在此身內被佛徵詰故有七處展轉之執今皆被破已顯四大本空則色受二蘊已空矣唯此妄想乃生死之本故次破之意顯此想非空觀不破故阿難重請開示奢摩他路也未破之先佛放光明者意以此光為定體也了此光明則妄想頓破不待言矣良由眾生昧此光明但用妄想種種顛倒故先標二種顛倒以為所破之本意謂顛倒不生即是如來真三摩地故下所破者二顛倒耳仍詰其心者正顛倒之心耳以顛倒心起顛倒見故舉拳雙驗心目所在阿難但執能推妄想為心故佛咄斥其非心結云皆由執此生死妄想等此正破六識當想蘊也下文隨破顛倒之見故阿難重請發明妙心開我道眼意在破妄見耳問曰破見之文不知歸著請詳示之答曰見乃八識見分為前七轉識七識為七識意根故七隨內外門轉外轉在六識為分別見內轉執八識為我為推度見但有麤細不同耳先破凡夫常見二乘無常見外道斷見皆破分別見也屬第一顛倒猶係六識故此後文乃屬七識行蘊破推度見屬第二顛倒然分別見乃分別我執推度見即俱生我執直至破識精俱生我執方盡破耳彼二種見妄乃破分別法執二妄之後破和合章乃破俱生法執也以證真如但能所未泯有所證得為微細法執科名拂迹入玄者意在泯觀心絕對待耳然此二執一破則頓歸一心故下文三科七大一一皆本如來藏也問曰破見之文科連六七二識似乎纏繞學者難分幸指示之答曰八識三分各識皆具以見分為前七轉識故論云能現能見能取境界是以六七二識皆有見也前凡夫二乘外道之見在六識者正能取境界者也謂分別見論為疏所緣緣其七識約八還以辨者正指能見謂推度見的指對相分而言者也其破見量乃約能現蓋能現相分而起見者故猶屬七識此量一破方泯二分而歸見精耳佛意甚深微細非微密觀照不了此以在破妄門頭故應委曲搜揚耳殊非纏繞之說也問曰破見文中先約八還以辨科云揀緣後顯見精亦科云揀緣經義不同而科同者何耶答曰其科揀緣雖同而義亦攸別前揀緣者乃見分雜於緣塵之中一向能所不分故揀七緣乃所緣塵境其分別緣故特分能所各有所還而見性不無意指諸可還者皆非是見其不還者乃見性耳此但且分能所尚未的指見性為見精也其次顯見精而揀緣者乃單揀相分乃八識所現之緣影不言見分意謂種種物像皆八識體中所現如鏡中景景鏡不分故揀去親相分之緣而見分自泯識體猶存故為見之精者即識精圓明者也此在通泯相見二分獨指識體為見精耳此意幽深非麤心可領須細觀之問曰其見量似屬八識現量故此一破即云身心圓明不動道揚於一毛端則能含受十方國土已至極則何以又有後文約八識破我等耶答曰見量雖似八識現量以能現見相二分者識論說為親所緣緣若見相未泯對待未忘故應在七識耳其顯真之文身心圓明正約破染汙無知則不執取身心故云圓明一毛含受十方國土正顯離量故無障礙此乃分見真理其實未是極則也議疏甚明宜細詳之問曰佛指見精為第二月且云雖非妙淨明心如第二月何以見精方顯八識未破而經即云若能轉物即同如來於一毛端即能含受十方國土斯則顯理已徹何以八識未破而能如此耶答曰此非淺智可知也只如初地菩薩纔破分別二執而藏識全在即能見百佛世界此後地地增進所見漸漸廣大豈非一毛含受十方國土耶且此識體本是真如但為見相二分障礙今二分既泯識精圓明十方國土皎然清淨毛含十方更復何疑問曰若能轉物之轉與轉識成智之轉為同為異答曰轉雖同而所以轉則大不同也轉識成智之轉乃八識各有所轉次第先後單約識說此經轉物之轉不說轉識但約轉物以物轉則見分亦泯見分一泯前七識一齊頓轉原無先後次第也以見乃八識了別之行相前七輪識依此見而立故見泯而七識齊轉也所以然者相宗以識為本此經會相歸性特現唯心境界以一心真源為本以迷一心真如而為阿賴耶識故有見相二分由相分既立則見分取相分而為眾生所謂自心取自心非幻成幻法今見分既泯則離執取故法法本真一一本如來藏不待轉而自轉矣所謂不用求真唯須息見見分一泯則相分自轉為一心真如故即同如來也所謂不取無非幻非幻尚不生幻法云何立此意幽潛微密觀照乃能知之問曰已知破見之意矣其破八識之文初云破我則令即物以推之又令文殊約是非以揀之其破自證則約自然因緣以破之其破識精又約明暗色空以揀之且皆科云以顯一真豈非重複耶答曰非重複也以如來說教特為破眾生之妄執前云種種顛倒則眾生之妄計非一端也其教不比禪宗一悟便了教中必欲委曲搜揚其妄中自有種種妄計故須一一說破耳其破我者以此八識二乘執為涅槃我其未悟時又計蘊即離我外道計為神我其未通計為生死我故今欲破此識故先破其我見也此正俱生我執耳然即物以令推其是非者以此識體全變為根身器界之妄想本無二法故今即物以推其是非要顯本為一真故令文殊發揚以絕是非之見以悟一真之理耳其破自證乃以因緣自然破之者以外道不知此識乃妄計諸法自然而生謂之自生無因生又計諸法因緣和合而生謂之共生他生皆不知八識之自體本是妙覺明心也故約自然因緣以破之此計一破則精覺自顯其破見精正是前所立二顛倒中識精元明能生諸緣緣所遺者故追破諸妄至此乃破又約明暗色空者正顯此識精能生諸緣緣所遺者故揀緣以破要離緣以顯真心斯實破識之極則也且節節皆科云顯真者皆就破彼妄計則顯其真乃分顯耳非全體也佛言阿陀那識甚微細故非麤心可易會也宜深觀之問曰破見精文中又約前塵明暗色空以破且曰說我能見及科顯始覺文中又復揀緣是則此與前破見分揀緣何別答曰此文似同而義迥別深所難明請細陳之前破見分對揀緣者乃見分執取所緣之境一向混而不分故今將破見分必先揀去妄緣妄緣既離則見無所執此見不泯而自泯矣以相與為有相興為無也二分既泯則見精獨存故的破之曰見見之時見非是見見猶離見見不能及而科云的示始覺者以此見精乃是根本無明言真見見此見精之時真見不是見精意謂真智照此無明之時無明不是真智且此無明乃真智所變切近於真而智尚離之故云見猶離見豈彼執取之妄見而可及乎故云見不能及此智起惑亡故科云的示始覺然破見精而猶揀緣者乃揀見精離緣也前云識精元明能生諸緣故今離緣方顯見精此緣乃八識親相分為親所緣緣前見分所揀之緣乃疏所緣緣前乃變帶此乃挾帶了此相宗則此中理趣了然矣問曰見精既破始覺之智已顯五蘊八識俱破諸妄已離而阿難何以又於因緣自然和合之計心猶未開而於見見重增迷悶以此重請向下世尊徑說二種見妄不依所問而答而科云以破法執此義深潛實所難會請詳示之答曰此中密意從來所未曉也以教說五蘊有假名有實法前來一往所破五蘊身心但說破執蘊之執情其所破者乃假名耳而此五蘊實法尚存故仍懷因緣自然和合之疑心猶未開至於見見非見重增迷悶者以見精乃八識自體為根本無明故云陀那微細識習氣成瀑流真非真恐迷我常不開演此世尊一向不輕談者故二乘一向迷於此也今云見見非見謂真見見此見精乃真智照此無明也此豈二乘可知也且如明來暗去智起惑亡真妄不容兩立經云此無明者非實有體豈有實實無明以當其智哉阿難意謂實有箇見精與真見可見今覓見精而不可得故迷悶耳況此極則殊非二乘境界安得不懷疑漠漠乎向下世尊答辭不循所疑直說二種見妄者以知阿難未了根本無明故五蘊實法未消五蘊既存則世界山河大地礙眼此正法執未亡己見猶存耳若單就無明則只用世尊說此無明者非實有體一語可了今意在破身心世界之法執故設燈上毛輪以喻五蘊是假蓋由眼中有眚所見今不必責毛輪是有是無但只知是眼眚則無見病意喻但觀五蘊身心是假乃因無明妄見而有若了無明本空則身心自泯所以喻中但言知是眚者則無見咎即此一語的破見見之疑矣若了身心本空則可例觀世界亦似身心同是妄業之感耳又何有因緣自然見見之疑哉此所以有進退合明之說也所以二妄一破則本覺真心頓顯故經結云若能遠離諸和合緣及不和合則復滅除諸生死因清淨本心本覺常住科云本覺離緣真如出纏豈漫然哉佛意甚明第觀者智暗不易了耳問曰後章經文從來說者都云重破和合而此科云拂迹入玄況經中猶舉見精言之此前大有徑庭請示其要答曰議中甚明此正始覺有功本覺乃顯論云始覺合乎本覺名究竟覺今尊顯一心真源絕諸對待直須觀智俱泯能所兩忘故至此乃破和合之覺此正微細俱生法執名生相無明論云此無明者唯佛能了非他境界故佛無問而自說也但觀經云汝雖先悟本覺妙明則許前已悟矣次云汝猶未明如是覺元非和合等義極顯了下云猶以世間妄想而自疑惑證菩提心此乃的破名言習氣故云以世間妄想而疑菩提所謂以生滅心而辨圓覺而圓覺性亦同流轉故須泯此知見乃入一心相源以真心真智難以措口特借見精以例破耳既破和合而阿難又作不和合見故復疑曰如我思惟此妙覺元與諸緣塵及心念慮非和合耶觀此直須心境兩忘言思路絕乃入一心之妙耳問曰前會五蘊中首舉色蘊依妄見而有故說目因勞而妄見空華今說六入復拈前兼目興勞共為眼入意旨何如答曰此最極微細非前喻可比也以此中乃說最初六根之元因見分取相吸習中歸和合結成五淨色根為浮塵所依本來無入今始有也兼目即今眼根為相分勞即見分以此二分本無所有同是菩提瞪發勞相意顯識體依覺故迷故云菩提發勞二分依識而顯為識之行相不離自證原無二體故云同是故約以成六根自體為喻蓋言本無六根因最初見相和合而成淨色故雙舉之以明六根初結之始故難領會耳問曰處者何義答曰處者唯識說有體實相分色為見分所盧託處不拘親疏為所緣緣以皆有對待俱有所依今言二皆無體唯一真如故本如來藏矣問曰起信三細謂業轉現如是次第今經三細以見為轉相列於第三是則先現後轉豈失論意耶答曰不失論意各有所主也論意單說心法生起謂真境界中始因一念妄動即轉圓明真心而為無明由此無明乃現分別相續等相若能離念即證一心今經重在眾生生起之元故因最初一念妄動即轉無相真心頓成有相之妄相故虗空四大自此而形是為有所有相因有所相即轉本有智光而成妄見為取相之妄知由是見相同一元明覺體今溷雜而不分遂成有情所謂色心和合而為五蘊之眾生其意重在妄見執取而為生死病根所謂數取趣也故云自心取自心非幻成幻法不取無非幻故祖師云不用求真唯須息見論獨轉心故真修端在離念此經轉境故云若能轉物即同如來故真修端在不取即斷生死根本故破妄直專揀緣經重所取故先相論重能取故先見故為門不同而修斷亦別也宜深觀之楞嚴通議補遺
