front:
  text: 首楞嚴經通議序首楞嚴經者諸佛如來大總持門祕密心印統攝一大藏教五時三乘聖凡真妄迷悟因果攝法無遺修證邪正之階差輪回顛倒之情狀了然目前如觀掌果可謂徹一心之源該萬法之致無尚此經之廣大悉備者如來以一大事因緣出現世間捨此別無開導矣故判教者局於一時一教豈非管窺蠡測哉自入中土解者凡十餘家如會解之外近世緇白各出手眼而弘通者非一崇尚已極刻意已深而披文釋義靡不參詳精確發無餘蘊又何俟其蛇足哉但歷覽諸說有所未愜者獨理觀未見會通故言句雖明而大旨未暢是於學者未免摸象之歎余昔居五臺冰雪中參究向上以此經印證堅凝正心以照矚之豁然有得及至東海枯坐三年偶閲此經一夕於海湛空澄雪月光交之際恍然大悟忽身心世界當下平沈如空華影落是夜秉燭述懸鏡一卷乃依一心三觀融會一經謂迷悟不出一心究竟不離三觀以提大綱但以理觀為主於文則略如華嚴法界之設意在得義而言可忘也說者又以文字為障不能融入觀心猶心為缺故豫久有議蘊藉胸中及投災荒雖波流瘴海而一念不忘者二十餘年至萬歷甲寅以投老南嶽寓靈湖之萬聖蘭若結夏時門人超逸侍豫最久甘苦疾病患難靡不同之豫感其精誠因入室請益懸鏡觸發先心遂直筆成帙較懸鏡雖多無非廣發一心三觀之旨而文不暇詳釋題曰通議蓋取春秋經世先王之法議而不辨之意所謂議其條貫而通其大綱是於向上一路實以為贅其於初機之士可以飲海一滴而吞百川之味也或曰佛不思議法可得而議之耶曰不然法本離言而堅執邪見者非言不破佛說優波提舍名為論議以折邪慢之幢良以此經摧九界之邪鋒拆聖凡之執壘靡不畢見於廣長舌端種種堅壁一鏃而破之直使智竭情枯降心歸順而後已以經盡發其情苟不議明正令無由以淨法界之妖氛彰覺皇之大化是可以文字目之哉得意遺言是在金剛正眼萬歷丁巳端陽日憨山道人德清書於吳門之貝葉齊重刻首楞嚴經通議序大哉教乎如來金口誠言祖師悲心詮解求其妙而得入深而易悟者無如憨山大師著釋首楞嚴經之通議也宗趣昭然言辭切約不是離文顯妙亦非滯句談玄融性相二宗徹一心三觀符定宗旨不遺纖毫本末圓通始終一貫誠教苑之司南禪宗之正眼也間始披緇雲山遂獲夢遊殘本玩其垂訓法教莫不周質悚然及至聽講楞嚴嘗閲諸家疏解方知大師亦有發明是經者名之曰通議於是銘心五內未一觀從斯歷十餘年莫不念念於是書也甲午春雲遊台嶽果遂前心消熱惱於一時鎔冰襟於頃刻偶經觸目喜出尋常繇茲不耐守株唱緣鐫梓實有心公諸同志未敢言大師之法流也時光緒二十年孟冬月天台嫡裔雲水山人諦間書於申江龍華寺之藏經閣
