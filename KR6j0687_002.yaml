body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述三示外道斷見顛倒爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆願聞議曰此出斷見之疑也阿難聞前開示客塵飛光以示身境動有不動則知生滅有不生滅義業已領悟但一向妄認緣塵分別之心為心未見不生滅性故願聞世尊即在現前的示何者是真實何者為虗妄如何是生滅如何是不生滅令真妄二體了然分明方自信不疑此乃阿難心願而未決故匿王因之以請也匿王先事外道姓迦旃延名迦羅鳩馱計一切法亦有亦無又外道名刪闍夜毗羅胝子而毗羅胝乃母號也故云子此計諸法自然其西域外道雖多而所計者不出斷常二見此二計斷見者匿王已奉此法故雖見佛尚執舊習祇知死後斷滅今聞此心不生滅性猶懷狐疑故請發揮大衆願聞若悟不生滅心則阿難妄執之情自謝真常之性自顯矣然死後斷滅之見不獨西域而此方亦多謂人死清氣歸天濁氣歸地一靈真性還於太虗此斷滅之見也若果還太虗則因果絶矣豈不幸哉佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頽齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛言大王汝之形容應不頓朽王言世尊變幻密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實為年變豈唯年變亦兼月化何直月化兼又日遷沈思諦觀剎那剎那念念之間不得停住故知我身終從變滅佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母攜我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽黎等都言此身死後全滅王聞是言信知身後捨生趣生與諸大衆踊躍歡喜得未曾有議曰此破外道斷見也阿難願佛就在現前身心拈出不生滅性此理甚難發揮故借匿王開示然匿王不但不知生滅即常而且執死後斷滅者也苟知滅元不滅則知生本無生真常之義顯矣不滅之性死後難明只就現前身心以驗則可知矣故問匿王汝此肉身為同金剛常住不朽為復變壞此問為引終從變滅之言也若就形骸而觀其實遷變不常以從生至幼從幼至壯從壯至老漸漸不同至老衰朽終歸於死若就歲月而觀其實遷流不住以紀變而年化月變而日遷細而察之不唯時遷而剎那剎那念念不住此皆身心生滅無常也即此生滅有不生滅真常之性何從而見耶故世尊乃詰觀河之見以印證之三歲觀河以至於老形骸雖變而見水之見性不變即此不變之性乃真性也以此足證變者受滅而不變之性云何受汝生死耶此身雖謝真性常存如何引彼末伽黎等都言死後斷滅耶真常之性即就此身於是乎顯矣王聞此言信知身死不入斷滅已上破外道斷見竟四示顛倒之狀阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來豎臂兜羅綿手上指於空則名為正佛即豎臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大衆瞪瞢瞻佛目睛不瞬不知身心顛倒所在五正責顛倒佛興慈悲哀愍阿難及諸大衆發海潮音遍告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷議曰阿難聞佛開示觀河之見生滅中有不生滅則前見拳之見即此見性信知真性本不曾失云何世尊獨許匿王而說我等遺失真性原不顛倒云何見責我等顛倒行事耶此阿難其實未見真性乃認妄為真不知顛倒所在也故世尊以垂手示之且天然垂手而人以為倒是猶身境本自真常而返生厭離此二乘外道之顛倒也豎臂是倒而返以為正是認生滅無常而妄計為常此凡夫之顛倒也然唯我一臂耳本無正倒但以首尾相換妄生分別世人一類如此瞻視倍猶類也如來法身與汝等色身皆一身也若比類發明如來之身名正遍知汝等之身號性顛倒以如來法身安然自在汝等之身妄計斷常此所以為顛倒也世尊意要阿難即色身以悟法身故問阿難隨汝諦觀汝身佛身何處名為顛倒耶阿難大衆向以執迷故瞢然不知顛倒所在佛興慈悲遍告同會曰我常說言色心諸緣及心所使諸所緣法唯心所現色十一色法也心四蘊八識也諸緣塵根也心所使五十一心所也諸所緣法根身器界一切萬法也皆唯心所現以此而觀足知汝身汝心皆是妙明真精妙心中所現物如何但認幻妄身心而遺失本妙圓妙明心寶明妙性認悟中迷以本來不迷由汝認妄失真所謂悟中迷此即顛倒所在也六示迷悟同源晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之惟認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者議曰由說一切諸法唯心所現恐當機難悟故推原迷倒之由以示迷悟同源唯心之旨以破顛倒之妄心妄見也意恐轉計一切諸法及此身心既唯心所現然則何以迷之耶故推迷妄之由以發之原夫一真法界如來藏清淨真心本無身心世界之相也但由真淨界中一念妄動而成不覺之無明以此無明蓋覆真心遂將靈明廓徹之真空變為頑然無知之虗空故云晦昧為空依此頑空無明凝結變成四大之幻色故云結暗為色真心既迷即轉本有之智光變為妄見以此妄見對彼幻色相待既久即摶取四大之少分妄見和合而為五蘊之身心故云色雜妄想想相為身執此妄身遂失本有之真性但認聚緣內搖昏擾擾相以為自己之心性是所謂性心失真也既一迷廣大之真心而據蕞爾幻妄之身心決定惑為色身之內矣曾不知此色身外洎山河虗空大地咸是妙明真心中所現物耳譬如棄大海而認一漚此已迷矣且以一漚目為全潮又更迷也是故汝等為迷中倍人此正顛倒之狀如我垂手無異故如來說為可憐愍者耳上從前二種根本以來破想蘊滅前六識明第一顛倒竟三辨妄見破行蘊明七識無體分二初破妄分五先徵破分別妄見無體分四初呈妄見阿難承佛悲救深誨垂泣義手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道議曰此下明第二顛倒也阿難向認介爾妄想顛倒之心為心今蒙佛開示妙明廣大真心誠所未聞故感激垂泣但以承佛妙音悟此妙心元所圓滿此則因聞法音以緣心而悟非親證也未敢認為自己本元心地哉請拔疑根古人徹信自心直到不疑之地方為實證阿難所悟但因聲分別乃緣塵之心生滅心也故屬意根所云認緣失真者此也二揀妄緣不實佛告阿難汝等尚以緣心聽法此法亦緣非得法性如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是若以分別我說法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是三示根識俱妄若真汝心則無所去云何離聲無分別性下映前六識無體斯則豈唯聲分別心分別我容離諸色相無分別性下帶顯八識非真如是乃至分別都無非色非空拘舍離等昧為冥諦四示可還非真離諸法緣無分別性則汝心性各有所還云何為主議曰此明第二根本故借見精以破七識無體將顯識精為涅槃體也以七識乃意識之根為分別性但托六識分別以顯其用通屬八識之見分以緣內外亦名緣心今離前塵則無體矣故約緣塵以破世尊告曰汝等若以緣心聽法此法但屬所緣生滅心耳非得離言法體也然我所說法如以指指月示人而指非月也離指方能識月若以指當月則月指二體皆失明暗二性無所了矣若以分別法音為汝心者此心自當離聲有體如客宿旅亭客去而亭主常住若此分別果是汝之真心則應常住如何離聲無體耶如此不但此心無體即分別我容離諸色相亦無體也此則總顯六識分別之心無體以六識依此七識而有分別今既分別無體即顯此識虗妄矣不但分別非真縱使分別都無非色非空七識內緣離外五塵故非色執內為我故非空此正八識昏昧之體猶非真心而拘舍離等昧為冥諦此尚非真況分別緣塵者乎緣塵分別者乃七識為意之根故有分別若離外塵無緣即內緣八識為自內我故外道計此為神我立此為冥初主諦計以為常依此生二十五法拘舍離外道名也因破七識帶顯八識為所執之我亦非真也若離法緣無分別性則汝之心性各有所還云何為主此結前起後意在不還者為主乃顯真心耳二姑借見精以揀緣塵分二初請阿難言若我心性各有所還則如來說妙明元心云何無還惟垂哀愍為我宣說次答分三初立見精佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地二揀緣塵阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦暝則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別三示見性諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍議曰阿難聞說可還者非主故請不還之真心也以真心難明姑借見精以破之以見乃雜於緣塵之中而八識精明之體不屬緣塵故曰見精明元此雖非真以元係真如所變已切近於真故如第二月不離月體非是水中之影也若悟此見精不還則可了悟真心矣前云認緣失真故約緣塵揀示不還之地若諸緣淨盡則真性自顯矣且見所緣者不過明暗通壅緣空塵霽八緣而已且此八緣皆有所還汝見八種之見精明性當誰還耶諸可還者自非汝之真心明矣其不還者豈非汝之真性而誰耶是則真性在汝本自妙明今自迷悶不悟喪失本有而受生死是故如來說為可憐愍者此耳三示見性離緣以顯見精分四初請不還阿難言我雖識此見性無還云何得知是我真性議曰阿難意謂我已知此不還之性矣但不知此性如何即是我之真性也此非呈悟正陳不悟之心也蓋此見雖破以是八識之精光應五根而了境者故姑借見精以為主外揀緣塵以破之若塵亡而此見亦泯矣故先揩定見量揀緣塵而後破二定見量佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中庵摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚衆生洞視不過分寸三揀緣塵阿難且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象阿難極汝見源從日月宮是物非汝至七金山周遍諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝四示見精阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性議曰此正示見精明元也以見乃八識之精光映五塵而了境故名緣塵之見若就初照境時即名現量正屬八識精明之體若第二念起心分別則名比量乃屬意識前約八還以破乃破緣塵分別之見猶屬比量今約現量以顯見精故科云楷量以破也且聲聞菩薩與佛及衆生雖聖凡各別而照境之用廣狹不同都是八識現量見精所矚雖天地虗空萬物雜陳一見洞照足知物異而見不異此不異之見不雜於物者此精妙明誠汝之見性也若知此性則可超悟真性矣四破轉計見精是物分二初破轉計若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立二示真見阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實議曰此破轉計也由前指萬物以示見精誠恐阿難認見是物故特示之曰萬物乃所見之境也而見物之見精豈是物耶若見是一物則爾我之見皆是物也而汝亦可見我之見矣若謬執謂同見一物即是見我之見者然我離物之時汝何不見我不見之處耶縱許汝能見我不見之處此但是汝之妄見自然非彼不見之相也彼字佛自指也作我字看若不見我不見之地足知爾我之見皆非物也即此離物之見豈非汝之見性乎若必執見是物則物皆有見彼此互見人物不分不成安立矣此離物之見乃會見分而歸識精知此則可漸見真性矣故特指歸見性曰汝見物時是汝之見而不預我即汝之見物圓滿而周遍者豈非汝之真性而誰耶且汝之見性圓明了了云何自疑而不悟此性是汝本具而不以為真返取我言以為實豈不誤哉五正破見量以顯真心分二初立量阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍祇見伽藍清心戶堂但瞻薝廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演次正破佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築牆宇能夾見斷穿為小竇寧無續迹是義不然二顯真一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土議曰此正破除見量也由迷真心而成阿賴耶識此識具三分一自證分二見分三相分以無明力凝結既久遂成頑然無知之虗空而成四大之幻色因此而有妄見攬四大而成衆生故根身器界一切萬物由之而起也今將破妄顯真故先揀去所緣之相分姑顯見性離緣令緣塵既消故能見亦泯此所謂會妄見而歸見精也今見分既泯而見精獨存以八識未破此識現量雖能圓現根身器界猶存限量不能圓照法界故有內外大小之隔而疑夾絶之見也若此量一破則根境兩亡圓明普照十方矣阿難問意經文可知但破見量之說從前未發苟不如此何以此見一破即能一毛含受十方國土耶世尊答意約器以破者以此圓明妙心今在迷中而為根身器界之所局礙若能內脫身心外遺世界則圓明妙體當下現前故除器方而空體本無方圓也不除虗空方相者此古德所謂不用求真唯須息見若見量一泯則相分頓亡此所謂若能轉物即同如來身心圓明不動道場於一毛端遍能含受十方國土也始因迷一心真如故轉為妄相今轉妄相歸一心故即同如來如此深觀方見如來說法之妙以從悟至迷從細至粗法爾而有三細六粗之相今破妄顯真必須從粗至細漸詣真際也論文昭然以論勘經則一毛不爽非是謬談智者請深觀之從前阿難承佛悲救以來辨妄見破見分滅第七識行蘊以顯分見真理明第二顛倒竟四非見精破識蘊滅第八識的指正修行路分三初破我執以顯一真分三初當機出計阿難白佛言世尊若此見精必我妙性今此妙性現在我前計即色是我見必我真我今身心復是何物計離色是我而今身心分別有實彼見無別分辨我身計我大色小色在我中若實我心令我今見見性實我而身非我何殊如來先所難言物能見我計色大我小我在色中唯垂大慈開發未悟議曰此下破八識自證分潛破我執以顯一真也以一向七識執此識體為自內我故二乘計此識為涅槃真我外道執此為神我故說我遍十方等故曰阿陀那識甚深細習氣種子成瀑流我於凡愚不開演恐彼分別執為我此識世尊一向不輕談者為是故也阿難聞佛開示若能轉物即同如來遂起執物是見之疑就中潛計我見為請意在破外道所執之我以外道執此識為神我而二乘執蘊即離我故須代破言雖不顯意實含之乃曰若此見精必我妙性今此妙性現在我前者此字指前所轉之物也意謂若能轉物即同如來斯則現前一切萬物皆是我之見精矣此潛計即色是我也見必我真我今身心復是何物者意謂若此萬物必是我之真見則彼物已是我矣我今身心復是何物哉此潛計離色是我也而今身心分別有實彼見無別分辨我身者意謂若物是我則身心非我矣況今身心實有分別彼物既是我何以不能分別我身耶此潛計我大色小色在我中也若實我心令我今見等者意謂彼物若實是我心令我今見則彼之見性實是我而身心非我矣如此則何殊如來先所難言物能見我此潛計色大我小我在色中總計外物是我也此計從轉物一語而起故世尊向下就物擇見約即物以破之前云若見是物蓋彼認見作物也今計認萬物是見故不同耳二世尊委破分二初即物破是見佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祗陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑阿難言我今於此重閣講堂遠洎恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是議曰世尊令阿難就物擇見以顯物非見精也故先責所言見在汝前是義不然若現前物實是汝之見精者則物物各有方所而汝見精必有方所可指陳矣故令就此現坐祇林遍觀種種諸物但有形者一一指著何者是見披剝萬象析出精明指陳示我分明無惑此令即物以辨我也阿難領旨答云不但聲聞即菩薩大智亦不能於萬物象前析出精見離一切物別有自性佛言如是如是許其所對不妄也二即物破非見佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祗陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實遍見此祗陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王是真實語如所如說不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕議曰阿難認物為見精故世尊就物敕令指陳今指擇不出已知物不是見明矣世尊仍令即物而指何者非見阿難領旨答云我又思惟是萬象中微細發明無非見者佛亦印許如是如是問曰阿難認物為見世尊敕令就物指陳而阿難已知物不是見世尊已印許矣又令阿難即物所指何者非見阿難亦知即一切物無非見者佛亦印許之何耶答曰佛意端在直指一真了無是非之相阿難大衆不悟落在是非圈裏故茫然不知失其所守至此則勦絶命根矣如來知其魂慮變懾故憐愍安慰而暫縱之也乃告之曰法王所說是真實語不同外道末伽黎等四種不死矯亂論議謂矯智亂答無一定道理世尊不然以我法據真實義不忝汝之哀慕也以世尊自指非末伽黎四種不死矯亂論議足知前破我執明矣三文殊顯真是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指議曰阿難大衆不悟見精是非之義故文殊特為啓請也以迷智而為識故妄見有根身器界一切萬物種種差殊是皆唯識所變現也若轉識成智則一切萬物當下消亡經云得相是識不得相是智唯在轉變之間耳以一真之體全變而為阿賴耶識故根身器界由之而起若內脫身心外遺世界即此識藏元是如來藏一真法界常住真心又何有是非之相哉以依識妄見故有是非若以大智照之則了無彼此是非之相此非大智不能洞然故假文殊啓請物與見精云何無是非是也如來乃據大定而答曰十方如來及大菩薩自住三摩地中以智而觀則見與見緣并所想相如空中華本無所有以此見及緣元是菩提妙淨明體云何有是非是此特示一真了無別法可謂極盡開示矣故文殊自謂但一真文殊何有是非二相哉佛言以此足知此見妙明與諸空塵本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月若了知一月是真自無是非之相矣前破妄見乃約見精以破故曰此見雖非妙精明心如第二月非是月影今將破見精則曰唯一月真更無二月此如來說法從粗至細漸引歸真了然可見矣若以妄想而觀則不能出是非之外若以妙覺明性而觀故能令汝出指非指至此一真之性於是乎顯矣上破我執以顯一真竟二破自證以顯一真分四初當機出計阿難白佛言世尊誠如法王所說覺緣遍十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我遍滿十方有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性議曰將破自證故阿難約自然以問也自然者謂自體本然不假因緣以真如在迷有自性可證外道不知計為自然故阿難假之以難請也問有二義一則承前世尊所示覺緣遍十方界故疑與外道說有真我遍滿十方相同二則聞說覺性自然不屬前塵則妙性天然與彼外道所說自然何別二世尊委破分二初破自然佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性二破因緣佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞三的示精覺當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空祇益自勞虗空云何隨汝執捉四重拂妄計阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何佛言阿難我說世間諸因緣相非第一義議曰阿難執謂覺性自然世尊約境甄破顯自無體則不屬自然明矣隨復轉計是因緣生世尊即境按破不屬因緣蓋此妙性不借緣生不因境有故直示精覺乃曰當知如是精覺妙明不屬一切因緣自然超出是非之外離一切相即一切法名言道斷心行處滅云何於中措心以諸世間戲論名相而得分別耶譬如以手撮摩虗空徒自勞耳虗空云何隨汝執捉耶此直示一真覺性了無餘蘊矣如此開示阿難猶然不悟仍執尋常所說因緣為疑此正名言習氣也故世尊答曰非第一義上破妄計以顯一真竟三破見精以示始覺分三初徵破妄計阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見二的示始覺分二先揀緣是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞次的示四義成就汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然成和合相三結責勸修汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路議曰此破見精以顯始覺也一往辨見以來姑借見精先破緣塵分別之見次破見分以顯見精以見相二分本同一體元依識精所現故物與見混而難分故或認見是物或執物是見而起種種外道妄見世尊即物以徵其是非今既蒙逐破見精已顯唯一真精更無別物超出是非之外阿難一切自然因緣之疑已決矣此乃泯見分而歸識精也但此見精猶屬迷妄正是無明名為識蘊故如第二月若此不破難契本覺真心故此一節乃破見精以示始覺之智也且將破識精世尊猶以見與不見為審者前乃對緣以辨此乃離緣以辨意顯此見精不因境有不借緣生唯一精真切近真心故此識一破則五蘊頓空即名始覺之智矣佛審阿難世人舉皆說我能見然云何名見云何不見耶阿難答以因明暗而有見世尊破云若見因明暗而有且明去而見暗暗去而見明是明暗自有去來而汝見性非暫無也是故明暗通塞自是前境而此見精不因境有不借緣生唯一精見而已此則前境既離而見精獨顯猶屬無明故破之曰汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然及和合相耶此乃正破識精也見見之時見非是見者謂真見見於見精之時而真見非是見精也且見精切近於真者尚猶離之豈汝妄見而能及此真見乎故曰見猶離見見不能及是知此句乃的破見精明矣此離妄之真見乃清淨實相真心也以汝等狹劣不能通達耳此即是名始覺之智以始覺有功本覺乃顯故此正示奢摩他路吾今誨汝當善思惟無得疲怠而不進修也從初啓請妙奢摩他以來至此通破五蘊身心以顯人空故結指觀名以此正屬我執名為但空以法執猶存故下例破二種世界以破法執上破五蘊八識以明人空竟二例破二種世界本空以明法空分二初當機呈請阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨議曰今破法執之初阿難且以聞前因緣自然然猶未明和合及不和合故云心猶未開以前說五蘊不屬因緣自然但破假名而實法尚存未達本空故心猶未開今聞見五蘊之見亦非見故重增迷悶者正是二乘我執雖空法執未忘猶妄見有身心世界故覺心未淨所以重請開示也下答意總顯五蘊不實例顯世界本空二世尊許說分二初許說誡聽爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果二正示二妄分二初總示阿難一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見二別示分三初別業妄見云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見二同分妄見云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲祇有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珊玦彗孛飛流負耳虹霓種種惡相但此國見彼國衆生本所不見亦復不聞三進退合明分三初進別例同阿難吾今為汝以此二事進退合明阿難如彼衆生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎例汝今日以目觀見山河國土及諸衆生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者彼見真精性非眚者故不名見二退同例別阿難如彼衆生同分妄見例彼妄見別業一人三進退合明一病目人同彼一國彼見圓影眚妄所生此衆同分所見不祥同見業中瘴惡所起俱是無始見妄所生例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死上顯法空竟三顯本覺離緣以示真如出纏若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住議曰此以五蘊例破世界以破法執也將破法執且云將演大陀羅尼諸三摩提妙修行路者陀羅尼此云總持蓋前結勸無得疲怠妙菩提路者乃單示人空未顯法空猶屬但空以法執未忘今將示圓融空觀之體以舉一即三言三即一故云諸三摩提今法執一破而空如來藏體頓顯且此空藏乃圓融之空體總會萬有融歸一心故云總持三昧此所以為諸三摩提妙修行路義顯真空乃即假之空非但空也故佛責阿難強記多聞於奢摩他微密觀照心猶未開正指不悟本非因緣自然之旨未達即假之空故今重為開示也然法執端是內之五蘊身心外及山河大地虗空世界二種實法而已前云汝之身心外洎虗空山河大地皆是妙明真精妙心中所現物譬棄百千大海認一浮漚目為全潮是為顛倒今將破二妄故先告阿難一切衆生輪回世間由二顛倒分別見妄也且此二妄從一真界中當處發生既生此妄惑必有妄業所謂動即有苦故當業流轉耳云何二見一者別業妄見二者同分妄見別業乃衆生正報各各五蘊之身心是各人別業所感者同分乃衆生依報之世界是大家同業所感者以此二妄本來不有良由真淨妙明心中一念妄動而有無明遂變真心而為阿賴耶識故有見相二分見為妄心相為妄境心境對待起惑造業輪回生死實二妄之咎也所謂見與見緣并所想相如空中華本無所有故真心如好眼妄心如眼眚五蘊身心如燈上之圓影四大山河如空中之狂華若了目眚則二妄本空矣故約目眚以破之云何名為別業妄見別業者乃衆生正報各各五蘊之身心要顯五蘊本空元依見妄而有故譬目有赤眚夜見燈光五色圓影好眼燈光總喻真心眚喻妄見影喻五蘊故即燈離燈以辨之本無所有豈可以是非論之哉色實在燈喻妄不離真也見病為影喻因迷有妄也影見俱眚喻心境俱迷也覺迷迷滅故見眚非病又喻如第二月足知了無是非之相矣苟知二月是揑目所成則知影見乃目眚之咎又何於燈起是非之妄計哉了此足知五蘊本空則因緣自然之疑可決矣云何名為同分妄見同分者乃十方衆生同感依報之世界欲顯世界不有元依見妄所生故以南閻浮提大小多國之災祥不一明之但一國人同感惡緣則一國人同見不祥彼無惡者本不見聞是知穢土衆生乃惡業之所感而淨土中人本不見耳所謂大火所燒時我此土安隱以本不見有穢惡也吾今以此二事進退合明謂進別業以例同分退同分以例別業以五蘊本空易悟世界不有難明故假二事進退合而明之耳即彼衆生別業妄見五蘊身心如見燈光所現圓影然影雖似有畢竟是目眚所成非燈本有也若知是眚者則無見病矣以此例汝觀見山河國土及諸衆生皆是無始無明見病之所成耳見與見緣似現前境本非實有元是我覺明之無明故妄見有所緣之眚耳是則若覺若見皆即眚也其本覺明心覺了諸緣者則非眚矣然覺其所覺是眚此真覺也真覺豈墮於妄覺之中哉故曰覺非眚中此實見見因阿難前云今聞見見重增迷悶故佛以覺所覺眚覺非眚中以釋見見之疑也以此證成則上見乃真覺下見為目眚眚乃妄見正指無明識精也此如來自釋明文昭然不必異解且識精乃見之精者以真智而觀猶是眚妄云何覺聞知見而可及哉是所謂見猶離見見不能及也當知一真界中生佛本無汝今見有佛有衆生者皆是妄見之眚非見眚者也彼妙見真精性非眚者遠離諸妄故不名見耳此上進別業以例同分合而觀之則世界本空可知矣故又退同分以例別業即此衆生同分妄見例彼別業妄見一人以一病目人所見之圓影乃眚妄所成例彼一國所見之不祥同是惡業之所起而此國界俱是無始見妄之所生以此一國例閻浮提并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知謂因無明迷此無漏妙心而妄為見聞覺知虗妄之病緣根境和合而妄生妄死耳由是觀之則五蘊身心外及虗空山河大地當下消亡了無寄矣故知例破二種世界以顯法空也二執既破則始覺有功本覺乃顯總結本覺離緣以示真如出纏故曰若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住矣從前徵心辨見以來多方開示破妄顯真至此二執既破乃顯本覺真心然此猶是破和合識以顯本覺未極一心之源向下更破始本和合之計方乃會歸藏性耳上顯本覺離緣以示真如出纏竟四拂跡入玄以顯真如絶待分二初世尊特示阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合二重拂妄計分二初破和合阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義彼暗與通及諸羣塞亦復如是復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合若明合者至於暗時明相已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼暗與通及諸羣塞亦復如是二破不和合阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸羣塞亦復如是又妙見精非和合者為非明合為非暗合為非通合為非塞合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理彼暗與通及諸羣塞亦復如是議曰前已開示始覺有功本覺乃顯此所謂菩提心生生滅心滅猶屬生滅以有對待故也阿難前間未明和合之義向以始覺合乎本覺名究竟覺將謂本覺真心亦因和合而起故此重拂妄計以顯真心絶待觀智俱泯然後乃可妙契一心故科名拂跡入玄是知此中和合乃就真心以揀始覺故不同前破和合識揀妄計也此因阿難前云心猶未明故不待請問而告之曰汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合非和合生謂天然妙性不因修生不因和合而生也及非不和合謂體絶妄緣不與諸緣和合而未嘗離緣也然覺體明淨難以措心故借前塵妄想以發明之乃曰吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性指八識體名和合識而自疑惑證菩提心和合起者謂汝猶以夙習妄想妄謂菩提覺心亦從和合而起也汝今即以妙淨見精而推為與前緣明暗通塞誰和合耶所言和者如水乳和合者如函蓋合所言和者雜而不分之義且汝觀明時何處雜見耶下離即破若明非見者則明既非見不當見明矣此離不可也若明即見者則明已成見不當更見矣此即不可也故曰云何見見下一異破若見是一則見己圓滿又於何處和明耶若明是一則明已圓滿不應又與見和矣意謂兩物相雜乃可名和耳此一不可也若見必異明而言和者則雜而不分若見若明兩失之矣豈可又言見明哉此異不可也既雜失明性而更言和明者此非義也明既非和則暗與通塞準可知矣又汝今者妙淨見精與明暗通塞如何而合耶若與明合明滅則不當見暗以見隨明滅故若與暗合則暗謝自不當見明以見隨暗謝故了明若此則暗與通塞準可知矣阿難既蒙開示非和合義故又轉計云如我思惟此妙覺元本非和合與諸緣塵及心念慮非和合耶世尊破云若非明和則見與明各有邊畔若非明合則見與明兩相乖角不相及矣何以知其合不合耶以此而推足知妙淨見精與諸緣塵若言和合及非和合皆不成矣見精尚出是非之外何況妙覺真心豈可以是非和合而計之哉良以生滅與不生滅和合而成八識故今破和合識則諸妄已盡以始覺合乎本覺觀智俱泯是非情忘以顯真如絶待斯則寂滅一心於是乎見矣上約生滅門決擇真妄以顯本覺真心竟二約不生不滅會妄歸真以顯真空如來藏性分二初直指一心阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得議曰此直指一心真源不生不滅如來藏性將以融會萬法也由迷此一心不生不滅與生滅和合成阿黎耶識變起見相二分為色心二法內成五蘊之衆生外及虗空之世界諸所緣法悉現其中良由衆生不覺認緣失真故受輪轉耳阿難大悲示現假墮淫室之由全因妄認五蘊身心為誤故特請世尊開示十方如來得成菩提妙奢摩他三摩禪那最初方便故世尊首破五蘊而指心目為咎始從徵心辨見以來總破妄心妄見而已然則心見乃八識之見分諸緣乃八識之相分是為根本無明由此無明不了諸相本空故從前漸揀緣塵非有妄見本無泯見相以歸識精破識精而歸始覺會始覺以歸一心而空如來藏體於是乎顯矣已前破妄所顯之空名但空耳以空而不能有故非真空今將會五蘊根塵識界并及七大本如來藏妙真如性是為即有之空名實相真空方盡大乘圓融空藏之體此非二乘所知故世尊特告阿難曰汝猶未明一切浮塵諸幻化相當處出生隨處滅盡若了緣生如幻本自無生但幻妄稱相而已其性真為妙覺明體也此則法法全真何有一法之妄相哉如是則知五陰六入從十二處至十八界此諸妄相但是因緣和合虗妄有生因緣別離虗妄名滅汝等但見生滅之妄相殊不能知生滅去來者本如來藏常住妙明不動周圓妙真如性也了知藏性又何有生滅去來之幻妄哉若以妄想而觀則似有生死去來之相若以正智而觀性真常中求於去來迷悟生死了無所得矣此特示一心真源而從前破妄所顯者妙極於斯向下五蘊三科七大一一會歸藏性方盡真空之體也上直指一心竟二頓融萬法分三初會三科以顯即事即理分四初會五陰一會色陰阿難云何五陰本如來藏妙真如性阿難譬如有人以清淨目觀晴明空唯一晴虗迥無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是阿難是諸狂華非從空來非從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼是故當知色陰虗妄本非因緣非自然性議曰此會色陰也清淨目喻真智晴明空喻真理瞪喻無明勞喻妄見狂華喻妄相乃色陰也約空目以辨無體若了狂華不從空來不從目出則知色陰本無所有全一虗妄也二會受陰阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤跡必有覺心知出知入自有一物身中往來何待合知要名為觸是故當知受陰虗妄本非因緣非自然性議曰此會受陰也宴安調適本無違順諸受也二手相摩則冷暖觸現約空掌以辨不從空來不從掌出足知觸受無體受陰本無所有全一虗妄也三會想陰阿難譬如有人談說酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與說相類是故當知想陰虗妄本非因緣非自然性議曰此會想陰也談說酢梅而口水出思踏懸崖而足酸澀此陳妄想之狀也約梅口以辨想陰無體如是酢說應云如是口水然口水因談梅而有若此口水從梅而生則梅合自談則水在梅不在口矣若從口出且因聞談梅而出則當是口聞不待耳矣若獨因耳聞談梅而水出則此水當從耳出不從口矣踏崖相類如是推窮則想無實體足知想陰本無所有全一虗妄也四會行陰阿難譬如暴流波浪相續前際後際不相踰越行陰當知亦復如是阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此暴流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流是故當知行陰虗妄本非因緣非自然性議曰此會行陰也暴流相續以喻行陰之相也此約四法以辨無體謂因空因水即水性離空水謂此流若因空而生則十方虗空成無盡流是則空所遍處流亦遍滿一切世界皆淪溺矣豈有是理哉若因水有則此流性應在水外以是水之所有故若有所有相則今當止水可指流性矣若流是水性則流者是水而澄湛者應非水矣若離空水且空不外於水水外則無流如是推窮而此遷流之行陰竟何有耶足知全一虗妄也五會識陰阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是阿難如是虗空非彼方來非此方入如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出是故當知識陰虗妄本非因緣非自然性議曰此會識陰也瓶喻中陰身空喻識兩孔喻見聞人死見聞悶絶故喻塞識被業牽故喻往他國若執有識隨身往來者此處識滅往彼處生如瓶盛此方虗空遠餉他國則本瓶地應少虗空而彼處倒瓶應見空出故知虗空不動則識無去來而以計識隨生死去來者妄矣由不達識體本空故噫如來妙辨推窮曲盡其理總顯五陰本一虗妄了無實體若知五蘊元無則真空藏性顯矣三科七大一一皆然
