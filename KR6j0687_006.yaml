body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二觀音耳根圓證分三初述觀行所由爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地二述根獲圓通分三初此根初解先證人空分二初亡前塵初於聞中入流亡所所入既寂動靜二相了然不生二盡內根如是漸增聞所聞盡二空性圓明以證法空分二初遣觀智盡聞不住覺所覺空次遣重空空覺極圓空所空滅三俱空不生頓證一心生滅既滅寂滅現前三述入流成正覺分二初總顯頓超十地忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰議曰此觀音耳根圓證也於音言觀則已不用耳聞矣所師之佛名觀音者顯法有所本也從聞思修者謂從聞中思而修之也初於聞中入流亡所等者即前云此根初解先得人空也六根順流奔境故隨情造業今於耳根思修則不緣外境矣入流者返流也謂逆彼業流返觀聞性則不由前塵所起知見而聞性現前塵境遂空故曰亡所且未觀聞性之前以境有動靜則聽不出聲矣今觀聞性寂然則境無動靜之相故曰了然不生是亡前塵也如是漸增等者由境寂滅復增觀行以所聞聲塵既無動靜則此聞根亦泯故曰聞所聞盡此盡內根也盡聞不住等者此空性圓明成法解脫也謂根塵雙泯為盡聞處而亦不住盡聞之覺更增觀行根塵既泯而此觀智亦亡故覺所之覺亦空此空觀智也空覺極圓等者謂空觀智之空至於極圓之處則空所空之空亦任運而滅故曰空所空滅此泯諦理遣重空也生滅既滅等者明俱空不生也如此重重遮遣至於無遣故曰生滅既滅寂滅現前此妙行已圓而三諦一心平等顯現故能忽然超越也一念頓證故曰忽然十界依正皆寂滅一心所現影像故曰超越圓滿十方洞然無礙故曰圓明即前云明相精純一切變現不為煩惱皆合涅槃清淨妙德故上合諸佛本妙覺心圓照自心衆生無不願度故曰同一慈力下與六道一切衆生共一法身以衆生心中之悲仰即諸佛拔苦之覺地故曰同一悲仰此二最勝一時獲得是所謂圓通超餘者也二別顯妙用無方分五初證同體慈能三十二應世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土議曰此觀音所證由無緣慈上等佛心故能三十二應以顯妙用無方也楞伽説有三種意生身謂三昧樂意生身此當八地覺法自性性意生身此自九地至等覺種類俱生無行作意生身此由等覺入妙覺位聖種類身一時俱現觀音以如幻聞熏聞修金剛三昧力故一念頓證妙覺而三十二應正當種類俱生無行作意生身所謂普門示現也世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為説法令其解脫議曰十地菩薩坐寶華王座垂成正覺亦須別佛説教聞熏令斷最後生相無明故觀音現佛身而説法也勝解現圓此指最極根本無分別智將圓滿時此正等覺位觀行所證之智也以離因位故曰解脫若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為説法令其解脫議曰此現獨覺身説法也獨覺出無佛世觀緣悟道亦名麟喻言其獨也中乘各有資加二行名為有學此後斷惑便證無學約自乘理智將證未證故曰寂靜妙明菩薩現同類身而為説法令其證入故曰解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為説法令其解脫議曰梵語辟支迦羅此云獨覺亦云緣覺獨但自悟即前所現緣覺依教觀十二因緣作流轉還滅二種觀門未發真前名為有學用七十七智推因審因理智將圓故曰勝妙現圓菩薩現同類身而為説法令其解脫也若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為説法令其解脫議曰此現聲聞乘人也四果前三名有學第四阿羅漢果名為無學將證生空故曰勝性現圓菩薩現身説法令其速證上現三乘身也若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為説法令其解脫議曰此現修梵天行也厭欲界是苦是粗是障欣禪天是靜是妙是離故曰欲身清淨故菩薩現身為説四禪出入定法令其離欲生於梵世此現色界天身也若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就議曰此現修地居天行也愛統諸天謂帝釋居忉利天統三十三天也為説上品十善法令其成就若諸衆生欲身自在遊行十方我於彼前現自在天身而為説法令其成就議曰此現欲界第三四天也慈恩云得異熟果隨意所念勝下二天下二天果依樹而得今隨欲得故名自在若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為説法令其成就議曰此現大自在天也樂變化天他化自在樂自樂他變為樂具而受用之名大自在若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為説法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就議曰天大將軍即帝釋所管將也分住三十二天各領鬼神鎮護四方四天王者下界之初天於須彌腰各居一埵統領鬼神每王二部共八部神救護國界天王太子即那吒之類輔政統攝護世益人菩薩現同類身先令成就後令出離上現六欲天身也若諸衆生樂為人王我於彼前現人王身而為説法令其成就議曰此現人王身也王者往也人皆歸往四輪粟散皆人之主以上化下物無不從若諸衆生愛主族姓世間推讓我於彼前現長者身而為説法令其成就議曰此現長者身也長者具有十德謂姓貴位高大富威猛智深年耆行淨禮備上歎下歸十德全備名大長者若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就議曰此現居士身也博聞強識不求仕宦隱居求志故名居士若諸衆生愛治國土剖斷邑我於彼前現宰官身而為説法令其成就議曰此現宰官身也國域也封也有功者封於此也邑縣邑各有所典故曰宰官此葺治家移訓風俗剖判決斷民之枉直也若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為説法令其成就議曰此現婆羅門身也婆羅門此云淨行呪禁算藝調養方法皆為數術菩薩乘機現相獎而成之亦何物而不化若有男子好學出家持諸戒律我於彼前現比丘身而為説法令其成就議曰此現比丘身也尸羅此云戒毗尼此云律由依律法防非止惡故名為戒即二百五十戒也若有女人好學出家持諸禁戒我於彼前現比丘尼身而為説法令其成就議曰此現比丘尼身也尼女聲即女比丘持五百戒也既戒德自嚴軌物成化進行彌速遠出三界若有男子樂持五戒我於彼前現優婆塞身而為説法令其成就若有女子五戒自居我於彼前現優婆夷身而為説法令其成就議曰此現男女二身也優婆塞此云近事男優婆夷此云近事女樂持五戒志慕清淨菩薩現身説法令其成就五戒者一不殺二不盜三不邪淫四不妄語四不飲酒衆生持此則成佛真因從是建立若五戒不持人天路絶若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為説法令其成就若有衆生不壞男根我於彼前現童男身而為説法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為説法令其成就議曰現女主等身所以修家國而益羣生此菩薩之能事宜為説法令其成就也若童男童女皆志慕貞潔者上皆因所願慕而令其成就者也若有諸天樂出天倫我現天身而為説法令其成就若有諸龍樂出龍倫我現龍身而為説法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為説法令其成就若乾闥婆樂脫其倫我於彼前現乾闥婆身而為説法令其成就若阿修羅樂脫其倫我於彼前現阿修羅身而為説法令其成就若緊那羅樂脫其倫我於彼前現緊那羅身而為説法令其成就若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為説法令其成就議曰此現八部之形令其出類也天厭樂龍怖苦乾闥婆帝釋之樂神也性蕩逸藥叉勇健修羅似天而無天德性多慢故緊那羅云疑神似人而頭有角摩呼羅蟒形而腹行此雖在佛會為八部之衆而宿因毀戒惡緣故墮斯類今願慕出倫故菩薩現身一一説法令其成就也若諸衆生樂人修人我現人身而為説法令其成就若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為説法令其成就議曰此現人非人身也六道之中唯人身難得故曰鬼神沈幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天耽樂可以整心慮趣菩提唯人道為能耳故樂人修人謂可以親近三寶見佛聞法故也有形無形等者有形謂有色蘊如下休咎精明等無形謂無色蘊如空散消沈等有想謂有四蘊如鬼神精靈等無想謂無四蘊精神化為土木金石等此非人類也是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就議曰此結歸觀心也盡法界身本無出沒何有升沈但以迷本圓明是生顛倒則知九界衆生皆妙淨明心之影像猶如空華亂起亂滅故出世三乘依之而遠離三界異類以之而輪回菩薩圓證此心故一切影現於寂滅心中隨其所欲而一一成就非唯成就彼衆實顯自性圓明以不外於一念特應現之速耳故結名曰皆以三昧聞熏聞修無作妙力自在成就也二證同體悲能十四無畏世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德議曰此由與諸衆生同一悲仰故令得十四無畏功德也言以金剛三昧無作妙力等者以菩薩身心與諸衆生無有二相故菩薩之三昧即衆生之業用衆生之悲仰即菩薩之悲仰也故於菩薩身心之中令諸衆生獲十四種無畏功德殆非有彼此而加之使然也一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫議曰由菩薩不自觀音但觀聞性根塵頓脫故令苦惱衆生觀自稱菩薩之音聲即脫其苦也觀菩薩音聲者如衆苦逼急忽稱菩薩名號一聲即此一聲稱性而發全體現前則苦不期脫而自脫矣如人疾苦必呼父母或呼天而苦即易忍類此可知二者知見旋復令諸衆生設入大火火不能燒三者觀聽旋復令諸衆生大水所漂水不能溺議曰知見耀而若火聞聽沸而若水始由四大分湛今自既旋復一元則了無塵相故令衆生水火不能害也四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害議曰妄想如鬼物所以戕害法身而傷慧命者今自既斷除故令衆生鬼不能害也五者熏聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動議曰以三昧力熏妄聞以成真聞則六根銷復無有形礙殺害為其有身今銷形同聲無塵可對既無塵可對則了無可觸以心水湛淵慧光圓滿故能令刀兵如割水吹光性無動搖矣六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視議曰聞熏精明慧性發光則諸暗相永不能昏鬼魅生於幽暗今既圓明故令諸鬼咸受幽氣如羅剎不能見太陽故目不能視七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著議曰諸塵繫纍六根桎梏今既觀聽返入離諸塵妄故能令禁繫枷鎖所不能著繫縛生於貪著今既離塵則自不著矣八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫議曰六為賊媒自劫家寶劫奪生於敵對今既滅音圓聞則六塵頓空平等一照了無自他故雖涉險而賊不能劫九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚議曰貪欲以緣塵愛取瞋恚以逆境激心今以聞熏離塵根境皆空既無可取亦無可對所以能令衆生遠離貪欲瞋恚也十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗議曰阿顛迦一闡提也此言無信根良以癡暗覆心故不生實信今以聞熏三昧銷塵復明身心洞然永破諸暗故能令昏鈍性障衆生永離癡暗也十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男議曰男子有幹事之能融形復聞故形隨聞性周遍法界由涉入世間則能一身為無量身供佛則表其能事為法王子則克紹家業以供佛故福德具足以三昧故智慧圓滿由此故令無子衆生即得福德智慧之男也宜矣十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女議曰女有柔順之德六根圓通性無違逆隨順之至也立大圓鏡空如來藏虗受之至也故微塵如來祕密法門皆能受領女德之象也故令求女衆生誕生端正柔順之女也十四者此三千大千世界百億日月現住世間諸法王子有六十二恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通議曰六十二恆河沙數諸法王子以權實二智教化衆生雖各各不同然皆不離法界海慧今既得圓通本根則身心微妙周遍法界即可以一身為無量身又豈可以名數限量哉全體既彰則一多互融所以能令持一名號與彼衆多無異而所求福德亦無有異也由我修習得真圓通結成所以也是名十四施無畏力福備衆生議曰此結名也三妙契涅槃能四思議分二初總示世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德議曰由妙契涅槃故得四不思議此總標也由前云一切變現不為煩惱皆合涅槃清淨妙德以佛神力不可思議衆生業力不可思議皆一心變現之妙言思路絶不能名狀其相也今觀音圓證一心故諸佛全體業用自在隨機適時不可以類推心不可思言不能議是謂無作妙德也二別示分四初現衆多妙容一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆生妙容能説無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在議曰此別明現容説呪不可思議也根境雙融曰妙體絶稱謂曰妙妙以脫粘遺聞故六用不隔純一圓明清淨寶覺此德本已立則大用無方故能現衆多妙容能説無邊神呪也首出於衆物手有提接之功目有照明之德以衆生迷本妙明而為八萬四千塵勞煩惱故衆生業力不可思議今圓證一心故轉業力而為妙用故首出於羣相手應接無方目照明無礙此所以一切變現不為煩惱皆合涅槃清淨妙德故神力不可思議也通身手眼毛孔光明齊觀並挈調伏衆生應攝應折故曰或慈或威或以定動或以智拔故曰或定或慧所以得大自在也二現衆多妙形二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者議曰衆生六塵隔礙動必有苦故多畏菩薩以聞思三昧之力六塵既脫無復障礙則身能妙現多形心能妙誦多呪以形攝受以呪加持故能令衆生得離怖畏以此身心妙應無方故微塵國土皆以施無畏者稱之也三能過化存神三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍議曰菩薩以三昧力永離諸愛故能令衆生捨身珍寶而求哀愍也四能感而遂通四者我得佛心證於究竟能以珍寶種種供養十方如來傍及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃議曰由以三昧力已得佛心究竟平等故能以無限法施回向是以種種珍寶供十方佛傍及六道一切衆生而世出世間凡有所求無不獲益也四結指定名佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一議曰此結屬觀門也耳門圓根從聞思修故名圓照三昧法界一緣故心自在始從逆流終成大定故因入流相得三摩提此為第一也五述名由實立世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界議曰所師之佛名觀世音授以如幻聞熏聞修金剛三昧故得如上無量功德是以果覺為因心也今蒙授記為觀世音者謂因果一如始終無二也觀聽圓明則微塵普照故心遍而名亦遍如日月照臨之地而人皆知為日月也故名遍十方良以清淨圓明寶覺真心衆生本具但由無明暗蔽根塵妄隔愛取牽纏所以常在生死而不能超出者此自心取自心之過也今依圓通本根聞熏聞修金剛三昧則稱性法界圓照十方根塵識心應時消落法界大用一念現前故三十二應十四無畏四不思議等微妙功德猶是以限量心知其少分耳其實全體顯現安可以數量求之哉已上從憍陳那至此各述初心方便竟二主伴齊證爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏議曰此如來圓證諸聖圓通也二十五聖各證法門獨耳根最勝以性圓周遍體叶真心根塵妄隔性自圓通四大壅閼一真無礙為諸佛入理之門實衆生歸源之路所以觀音自陳所證功德難思堪任此界當機最初方便故諸佛主伴齊證依正光網交羅此極盡一心之源普遍微塵世界通身吐露徹底掀翻故世尊五體同放寶光遠灌十方微塵諸佛菩薩而彼諸聖亦同放寶光來灌佛及諸大衆頂也且林木池沼皆演法音交光相羅如寶絲網者正表自他不二依正互融有情無情齊成佛道所以是諸大衆一切普獲金剛三昧此則消習漏於剎那廓衆塵於一念萬行備於性天寶覺圓於實際故天雨百寶蓮華虗空成七寶色淨穢情亡故娑婆隱而不現根塵消復故十方合成一界至此則林木池沼皆演圓音風動水流通成法喜故梵唄詠歌自然敷奏同為證成共宣法利真實圓通其驗如此三敕文殊揀選智證分二初如來特命於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各説最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就二文殊奉敕分二初三業請加文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神説偈對佛議曰此佛敕文殊揀選圓通也言彼等修行實無優劣者以三乘等觀性空而得道也但心有大小為差耳既云實無優劣則門門皆可還源矣但剋合此方之機令其順而易入故須揀選非大智不能具揀法眼故特敕文殊也二正陳偈頌分十二初半偈顯一心真源覺海性澄圓圓澄覺元妙二偈半顯依真起妄元明照生所所立照性亡述妄有虗空依空立世界想澄成國土知覺乃衆生三偈半顯返妄歸真空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有四半偈顯歸源無二歸元性無二方便有多門五一偈顯揀選所因聖性無不通順逆皆方便初心入三昧遲速不同倫議曰文殊奉命將擇之初先立一真法界為迷悟之本也法界一心廣大悉備故譬如海普納百川也謂此覺性本來湛寂圓通故曰覺海性澄圓圓湛之覺元來妙明絶諸對待不屬悟迷故曰元妙以元明體中本有大智慧光明遍照法界義故唯是一真了無能所之相忽爾妄動於圓明體中遂形所相故曰圓明照生所所妄既立則生妄能而元明之性失之矣故曰所立照性亡由無明力覆蔽靈明之妙空變為頑然無知之虗空故曰迷妄有虗空依此頑空結成四大之幻色故曰依空立世界由妄澄結而為無情之國土色雜妄想想相為身故成有情之衆生此虗空世界衆生皆因迷妄而有此言迷真起妄也虗空雖是廣大然於大覺心中如海中之一漚耳況依空所生之世界豈不渺乎小哉若漚滅則虗空本無何況空中之國土又何從而寄耶故下經云一人發真歸元十方虗空悉皆消殞何況空中所有國土而不振裂故曰況復諸三有今欲返妄歸真固當作如是觀也是則頓悟一心本不假於方便真實歸元之性本無有二但隨根不一各從其便故方便有多門耳在於聖性無往不通何須揀擇若順若逆皆為方便但以初心方便若順而易入則收功速若逆而難入則取效遲故須用揀選以便悟入也六二十四偈顯揀非當機分二初揀三科分三初六塵一優波尼色想結成塵精了不能徹如何不明徹於是獲圓通二憍陳那音聲雜語言但伊名句味一非含一切云何獲圓通三香嚴童子香以合中知離別元無有不恆其所覺云何獲圓通四藥王藥上味性非本然要以味時有其覺不恆一云何獲圓通五跋陀婆羅觸以所觸明無所不明觸合離性非定云何獲圓通六摩訶迦葉法稱為內塵憑塵必有所能所非遍涉云何獲圓通二五根一阿那律陀見性雖洞然明前不明後四維虧一半云何獲圓通二周利槃特迦鼻息出入通現前無交氣支離匪涉入云何獲圓通三憍梵鉢提舌非入無端因味生覺了味亡了無有云何獲圓通四畢陵伽婆蹉身與所觸同各非圓覺觀涯量不冥會云何獲圓通五須菩提知根雜亂思湛了終無見想念不可脫云何獲圓通三六識一舍利識見雜三和詰本稱非相自體先無定云何獲圓通二普賢菩薩心聞洞十方生於大因力初心不能入云何獲圓通三孫陀羅難陀鼻想本權機祇令攝心住住成心所住云何獲圓通四富樓那説法弄音文開悟先成者名句非無漏云何獲圓通五優波離持犯但束身非身無所束元非遍一切云何獲圓通六大目犍連神通本宿因何關法分別念緣非離物云何獲圓通次揀七大分七初地大持地菩薩若以地性觀堅礙非通達有為非聖性云何獲圓通二水大月光童子若以水性觀想念非真實如如非覺觀云何獲圓通三火大烏芻瑟摩若以火性觀厭有非真離非初心方便云何獲圓通四風大琉璃光法王子若以風性觀動寂非無對對非無上覺云何獲圓通五空大虗空藏菩薩若以空性觀昏鈍先非覺無覺異菩提云何獲圓通六識大彌勒菩薩若以識性觀觀識非常住存心乃虗妄云何獲圓通七見大大勢至法王子諸行是無常念性元生滅因果今殊感云何獲圓通七十二偈半的指圓通要妙分二初十偈半指法顯勝分二初偈半指法我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入議曰此文殊揀選二十四聖皆不堪任此方之機何耶若於六塵而入六塵妄結而不一若於五根而入五根隔越而不通若於六識而入六識則生滅宛然若於五大而入五大則無知昏鈍若於識大而入識性本非常住若於見大而入念性元是無常是皆不合此方之機難入圓通根本以此方真教體清淨在音聞若欲速取三摩提實從聞中而入即時離苦得解脫也次九偈顯勝分二初十句讚能修人勝離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住議曰此總歎觀音之德也入微塵國得大自在此歎三十二應也無畏施衆生此歎十四無畏也從音入妙故曰妙音聖人無己以物為己故唯觀世間音聲以成己德故曰觀世音於音無著故曰梵音應不失時故曰海潮音以此故令世出世間皆獲利益故安寧常住也次二十六句讚所入根勝分二初顯獨勝餘根分三初六句圓勝我今啓如來如觀音所説譬如人靜居十方俱擊鼓十處一時聞此則圓真實二八句通勝目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實三八句常勝音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實次結餘根不及縱令在夢想不為不思無覺觀出思惟身心不能及次二偈顯迷悟因依今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄議曰我今下五偈半正歎圓通之妙也十方擊鼓十處齊聞了無分別彼此之相此圓真實也隔垣聽音響此法性通遍遠近皆聞五根之所不齊此則通真實也音聲雖有動靜聞性不屬有無不因聲生不從聲滅遠離有無生滅此則常真實也以此足證二十四聖之所不及也縱令下一偈總歎超越身心以身心有寤寐開合而聞性不為夢想所昏至若夢中尚聞杵聲雖作他物不是無聞是所謂不為不思而無也以五根發識皆有遍行之思不能圓照獨耳根虗融音聲一到則無思無念寂然而照特出思惟之表此身心之所不能及也今此下二偈正顯克合此方之機以諸佛國土説法不同非獨語言以娑婆世界衆生耳根最利但以聲論宣明道理非耳不能了達以聞性即本圓法性由衆生迷本有之聞性故流轉於生死縱阿難之強記多聞以不達聞性亦不免落於邪思是知此界耳根關係甚重豈不是隨音聲則淪生死旋聞機則獲真常無妄哉是以獨選耳根為妙也八十七句結法勸修分三初五句結指定門阿難汝諦聽我承佛威力宣説金剛王如幻不思議佛母真三昧二四句責多聞無益汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤三八句勸真修有功分四初正勸修將聞持佛佛何不自聞聞二聞非妙悟聞非自然生因聲有名字三妙悟絶言旋聞與聲脫能脫欲誰名四離言頓證一根既返源六根成解脫議曰此結法勸修以顯法勝也阿難下五句結法也汝聞下一偈顯多聞無益將聞二句勸修也諸佛由此三昧而出故曰佛母諸佛言教文字般若即法身所在法亦名佛故曰持佛佛謂雖能持他佛之法如人數他寶自無半錢分故不若返照自己聞性以成真實三昧即可頓證菩提也聞非下六句顯妄不是真謂逐聲塵之聞根非自然生要因聲顯特妄聞之名字耳若旋其妄聞而脫聲塵則能脫者當誰名耶此所以一根既返源六塵成解脫也九七偈半示觀相分三初正示三觀涉入分三初四句從假入空見聞如幻翳三界若空華聞復翳根除塵消覺圓淨二六句從空入假淨極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形三十三句從空假入中分二初喻明如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性二法合六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念消成圓明淨妙二二句明觀淺深餘塵尚諸學明極即如來議曰此二十五句依耳根圓示三觀之相也見聞下一偈顯從假入空觀舉見聞則該知覺總示六根虗妄猶如幻翳通觀三界總若空華但於聞性旋復則六根併除六塵亦消而本有覺性自然圓淨矣此由觀假以入空也淨極下一偈半顯從空入假觀也若諸塵淨極則心光獨露通達無礙寂而常照包含虗空自性圓明回觀世間如夢中事耳若以此觀安心則摩登伽亦在夢中誰能留汝形骸耶此由空以涉假也如世巧幻師下十五句顯從先假次空以入中道觀也初一偈半設喻機喻識性若息機寂然則諸幻無性幻事亦不成矣下七句法合六根亦如幻事耳元依一精明之識體分成六用之和合若一處休復則六用不成一破根本無明則根塵識三皆是真心之塵垢則應念消亡而向之無明昏昧之識體轉成圓明淨妙之德矣是則不墮空假而頓證一心中道矣耳根三昧妙絶於斯豈可不亟圖修習哉餘塵下二句明觀淺深若餘塵未淨尚在學位若妙心明極則成如來是所謂去泥純水名為永斷根本無明故徑登佛地也三五句示解結之方大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是十兩偈半例結同證此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非惟觀世音議曰此十五句總結觀行以顯因果同證也大衆下五句正結觀行謂此耳根圓通並無別法但旋汝等倒妄之聞機返聞自己之聞性若聞性圓明則頓成無上道矣最為簡要又何別求佛法哉圓通真實如是而已此是下十句顯同證此是十方諸佛一路涅槃門也過去已成之佛皆由斯門成就即現在菩薩各入圓明未來修行當依此法文殊自謂我亦從中證不但觀世音以此親證法門足證真實無妄也十一四偈報命請加分二初十一句報命誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是長修學淺深同説法次五句請加頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就十二五句的授當機堪以教阿難及末劫沈淪但以此根修圓通超餘者真實心如是議曰此報命請加以的授當機也誠如佛世尊下十一句報命也謂誠如世尊詢問我擇諸方便門若易成就涅槃心無過觀音耳根為最也其餘諸方便門雖云實無優劣於我揆之皆是仗佛之威神令其即事以捨塵勞非是可以通長修學淺深同説一貫之法也頂禮下五句請加也然請加宜獨請佛今頂禮如來藏乃指法也以如來藏乃三德祕藏三身圓證三寶圓具一體無礙云不思議故但禮其法而三身三寶具焉所以願被未來於此耳門分明無惑唯此方便最易成就故末後的授當機此可以教阿難及末劫衆生但依此根修則圓通實超餘者真實心要如此而已是以自誓不妄也上敕文殊揀選圓通竟三當機領悟於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路四法會獲益普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨性比丘尼聞説偈已成阿羅漢無量衆生皆發無等等阿耨多羅三藐三菩提心議曰此法會獲益也阿難所問諸佛成道最初方便佛示之曰十方薄伽梵一路涅槃門又曰菩提涅槃尚在遙遠故聞圓通本根身心了然故於菩提涅槃如人遠遊雖未歸還已知歸家道路則自信決定無疑矣普會大衆皆得本心獲法眼淨性比丘尼得阿羅漢果其餘衆生皆發菩提心者由聞説圓通本根之利益也從前請入華屋以來至此通示妙圓自利理行竟二示利他妙圓事行分二初當機陳請分三初自利功圓阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑二陳利他願廣常聞如來説如是言自未得度先度人者菩薩發心自覺已圓能覺他者如來應世我雖未度願度末劫一切衆生三陳利他所為分二初為邪道亂真世尊此諸衆生去佛漸遠邪師説法如恆河沙二為催邪顯正分二初問攝心軌則欲攝其心入三摩地二問安立道場云何令其安立道場遠諸魔事於菩提心得無退屈二世尊許説分二初讚許誡聽爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救獲衆生末劫沉溺汝今諦聽當為汝説阿難大衆唯然奉教議曰此問利他行也心所乃心行處謂之心迹向以無明暗覆故為所使今聞開示生滅頭數了然自見故曰圓明已知衆生同體故自未度先願度人故為利他行也懸知末世邪師説法趣菩提者難以得正熏修不知如何為攝心軌則如何安立道場遠諸魔事也此先答攝心軌則以三無漏學為修行之本次許説分際分二初答攝心軌則分二初總示三無漏學為修行之本佛告阿難汝常聞我毗奈耶中宣説修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學議曰此略標三決定義為修行之本也毗奈耶云律謂欲修定慧必以戒為基本故曰攝心為戒則定慧由之而生也意以戒為重故定已説此特宣戒故下令持四根本戒制斷發業潤生二種無明二別示三聚戒為成佛之基分四初略出戒體阿難云何攝心我名為戒二正示修相分五初令持四根本戒制斷發業無明分四一不淫戒分六初通顯能持利益若諸世界六道衆生其心不淫則不隨其生死相續二顯不持過誤汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路三令依教當持汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨四顯持犯得失是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫祇名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證五以必斷為真必使淫機身心俱斷斷性亦無於佛菩提斯可希冀六以實相印定如我此説名為佛説不如此説即波旬説議曰此示修三無漏學以戒為本而以淫戒為首也戒有多品以四重為先梵網諸本皆以不殺為首此經獨以斷淫為首者彼約利生以佛性種子而觀衆生故首斷殺此示真修以淫欲為生死根本故先斷淫故曰其心不淫則不隨其生死相續梵網經説盧舍那佛坐千華臺一葉一釋迦奉舍那敕以心地法門金剛寶戒宣傳於十方世界若人受佛戒則登諸佛位是知釋迦出世説法四十九年但傳舍那所説金剛寶戒而已以此經統收一代時教修證理行因果首楞嚴大定乃成佛真因以戒為本戒心清淨即入佛位故此經云其心不淫則不隨其生死相續前云衆生相續欲貪為本故今願出生死必以斷淫為第一也修禪之人若不斷淫如以甘露灌溉毒樹灌溉益深而毒氣愈盛所以必落魔道也蒸砂作飯終竟不成以非飯本也以淫心而求佛妙果縱得妙悟皆滋淫根生死轉劇何以得出三塗登涅槃之路哉斯之一法先執身不行次執心不起故曰必使淫機身心永斷如此可以冀佛菩提苟不痛心刻骨必成魔説矣二不殺戒分六初通顯能持利益阿難又諸世界六道衆生其心不殺則不隨其生死相續二顯不持過誤汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸溼加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沈生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界三令依教當持汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨四顯持犯得失是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地五以必斷為真必使身心於諸衆生若身身分身心二塗不服不食我説是人真解脫者六以實相印定如我此説名為佛説不如此説即波旬説議曰此第二誡決定不殺戒也修禪若不斷殺必墮鬼神羅剎之類以此類專恣殺業今以殺習感召故也律部佛許比丘食五淨肉謂自死鳥殘不見殺不聞殺不為己殺皆得食之嗣後比丘皆恣鮮美自殺而食佛遂制止況五淨肉皆神力所化本無命根食之猶可今則真食血肉豈慈悲者哉羅剎飛行而食生物者言其殺心熾盛也殺生冤債相牽云何欲出生死耶是故修禪必以斷殺為本也服其身分恐為彼緣況食肉乎必使身心二塗不服不食是人名為真解脫者不如此説即波旬説也三不偷戒分六初通顯能持利益阿難又復世界六道衆生其心不偷則不隨其生死相續二顯不持過誤汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等羣邪亦有徒衆各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿姦欺內心稱善知識外貌詐現有德各自謂己得上人法詃惑無識恐令失心所過之處其家耗散我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我説是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異三令依教當持汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨四顯持犯得失是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有入捶詈同於稱讚五以必斷為真必使身心二俱捐捨身肉骨血與衆生共不將如來不了義説回為己解以誤初學佛印是人得真三昧六以實相印定如我所説名為佛説不如此説即波旬説議曰此第三誡決定不偷戒也此偷非偷盜之偷乃偷心也謂貪求施利潛匿姦欺詐現有德稱善知識多取資具誑惑而取與盜竊等而酬償亦等故教比丘循方如法乞食令捨貪也蓋以不達五蘊虗假故多取資財以養身命本無道德假佛形服所謂裨販如來信心難消必償宿債是故生死不能出離佛教比丘然燈然指捨正報之身酬身外之負蓋以微因而償多欠也佛於毗蘭邑王馬廄食馬麥三月以先世詬罵比丘為食馬麥者故償此報以一惡言尚必酬之況多貪乎此必難逃其負也前業果相續乃強取衆生之血肉起於殺貪此乃妄取衆生之資財起於盜貪故通名偷盜以滋生死之業果一也若不斷偷以定水而灌破戒漏巵終無益也衣鉢之餘分寸不畜乞食之餘施餓衆生不貪之至也以捶詈而同稱讚無我之至也心不起瞋身不加報是為身心二俱捐捨且觀己身血肉與衆生共平等無二況身外之長物乎非得真三昧者不能也反此即為波旬説矣四不妄語戒分六初通顯能持利益阿難如是世界六道衆生雖則身心無殺盜淫三行已圓二顯不持過誤若大妄語即三摩地不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沈三苦海不成三昧我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學唯除命終陰有遺付云何是人惑亂衆生成大妄語三令依教當持汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨四顯持犯得失是故阿難若不斷其大妄語者如刻人糞為栴檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就五以必斷為真若諸比丘心如直弦一切真實入三摩地永無魔事我印是人成就菩薩無上知覺六以實相印定如我所説名為佛説不如此説即波旬説議曰此第四誡決定不妄語戒也此妄語業由貪癡慢起以貪求世人名聞利養故造大妄語謂未得謂得未證言證自言得三乘聖果此由愚癡起增上慢故為愛見魔也一顛迦即斷善根者此輩銷滅佛種沈三苦海不成三昧蓋佛以四攝法現同類身教化衆生非貪供養也若是真聖亦不自泄違佛密因除臨終時陰有所付云何是人以大妄語惑亂衆生耶故教世人修禪定者必斷妄語乃可得入三摩地也刻人糞為栴檀祇增其臭穢耳直心者心不欺也自無實德妄稱得上人法此欺心之至也噬臍言終不相及也心如弦直則永無諸委曲相是為入道之本也故永無魔事佛所印許違越誠言則波旬説矣梵網戒品十重四十八輕普攝一切名為性戒是以佛性種子等觀一切此經以真修務斷生死根本以淫殺盜妄是為性業故首斷此四為根本戒若能持此四戒則一切枝末永不現行是知此四已攝梵網諸品而三聚五篇盡在是矣前令持四根本戒制斷發業潤生二種無明竟
