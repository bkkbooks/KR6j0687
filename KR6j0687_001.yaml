body:
  text: 明南嶽沙門憨山釋德清述懸判議曰從前釋經諸師凡解當經必先懸判十門要令學者知我如來應世四十九年所說一大藏教從始至終而有五時五教之別謂小始終頓圓而有淺深次第之不同刻指一經定屬何時何教此乃注釋之軌則如賢首清涼已後皆祖述之莫不皆然獨此一經前後解者凡十餘家各據一見所指之時前後不同多起諍論難決衆疑豫嘗見有本別題亦名灌頂部中録出別行因諦觀此經非一時頓說向無的據既見長水注疏經本別題一名中印度那蘭陀大道場經於灌頂部中録出別行璿師判云佛說此經非一時頓說說必前後是知集者約類纂為一部以此為準的信不疑但詳經中自名灌頂章句則集者約類可知矣請試言之然灌頂部乃我中央毗盧遮那佛所說之法也以毗盧乃法身佛也從法垂報名盧舍那坐菩提場演大華嚴謂之根本法輪但被一類大根衆生而小根之人如盲如聾故舍那世尊入剎那際三昧雙垂兩相現應化身示生三界名釋迦牟尼始從兜率降王宮入胎出胎以至出家苦行八相成道始於鹿苑說法歷方等般若法華等四十九年入大涅槃始終不出剎那際三昧所說一大藏教名為攝末歸本法輪亦名引攝教為引五性三乘攝歸一乘寂滅場地即指華嚴為妙莊嚴海為所歸之地猶如窮子之家而三觀妙門乃歸家之路所謂一路涅槃門也今觀此經發起示墮淫室此正阿含之時也其徵心以破執身常見匿王以破斷見乃阿含之教也其辨妄見以顯真見破見精以顯本覺義與深密同時也五蘊三科會歸藏性則同般若真空法華實相又歷兩時之間也七大遍周性真圓融實與華嚴理事無礙法界相等也及至四卷中云一為無量無量為一小中現大大中現小於一毛端現寶王剎坐微塵裏轉大法輪此乃略顯華嚴事事無礙法界正是所歸妙莊嚴海是謂究竟歸寧之地也三身一體至是乃顯釋迦出世之本懷教化衆生必欲引攝至此而後已是知此經無教不收無機不攝豈可局定一時哉蓋釋迦世尊所秉盧舍那佛一實相印是謂微密一心而空假中三觀法門乃為破惑之利具世尊出世即欲衆生證此一心奈何衆生煩惱垢重不敢頓示此心姑於阿含會上且說人天十善免墮三途及說無常苦空無我苦集滅道四諦及十二因緣之法令諸衆生權出三界免離生死所證涅槃謂之偏空執空而不能有以小乘不達唯識道理乃說解深密經以立九識依之而起八識變起根身器界要了妄相皆從唯識所變其相本空次說般若以顯真空幻有以破小乘偏空之執此去阿含四十年矣及至法華純談實相直示一心以顯中道涅槃乃明平等佛性三乘同歸五性齊入凡有心者皆得成佛方盡世尊出世本懷然涅槃尚未顯有圓融之旨今以此經所詮理趣通途按定一代時教攝法無遺況始從阿含終至涅槃尚係化佛所說之法而圓融道理乃屬華嚴為報佛所說由是觀之豈可局定一時哉若就法界海慧照之則釋迦說法四十九年始終不出剎那際三昧此乃劫念齊收無時之時實無先後若就應化門頭機有生熟從淺至深不無次第以一心法門佛佛同證三觀乃悟心之要以歷五時隨機不同故散出一代時教各對當機三根普收行布亦異故結集者慮恐末世修行之士智識狹劣而教海汪洋難究指歸故推報化二佛所說從本垂末攝末歸本二種法輪總於一代教中拈出一心特顯衆生從悟至迷以極七趣升沈之情狀會歸三觀按破二執以顯從迷至悟所證淺深五十五位之階差通會長途始終一貫攝歸一心從凡至聖直入果海不涉枝岐使修行之士一覽無餘如懸鏡智於目前了歸家之道路所謂一路涅槃門豈可局定一時哉苟不以理融通印契佛心即刻定一時於法奚益故弘通者貴在得本而不貴乎泥迹也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經議曰此經題目經中世尊自說有五種名今此一題存隱可知然此題雖一十九字而獨重在首楞嚴三字而已其上一十六字皆約義也釋首楞嚴此云一切事究竟堅固大定之總名也乃一心之異稱有法有義且此定體總之而為一心別之而為三觀然此三觀皆依一心而立起信論云心真如者即是一法界大總相法門體所謂如來藏清淨真心也依此心體有三種名一空如來藏二不空如來藏三空不空如來藏謂此心體本來清淨一法不立是故名空具有恆沙稱性功德故名不空三空不空者即此二體但是一心寂照同時寂故名空照故不空存泯無礙名空不空依此義故建立三觀由此三觀還證一心故云大定之總名也是謂之法上十六字乃其義者謂此一心具有體相用三大義故一者體大二者相大三者用大題稱大佛頂等乃示三大義也所言大者謂此心體廣博包含極法界量大而無外體絶名言強名大也佛頂者乃約喻以明相大也謂佛乃至極之聖頂乃最尊無上之頂佛相好中名為無見頂相故曰初生親捧持諦觀不見頂以此至極無相之頂以喻廣大無外之心無相而不可以見見故為相大也如來密因等者以明用大謂一切諸佛乘此一心以躋極果究竟無餘故云了義一切菩薩乘此一心到如來地故云萬行以此一心具上三義故為大定之總名向下阿難約義而請三觀佛答直指一心是知全經所演修證因果總之不出三觀究竟不離一心若以此心而照萬法則法法全真故云一切事究竟堅固若了一題則全經之旨思過半矣一名中印度那蘭陀大道場經於灌頂部録出別行議曰此別目也印度具云印特伽此云月印度有五此當其一西域之大國也那蘭陀此云施無厭即龍名也西域記云菴沒羅國有池池中有龍名施無厭寺近彼池故以為名大道場者西域諸寺獨此最大五天竺國王同共崇奉集性相二宗大德沙門居之佛法多積於此昔玄奘初至西域先至此寺從戒賢論師習唯識宗即其處也灌頂部者華嚴界中有五方佛所說之法各有一部中央毗盧遮那佛為主所說之法名灌頂部顯此經通為報佛所說故以此名既標那蘭陀大道場經則集者可知按長水疏存此題亦云此經非一時說中天竺沙門般剌密諦於廣州制止道場譯議曰此譯人名也天竺亦名乾竺亦名身毒亦名印度西域國名梵音楚夏耳般剌密諦此云極量譯師名也此經西域國王最所寶重嚴禁不許出境般剌三藏欲傳震旦屢竊而來皆被獲回必不能得後以微妙細㲲書之乃破臂藏於皮中遂航海而達廣州唐神龍元年乙丑五月二十三日適遇宰相房融知南銓在廣安三藏於制止寺翻譯而筆授之此經來之難也既而翻譯才畢以三藏潛來彼國邊境被責三藏為解此難遂回及房公入奏又遇中宗初嗣國方多事未暇宣布時神秀禪師入內道場見而抄寫遂流北地大通在內親遇奏經又寫歸荊州度門寺有魏北館陶沙門慧振常慕此經於度門寺得之後慤師於故相房融家得其譯本因而遂傳此經流通之難也昔天台智者大師作止觀成遇一梵師以止觀示之梵師曰此與西域首楞嚴經三觀大旨相同大師日夜西望拜求願見而未及見是見此經之難也今幸古今解者十餘家義疏闡幽發明殆盡方今緇白入此法門者不少而學者槩視為等閒豈知佛法之難遇哉烏萇國沙門彌伽釋迦譯語議曰烏萇此云苑國名也彌伽釋迦此云能降伏翻梵為華故云譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆授議曰菩薩戒弟子者乃宰官而受菩薩大乘戒者也戒經云欲受國王位時乃至百官受位時應先受菩薩戒一切鬼神救護王身百官之身也此經十卷準常有三分謂一序分序說法之因由故二正宗分正示一經之宗體故三流通分冀流傳於終古故入經先列序分初通序如是我聞一時佛在室羅筏城祗桓精舍與大比丘衆千二百五十人俱皆是無漏大阿羅漢佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫衆生拔濟未來越諸塵纍其名曰大智舍利弗此云鶖子摩訶目犍連此云采菽氏摩訶拘絺羅此云大膝富樓那彌多羅尼子此云滿慈子須菩提此云空生優波尼沙陀此云塵性空等而為上首復有無量辟支無學并其初心同來佛所議曰此通序法會之由也世尊說法之常儀乃佛遺制諸經通有故為通序所言六種成就及歎德列衆弟子氏族準常多解此不重出二別序屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷座宴安為諸會中宣示深奧法筵清衆得未曾有迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首時波斯匿王為其父王諱日營齊請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齊主唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍黎途中獨歸其日無供即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齊主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切衆生無量功德阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隍徐步郭門嚴整威儀肅恭齊法爾時阿難因乞食次經歷淫室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體如來知彼淫術所加齊畢旋歸王及大臣長者居士俱來隨佛願聞法要於時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪敕文殊師利將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所議曰此別序發啓此經之由致也休夏自恣乃佛律制比丘當初夏時即結制名為護生亦名坐臘九旬禁足無由見佛夏滿之日同詣佛所自有過失恣任僧舉佛為作法懺悔名為羯摩又云於坐夏中各為臘人隨身若有何根犯戒即壞其根則不算臘若全不犯者乃成一臘如世俗之一歲故出家以臘不以年而此經以休夏自恣為開端者以盧舍那佛說梵網經金剛寶戒命釋迦化佛宣布十方是知釋迦四十九年單演戒法意在出家修行出生死法以戒為基本也問曰此經理開藏性行依大定教屬頓圓而以阿難示墮淫室淺近之事發之者何耶答曰此如來說法有深意也經云佛以一大事因緣故出現於世所謂一大事乃一真法界如來藏清淨真心此心乃諸佛衆生均賦而同稟者也以衆生迷之故如來特因此出世開示衆生令其悟入故此實最大一事也然衆生既稟此心所以常寢生死久溺輪回永劫不得出離者皆由愛欲牽纏故也以其生死界中獨與真為對者亦唯此一事為大耳是為生死根本也故曰賴有一矣若使二同普天之人無能為道者今欲返妄歸真必須先拔生死根本故梵網戒經以斷殺為先此經以斷淫為首以此患最深非大定不足以破之故阿難示墮淫室以發端及歸來見佛先以大定為請也而開口便言欲氣粗濁向下世尊歷歷數其過患至於三種相續則曰想愛同結愛不能離則諸世間父母子孫相生不斷經百千劫長在纏縛唯淫殺盜三為根本又曰愛鏡中頭無故狂走又曰稱汝多聞何不能免摩登伽難待神呪力淫火頓滅愛河乾枯令汝解脫又曰汝雖憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦又曰摩伽耶輸同悟宿因貪愛為苦及安立道場首即告曰六道衆生其心不淫則不隨其生死相續淫心不除塵不可出縱有禪定必落魔道若不斷淫修禪定者如蒸砂作飯百劫難成淫身修行縱得妙悟皆歸淫根根本成淫三途難出必使淫機身心永斷至坐道場則曰心滅貪淫持佛淨戒至於證果之初則曰除其助因刳其正性違其現業又曰當觀淫欲猶如毒蛇又曰永斷淫心先則執身不行次則執心不起又曰心無貪淫於外六塵不多流逸塵既不緣根無所偶身心快然是人即得無生法忍從是漸修安立聖位欲習初乾則與如來法流水接等由是觀之則世出世間生與無生盡在淫心斷與不斷耳至若七趣由情想以取升沈三途因淫習而招劇苦及夫修禪之士以性欲而壞定心破法王而成魔屬毒哉此欲生死牢關長羈三界之囹圄永壞涅槃之安宅者無尚此矣苟非密嚴利器付之勇猛丈夫又何以拔之哉由此欲習最極幽深故世尊先放頂光以照之無為化佛祕密心呪以破之文殊大智以拔之斯則往救之由以示全經大定之體矣由是觀之因愛欲為生死之根大定為成佛之本意謂非大覺不足以破大夢非大法不足以除大患斯實真妄兩途覿體無二者矣故於正示觀相文中偈云如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性又曰靜極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形諦觀全經的指唯此一事故知發啓之由則見吾佛說之本意也二正宗分大科分二初大開修證之門從此起至第八卷中問結經名止二曲示迷悟差別從精研七趣詳辨魔陰終止初開修證門中通分四科初開三種如來藏以顯三觀之體此從初卷起至四卷中尚留觀聽止二示三觀之相從請入華屋起至第七卷中作如是願止三顯三觀之用從問四十四心起至第八卷中名邪觀止四結三觀之名文殊問結名止已上四科通屬大開修證之門初開空如來藏示空觀之體文有三卷分為二科初約生滅門中決擇真妄以顯本覺真心經至二卷半二約不生不滅會妄歸真以顯真空藏性從會五蘊起至三卷終初中二初當機請行阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨議曰此阿難因誤墮而請行也意謂妙奢摩他三摩禪那乃十方如來得成菩提之妙門阿難從佛以來一向聞之熟矣但以非己智分故一向徒益多聞不肯依之造修所以未全道力今因魔力所攝乃知多聞無功且自知愛習深厚此非大法不足以斷之必仗三觀之力庶可消其欲漏今將發憤造修但不知最初下手工夫從何而入故問最初方便向後佛示妙行借二十五聖發揮意顯門門皆可還源處處盡成解脫但初心入處只觀解結當心便是下手之處不必別指何者為最初方便即觀音耳根正應此方之機耳二世尊曲示分四初正破五蘊八識以明人空二例破二種世界以明法空三顯本覺離緣以示真如出纏四拂迹入玄以顯真如絶待初明人空分四先徵心破色受二蘊明前五識無體分六初審發心佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交膿血離亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落二斥妄本佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相三詰妄元阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死四審妄處佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在議曰阿難見佛首以三觀為請佛即不答且先詰問發心出家捨愛之由此似神醫治病先審病根所在而後方施藥石也阿難答以由見如來三十二相勝妙殊絶心生渴仰愛樂從佛剃落即此一語便見病根何耶以見色相而生愛慕者正是妄想之心也故曰若以色見我以音聲求我是人行邪道不能見如來此阿難見佛但愛色相而未見法身用妄想心以愛捨愛豈真出家耶此其愛習種子潛發現行既愛如來安得不愛摩登耶此乃因地發心不真果招紆曲所以今日遭此淫室之難耳且此妄想之心不獨阿難即一切衆生無始以來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉阿難以此生死之心從佛安得而不墮耶汝今欲研無上菩提以求真發明性殆非妄想可入應當直心酬我所問維摩經云直心是道場起信論云信成就發心略有三種一者直心正念真如法故二者深心樂集一切善行故三者大悲心欲拔一切衆生苦故今如來先教阿難直心酬問以心直則不欺不欺則可詣真矣因而再審阿難當初發心緣見如來三十二相將何所見誰為愛樂此似神醫按定病根可施必瘳之藥耳阿難直心以答乃曰由目觀見心生愛樂此正出病原故如來告曰若果愛樂因於心目此正生死之本也故曰使汝流轉心目為咎如國被賊侵發兵討除必須知賊所在今汝六為賊媒自劫家寶者皆依心目為主使也所謂擒賊擒王今知心目為法身之害必須知其所依之處乃可掃除蕩滅以絶害源故曰唯心與目今何所在在即處也故經即言無有是處問破妄明文世尊但標指心目而科云所破五蘊八識者何也答成佛之要乃一心三觀所破之妄唯五蘊八識一大藏中諸大乘教顯此而已以衆生所迷但執妄心居在身內然身即有執受身乃五識所依之根實六賊所依之處為色受二蘊心即妄想為六識想蘊見乃八識之見分即七識行蘊此指八識見精為根為識蘊故心目二妄該盡五蘊八識經文昭然但義旨幽潛一向解者發明未透學者粗浮未易入耳起信論宗百部大乘乃立真如生滅二門且從生滅門入真如門論云推求五陰色之與心六塵境界畢竟無念以心無形相十方求之終不可得此大教之綱宗也苟不知所宗但見文字纏繞義無歸宿矣以此印定經文理自昭著阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵祇在我面如是識心實居身內佛告阿難汝今現坐如來講堂觀祗陀林今何所在世尊此大重閣清淨講堂在給孤園今祗陀林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見五正示定體爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨六正破妄處無體佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有衆生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無有是處阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祗陀林我已宿齊汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此知了心潛在根內如琉璃合是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若不對者云何成見若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛是故應知汝言見暗名見內者無有是處阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處佛告阿難汝今說言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面阿難言見是其眼心知非眼為見非義佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然是故應知隨所合處心則隨有無有是處阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身若在身者在邊非中在中同內若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中兼二不成非知不知即無體性中何為相是故應知當在中間無有是處阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛兔角云何不著有不著者不可名無無相則無非無則相相有則在云何無著是故應知一切無著名覺知心無有是處議曰佛問阿難心目所在阿難先答心在身內此乃一切衆生尋常所執無一不在身內者以妄心妄執色身為所依之處此正賊之所在也然阿難端請三觀而如來先徵心目者來意深長從來解者漫云七處徵心殊不知佛意所主但見佛許大定竟不識三觀所歸此從來經旨所以通途難明也請試言之原夫一真法界不生不滅常住真心諸佛衆生同稟此心本源無二者也良以衆生無始無明一念不覺而有生滅即此生滅與不生滅和合變此真心成阿賴耶識而為衆生生死之根本此識具有三分一者業相乃根本無明即識之自證分二者轉相乃轉根本智而為妄見即識之見分此見乃前七識之根三者現相即識之相分乃因無明不覺覆蔽真心遂將靈明無相寂滅之真空變為頑然無知之虗空故下經云迷妄有虗空此頑空體中無明凝結遂變而為四大之妄色以為空中之世界故云依空立世界由妄見而對四大之妄色相待既久遂摶取四大之外色少分執為己有而妄見吸攬居中色心和合執受無知之色以為我遂成五蘊之衆生故云想澄成國土知覺乃衆生此正衆生由之而起也自此衆生但執五蘊身心為我豈更知廣大真心哉所謂一迷為心汝定惑為色身之內也今此阿難執心在內正以色身之內妄想之心為真心所以只見形貌可愛而不達色心本空也依此五蘊妄分六根六根對境復取四大所造五塵為我所受用而起六識妄生分別起惑造業職此之由生死輪回實從妄認五蘊身心為我妄執為常今將返妄歸真必先破其五蘊之我執也以其此執歷劫根深非大定不足以破之故如來將宣大定先審心目所在據阿難所執心在身內即賊所據之處便可進而擊破之以由阿難向執為我今一旦打破恐其驚怖故摩頂安慰而告之曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路是知從此徵心辨見以去直至二種妄見通破衆生我法二執以顯本覺真心皆借大定之力也以先破五蘊假我衆生妄執為常者今七處徵心之文名雖徵心其實潛破色受二蘊耳以妄想一向執受四大為我以為心在身內是執色身為心所依之處也由執心在身內則內求之而不得執心在外則外索之而不得因而展轉七處推求竟不可得足知妄身不有而執受以為我者皆虗妄矣由是觀之七處徵心之文實破色蘊而受蘊亦隨破之矣從此漸進而破想行識三蘊明文具在後文此實通途大旨智者請深觀之不然何以世尊徵心之初先許大定而後竟無結指之文豈如來說法為漫談耶二斥妄心破想蘊以明六識無體分四初當機重請定門爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣惟願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大衆傾渴翹佇欽聞示誨二世尊光示定體爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽議曰即此一光全示定體也由前世尊徵問阿難心目所在阿難妄指心在身內此一切衆生之通病也已蒙如來追徵阿難執定此身是實故謂心在身內由是展轉七處推窮了不可得此則明知所執色身本不有矣阿難未悟故此責躬重請開示奢摩他路殊不知如來先許大定然後徵心意要阿難直下頓悟四大本空五蘊非有即是大定全體現前矣若阿難果是伶俐漢一狀領過則可截斷葛藤喝散大衆而楞嚴一會從此散揚矣由其懵懂不知故勞我世尊多方開示然而阿難所以不悟者皆由執此生死妄想誤為真實故也故此已下示二根本名破想蘊將破妄想而如來先從面門放種種光者古德所謂有一無位真人在汝等面門放光動地奈何諸人自昧所以日用但認妄想六根隔越六塵障礙今佛放此一光照破根塵識界一一本真故云普佛世界光明頓現翻破無明故云六種震動根塵門頭了無障礙故云合成一界如此照用現前則不勞動步即澄道場故光中菩薩皆住本國合掌聽法且此一光佛即密示大定全體矣向下破妄顯真而所顯者此一段光明境界而已若人了此光相又何別求佛法哉阿難不悟故須次第一一開示由破妄之初阿難重請奢摩他路如來先以光相密酬也三總示顛倒根本佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣議曰如來將演大定必先示以生死之本故曰一切衆生無始以來種種顛倒由惑業也惑乃發業潤生二種無明因此無明造種種業故名業種既有此業而苦果隨之故惑業苦三必同條如惡叉聚惡叉毒樹名生子必三同一蒂故以喻之此惑正是大定之所破者故先示之由此惑故諸修行人不能得成無上菩提乃至別成二乘外道諸天魔王正為惑之所使由不知真妄二種根本故錯亂修習耳二根本者一者衆生所迷生死根本即汝今者用攀緣妄想心為自性者是也二者諸佛所證菩提涅槃元清淨體即汝今者識精元明能生諸緣以認諸緣而遺失者是也由諸衆生失此本明故枉受生死識精乃八識之體元明乃本覺妙明真心由諸衆生迷此本妙明心變為識精而起妄想意將先破妄想次破識精而本覺真心乃顯皆仗大定之功故破妄之初揭而示之以下破妄顯真正示奢摩他乃歸真之路其所破者二顛倒耳四正示顛倒分三初詰顛倒之心分五初驗詰妄心阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳耀阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心二斥妄想非真佛言咄阿難此非汝心阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉議曰此正破妄心以明第一顛倒也如來將破妄心先審欲知奢摩他路者意顯從此已去即顯大定之體也奢摩他乃空觀之名而如來藏清淨真心本無一法此即空觀之體也且此觀體更無別法但以妄心妄見分別緣塵故隱而不現今若心見既破緣塵本空真心乃顯若了緣生無性即是真心故向下阿難執妄心妄見分別緣塵以問如來但據空藏定體以答故此以去皆示奢摩他路故先揭示以破妄心如來初審阿難出家之因而答以由目見如來心生愛樂遂從出家如來明告之曰使汝流轉心目為咎是的示阿難妄心妄見也及先徵心而七處求之皆不可得名雖徵心要知妄身非所依處足顯身本空矣阿難未悟重請定門如來妙辨先破妄心次破妄見故今舉拳以問阿難汝目可見以何為心要顯妄心本空故重詰之阿難仍指能推窮者我將為心是執妄想生死之心為真實也如來因而大斥之曰咄此非汝心如來說法四十九年今唯向阿難施此一喝如金剛王寶劍實能勦絶命根可惜阿難不悟又費婆心以阿難從來但認此為真心故今被喝乃矍然向佛若此非我心當名何等如來明告之曰此心正是分別前塵虗妄浮想乃六識攀緣之心耳所謂妄有緣氣於中積聚假名為心迷惑汝之真性者豈可以為真心乎由汝無始以來認此為心如認賊為子故失本元常住真心所以輪轉生死耳三詰六識無體阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大衆無不疑惑惟垂大悲開示未悟爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別四帶顯七識非真縱滅一切見聞覺知內守幽間猶為法塵分別影事我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍即時阿難與諸大衆默然自失五總責顛倒佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果議曰阿難一向誤執妄想六識攀緣之心為真心今被佛呵遂驚怖自失乃以無心同諸土木為問世尊真慈欲令阿難大衆心入無生恐其失措乃摩頂撫慰略示其真而告之曰汝何自疑無心同土木耶如來常說諸法所生唯心所現一切世間依正因果因心成體此真心也汝何不悟且世界所有至微之物皆有體性縱令虗空亦有名貌何況清淨妙淨明心為一切心之性而自無體耶真心有體而汝不悟但執分別妄想以為真心豈不謬耶若汝執吝此分別心為真心者若果是真心即當離諸六塵別有全體乃是真心今離塵無體非妄而何且如汝今承聽我法此則因聲而有分別若我無聲則汝心亦無此正緣塵分別之心乃第六識分別妄想之心塵亡而心亦滅矣此句正破想蘊無體以顯六識虗妄下句帶顯七識非真意謂不但六識分別妄想非真縱汝滅却一切見聞覺知六用不行內守幽閒猶為法塵分別影事此正七識執自內我為意識之根正是生死根本又豈可以認為真乎佛意將破行蘊滅第七識故預以此句為張本然我非斥汝所執者定非心也但是妄想非真心耳故令微細揣摩離塵有體即可許是汝真心若離塵無體塵滅而心亦隨滅同於龜毛兔角矣如此則法身同於斷滅其誰修證無生耶阿難被破妄想不真則失其固有而了無歸宿故默然自失世尊總斥其非曰諸修行人雖成九次第定不得成阿羅漢者皆由執此妄想誤為真實是故汝雖多聞不成聖果者職此之由也阿羅漢但滅六識得出三界以此印定足知是破想蘊前破妄心後破妄見二詰顛倒之見分三初當機重請阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性惟願如來哀愍窮露發妙明心開我道眼二光示一真即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密性淨明心得清淨眼議曰下破妄見也阿難蒙佛一往開示已信緣塵分別之心離塵無體足知一向所執之心非真心矣以此而推則前見佛之見亦非真也故請發妙明心開我道眼然以道眼印證足知此下破妄見也然此妄見乃意識執外根身為我名分別我法二執為分別見意根執內八識見分為我為俱生我法二執名俱生見以根識相依總屬妄想故云二障所纏如來破妄之初先從胸卍字涌百寶光者表此妄想原是如來藏心大智慧光今迷之而為妄想故轉此智光而為妄見今將破妄故先放此光照徹十方一時周遍以為前相且此一段光明聖凡共有故灌十方佛頂旋至阿難及諸大衆要悟真心真見了此一段光明便是以迷此智光轉成妄心妄見今欲轉心見成此光明本自具足唯在轉變之間耳若悟此真光頓獲妙淨明心得清淨眼心是皆真此實如來建大法幢也下文會見歸心者以阿難一向執知是心見是眼不知眼非是見故佛會見歸心以破小乘執見是眼為下辨見之本三會見歸心阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩知寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼羣盲二黑較量曾無有異阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼議曰將破妄見如來舉拳驗見者以小乘不知八識三分祇知六識一向但執根識相生故以眼能見而不知此見在心也此所謂愚者難分識與根耳如來將欲會見歸心故舉金拳以驗問曰汝將誰見阿難答言我將眼見此正執見在眼也如來就拳以例眼根我若無手則不成拳汝若無眼豈無見耶故引盲人是無眼也所見黑暗豈非見耶其盲人與暗室中人所見黑暗無二則知見不在眼明矣若盲人忽得眼光名眼見者則暗室中人忽得燈光應名燈見矣豈有是理哉以燈但能顯色而已其見在人是知眼根但能顯色而已而此見性是心非眼此乃會見歸心下正明顛倒破生死心驗明六識妄執五蘊身心為我計常無常起顛倒見謂凡夫妄執五蘊身心為常以無常計常二乘不了身心本是真常妄計為無常故云顛倒正屬阿含教義敢如此解者後結顛倒文云則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒故知前文乃約身見所起妄想分別心也三示顛倒之人分二初請阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨議曰阿難所執妄心有依色受二蘊業已被破今會見歸心則茫無歸宿故不知所請是以口己默然心未開悟但佇佛悲誨次答分六初示凡夫顛倒爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果時憍陳那起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是議曰此破凡夫顛倒見以示迷也破見之初陡以客塵問之者由凡夫妄執五蘊身心為常故起常見如來借客塵以破之蓋客投旅亭食宿便行若真主人自無攸往此譬衆生旅泊三界生死無常也安可計為常乎清暘升天塵動而空體寂然此譬生滅無常也如此無常安可妄計為常乎此正凡夫顛倒也二示二乘顛倒分二初示迷即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盼又放一光在阿難左阿難又則回首左盼佛告阿難汝頭今日因何搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盼佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是議曰此破二乘顛倒見以示迷也如來屈指飛光驗見不動以二乘妄計五蘊身心為無常故生厭離以不了衆生如故故如來將破妄見先屈指飛光以驗阿難既知頭動而見不動則知身境本不動矣又何計為無常耶此已密示真常矣客塵飛光皆印如是者謂阿難所對不謬也次詰責於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉議曰此總責二妄以驅凡聖之計也意謂衆生既知搖動名塵則生滅不常明矣奚可計此生滅為常乎二乘若知頭動而見性不動則本自真常明矣奚可計為無常乎既知常無常義云何汝等以動為身以動為境此二句經言含兩意真妄齊驅意謂即此無常之身境凡夫豈可認以為常耶此責凡夫也即此幻妄身境本是真常幻化空身即法身二乘豈可認為無常耶意責二乘也由此妄計所以從始洎終念念生滅遺失真性顛倒行事本有心性而失之爾乃認物為己所以輪回顛倒之中自取流轉斯乃總責顛倒也
