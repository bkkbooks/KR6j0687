body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌迦釋伽譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二開不空如來藏以示假觀之體分三初當機疑請爾時富樓那彌多羅尼子在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為眾生敷演如來第一義諦世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖前開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所說法音尚紆疑悔議曰將顯不空藏性滿慈示疑以請深窮生起之由故有忽生之問此先敘疑也阿難以多聞無功故發啟斯教從前開示業已了悟法身自信成佛無疑矣而滿慈素推說法第一既合聞開示尚未至無疑之地足見此法非口耳所能入也二正述疑情分二初疑真不容妄世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始二疑四大相陵又如來說地水火風本性圓融周徧法界湛然常住世尊若地性徧云何容水水性周徧火則不生復云何明水火二性俱徧虗空不相陵滅世尊地性障礙空性虗通云何二俱周徧法界而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大眾作是語已五體投地欽渴如來無上慈誨議曰此呈疑致問也滿慈因前佛說根塵識界既皆如來藏性清淨本然云何忽生山河大地諸有為相耶是不知世界眾生生起之由也又聞七大徧周而地水火風齊徧法界且水火相陵地空相奪云何一一周徧耶是不悟性真圓融之理也此問徹底窮源非如來一切種智何以能究本始之因哉三世尊啟分五初許說誡聽爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性今汝會中定性聲聞及諸一切未得二空迴向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處汝今諦聽當為汝說富樓那等欽佛法音默然承聽議曰此許說也勝義中真勝義性成識論勝義有四一世間勝義謂蘊處界等二道理勝義謂四諦法三證得勝義謂二空真如四勝義勝義謂一真法界此後正窮法界緣起故說勝義中真勝義性也阿練若此云寂滅處華嚴說菩提場為阿蘭若處是所謂一乘寂滅場也以法界性為本修因故是正修行處下顯不空空不空二種如來藏性帶顯圓融法界故佛許說意有所歸也二示妄依真起分五初立一心為迷悟之本佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣說斯義二雙詰二門為生起之因佛言汝稱覺明為復性明稱名為覺詰心真如門為覺不明稱為明覺詰心生滅門議曰此兩詰妄源以示生起之由也滿慈問如來藏既清淨本然則了無諸相矣云何於清淨界中忽生此物耶忽生謂無故而起也此推車拄壁之問最難措口若在宗門只消一棒一喝便徹疑情今教海窮源不得不遡推其始故世尊婆心乃啟之將明妄依真起故先立一真法界之源以為迷悟之本特拈常談性覺妙明本覺明妙二語雙啟二門以詰滿慈謂汝稱曰覺曰明為是覺性本明不假明而明之稱為覺耶此詰真如門為是覺性不明要將明以明之稱為明覺耶此詰生滅門此世尊立定雙關要引滿慈所明一語以為造妄之端耳佛性有三謂正因緣因了因天然妙性本自圓成不借功勛故名正因要假知識師緣開發所謂佛種從緣起故名緣因修而後悟故名了因此中性覺妙明正因佛性也本覺明妙了因佛性也以借始覺之功而顯本有蓋屬修而後成者也此二佛性總會一心故雙舉以立宗本三認妄失真富樓那言若此不明名為覺者則無所明議曰佛意要引滿慈所明一語以啟迷妄之端而滿慈果認生滅之覺謂若不假明以明此覺者則但有其明而無所明之覺矣意要必有所明方為明覺也四生滅門中依無明不覺生三細佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性先縱奪遣妨性覺必明覺義妄為明覺不覺義覺非所明業相因明立所現相所既妄立生汝妄能轉相議曰此示生妄之始也若無所明則無明覺此縱辭也意牒無所明一語謂若果無所明則無明覺之妄矣豈不幸哉下奪之曰爭奈有所則非真覺無所乃非妄明若絕無本明又非覺湛明性之真體矣性覺必明者謂性覺必定妙明不須更以明明之此是本然佛性當論覺義也妄為明覺者謂纔動所明之一念則將本然覺性妙明失之矣當論不覺義也覺非所明若有所明則屬無明此當論三細之業相也以因此妄明之無明迷覆絕待之真心遂形對待之所相此一所字則虗空世界眾生之相已兆於此故曰因明立所當現相也然所相既已妄立則對待是形故將本然寂照妙明之智光轉為能見之妄見故曰所既妄立生汝妄能當轉相也三細之相明見於此五境界為緣長六麤分三初總顯六麤無同異中熾然成異明全真起妄異彼所異因異立同同異發明因此復立無同無異上總出妄相下正明六麤如是擾亂相待生勞智相勞久發塵相續相自相渾濁執取計名字相由是引起塵勞煩惱起業繫苦相下總結妄相起為世界靜成虗空虗空為同世界為異彼無同異真有為法議曰此原倒妄之由以顯六麤相也無同異中熾然成異者謂一真法界常住真心本無同異之相以一念妄動則真如隨緣而有生滅遂為不覺成阿賴耶識由此即有微細三相而六麤已兆則世界眾生種種差別之相炳然現於藏識之中是則本無同異而今有之法爾齊現故曰熾然異彼所異下四句從一所字以揀迷中之同異將顯六麤之相也所異即熾然成異謂無明為能異世界等為所異今就異中揀有一法不同所異之世界乃虗空也所謂迷妄有虗空因世界種種差別之異而立虗空為同以恆一故以虗空靜而世界動動靜發明則又立一法為無同無異乃眾生也以眾生有色相不同虗空有知覺不同世界此則迷中從三細現相而有虗空世界眾生之異相所謂依空立世界知覺乃眾生此一念圓具故下文佛自釋之也如是擾亂下明六麤相也謂一真法界妙圓心中湛然常寂今既迷妄而有世界眾生於虗空中動靜相待擾亂生勞勞則妄生分別當麤中智相也勞久則發塵勞久當相續相也自相渾濁所謂自心取自心當執取計名字相也由是引起塵勞煩惱業起而苦必隨之當業繫苦相也蓋因動念一所字故於本然清淨界中妄有山河大地有為遷流之相由是而生起也起為世界下釋上迷中同異之所以謂上所言同異者以起而動者為世界一而靜者為虗空則彼無同異恐濫於真乃指之曰真有為法是眾生也此上總明由一迷妄遂有三細六麤以成世界眾生業果之相下示輪迴不斷之義故別說三種相續之所因四大互生之所以也二別示相續分三初世界相續覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界火騰水降交發立堅溼為巨海乾為洲潬以是義故彼大海中火光常起彼洲潬中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續議曰此明世界相續之因也初言因明立所以所字當現相指世界眾生等今言世界乃唯識所變之相分始因迷妄有虗空依空立世界故推覺明之無明以對頑然之虗空而為世界生起之本以空晦暗中結暗為色此正結色之始也以世界乃四大種正儒家所推先天之五行謂由無明而成四大之世界則天地以之而位由四大而為五行以生成故萬物以之而育然世界即吾人所居之天地非別有一世界也說者但於經中約文字以作解從來未有發明於目前者故因經文乃設問以明之不但決二氏之疑而吾徒亦知唯識之旨矣幸無厭其煩問云何而有風輪執持世界耶答經云覺明空昧等謂由迷一真法界妙明真心而為覺明之無明遂變靈明寂滅之真空而為無知暗昧之頑空能所相待明暗相傾既久而成妄想此想鼓動心體積虗成氣充滿空中遂有風相如虗室生風又如鼓扇生風也積想不休而風力愈大故曰一切世界風力所持又一切世間境界皆依無明妄心而得住持故有風輪執持世界此風大種也老氏指覺明之無明為道體故曰杳杳冥冥其中有精又以空體為虛無大道指此風相為沖氣故專氣致柔又曰天地之間其猶槖籥乎此老氏之道源也儒氏以識神為天命之性指空大為太極指此風大為混元一氣由一氣以生成萬物是皆不知唯識所變也故太極圖黑白相參然白即覺性黑即無明正不生滅與生滅和合成阿賴耶識為生萬法之始以此識有三分而虛空世界乃相分耳問云何世界而以金寶為體耶答經云因空生搖等謂由頑空體中而生搖動妄想之風返吹藏識體中無知之明覺一動一靜生滅不停相摩相盪摩盪既久而明體愈堅遂結為色即成相分無知之外色故曰結暗為色彼金寶者乃明覺所成之堅故寶有光明以得堅覺之性也由是故有金輪保持國土此性色為地大種指體而言故曰金寶以須彌已下地底為金剛際此儒家所言一陰一陽之謂道以為生天地之本也此中空靜也暗幽也故為陰搖動也覺明也故為陽故曰動靜有常剛柔斷矣此由動靜以成金輪為地大種即天地初成之始也以動為乾體靜為坤體故形而上者為天形而下者為地所謂乾坤成列而易位乎其中矣斯則陰陽未形而動靜剛柔已具所謂先天之易也問云何而有火光為變化性耶答經云堅覺寶成等謂由前堅覺之寶既成搖明之風既出二者相對一剛一柔相摩相盪故有火光為變化性此火大種也此易所言剛柔相摩而成變化以形而上者在天成象為日乃太陽之火精也形而下者在地成形為火乃變化性謂變生為熟化有為無且後天五行巽為風為木故鑽木取火以得先天之性也此四象中日也問云何而有水輪含十方界耶答經云寶明生潤等此句文倒應云火光上蒸寶明生潤謂由火光上𦦨而蒸堅覺之寶寶被火蒸故生潤而水出故有水輪含十方界也此句經義極難理會且寶為地體何以火蒸而為空中雨露之水耶以金寶為地體須彌山亦名金剛山大論云須彌山四寶所成山頂帝釋所居三十二天是則上界宜乎金剛為地體也況須彌山形如細腰鼓是則上界地而覆於下者亦相若日月行於山腰照臨一四天下足知仰視蒼蒼而碧色者皆上界寶地之體也而為下方眾生業火所蒸而生潤即空中雨露霜雪之類皆寶所生之水也是則眾生常居寶界之中而寶中有水豈非水輪含十方界耶此即易所謂形而上者在天成象為月太陰之精為星辰形而下者為江河湖海流注之狀此四象具矣此前因覺明空昧相待而有風金二大因風金相摩而有火大因火蒸寶潤而有水大是則因四大而成天地陰陽日月星辰之四象此正易經所說太極生兩儀兩儀生四象以為八卦之體故曰天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣在天成象在地成形變化見矣此上且說天地生成之相後方說萬物本末之由以此而推世界從覺明唯識所變皎然不爽予昔遇一梵宿謂予楞嚴經談五行之妙極精故刻意而推之吾徒不可不知也問云何而有江河湖海洲潬乾溼流注之狀耶答經云火騰水降等前言乾坤已成陰陽既分而天地位矣由四大種而為後天之五行以生成萬物此火金生水水火生土也謂由火光上蒸寶明生潤故火光上炎水勢下降交合於半空之中水火既濟陰陽和而生子故水火俱堅實而成形其本源溼性流為四大海水其本源火性遂結成土大者為洲小者為潬故有四大部洲諸小洲等以是義故水含父之性故海中火光常起土得母之性故洲潬中江河常注也以水火乃稱性之水火故在天成象有日月星辰在地成形有江河湖海四大部洲之狀故云變化見矣此交發立堅以水火相敵乃水火既濟謂相生也下水勢劣火故有山石草木乃相剋以成物也問云何而有山川高下不平耶答經云水勢劣火等以前水火既濟而勢相敵故為洲為海今水火未濟水勢劣火勢不相敵而火上炎遂結為高山巨石以其受父之性故山石擊則成𦦨得母之性故融則成水即今石中有火山頂有水石根多潤類可見矣此猶屬先天性火但性不相敵故成有形之山石耳問云何而有草木之類耶答經云土勢劣水等此五行水土生木也以其受父之氣分故林藪遇燒成土也以其受母之氣分故草木遇絞成水也由覺明空昧二妄而為四大之種遂成天地日月四大部洲江河湖海山川草木而一氣流行陰陽錯綜五行相生八卦流變至六十四故易卦始於乾坤而終於既濟未濟也故曰交妄發生遞相為種以是因緣世界相續也昔大慧禪師云楞嚴世界相續說五行極詳舉此示眾但未細分別耳二明眾生相續復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵溼化隨其所應卵唯想生胎因情有溼以合感化以離應情想合離更相變易所有受業逐其飛沈以是因緣眾生相續議曰此明眾生相續之因也明妄非他乃至合離成化等者蓋言四生受形之因而身為苦本也清淨界中本無眾生但因無始一念妄動而有無明遂為眾生之本故曰明妄非他覺明為咎覺明指無明也因此無明遂形四大之所相吸攬四大以為身故使真明之理不能踰越於色身復取外色所造之六塵而為受用之境以是因緣故聽不出聲見不超色因色香味觸六種妄塵既就則根塵和合而發六識圓湛之體由是分為見聞覺知根境識三和合造業為因而四生之苦果隨具故同業相纏而有胎卵之形合離成應而有溼化之類此四生眾生始因一念無明而有也見明色發以至遏蒲曇等者此言投胎之狀也六道升沈不一此就人道而言謂眾生既造妄業死後得中陰身所謂遊魂也鬼無色身而有五通眼見最遠以愛染習氣必尋所愛之境極其見而求之雖數千里外而可愛之境遂現故曰見明色發既見其境而識神必趨其所以明見可愛而想形之故曰明見想成當其男女交遘之際而識神守之若本是男則愛母而憎父若本是女則愛父而憎母故曰異見成憎同想成愛乘其交遘而渴隨隨之吸愛涎而流入母胎而為受形之種子故曰流愛為種想攬父母一點精血納想於中遂執為我故曰納想為胎此入胎受形之始蓋從交遘發生也若其男女之辯又因憎愛吸引同業而有別也由愛業為因愛境為緣而胎中一七日而為羯羅藍此云凝滑遏蒲曇此云皰二七之狀蔽尸此云軟肉三七之狀健南此云堅肉四七之狀鉢羅奢此云形位謂六根方具五七之狀也上言投胎之所以也至若胎卵溼化四生之不一者特隨其所造之業而應之所謂當業流轉也卵唯想生胎因情有溼以合感化以離應想輕舉而情重濁由想而愛隨之故卵為首附合溼氣而生曰溼生轉脫易形曰化生由情想合離故更相變易隨因感果所有受業逐其飛沈耳以是因緣眾生相續也三明業果相續富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本貪愛同滋貪不能止則諸世間卵化溼胎隨力強弱遞相吞食是等則以殺貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜婬三為根本以是因緣業果相續議曰此明業果相續之因也想愛同結愛不能離父母子孫相生不斷此言眾生所以不能出生死而受輪迴之苦果者欲貪為本也貪愛同滋貪不能止謂貪眾生身分血肉取以為食滋養己身故曰同滋以強陵弱取而食之故曰殺貪為本也以人食羊等為盜貪者以本不與而取之強殺其命而食其肉故為盜也汝負我命殺貪也我還汝債盜貪也汝愛我心我憐汝色欲貪也故此歷劫牽纏三業為本以是因緣業果相續也三結顯妄相富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始議曰此結三種妄元也謂三種顛倒之相本來不有但因無始一念妄動而有無明故曰覺明由此無明而生妄見故曰明了知性因無明而發所相是從無明而生山河大地諸有為相也是知初言因明立所只一所字而三種之相已具其中矣以妄見不泯則輪迴不息故終而復始也上約迷以示妄依真起竟三示本無生滅分二初執妄疑真富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生議曰滿慈已蒙開示從悟至迷因依妙覺明心迷妄而生山河大地遂疑如來已證妙空明覺而山河大地何當復生耶要顯覺不生迷本無生滅之義故興此問二示本無生滅佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟而出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地又如金鑛雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是議曰滿慈此問要顯迷悟同源本無生滅故如來連以四喻答之迷方一喻使知昔本不迷今亦無悟空華一喻使知真元無妄悟不生迷金喻覺性不變灰喻果德無生上答云何忽生下答四大相陵四顯理事無礙富樓那又汝問言地水火風本性圓融周徧法界疑水火性不相陵滅又徵虗空及諸大地俱徧法界不合相容富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據議曰此下喻顯事理無礙以示不空藏性也滿慈疑水火性不相陵滅又疑虗空大地本不相容如來舉虗空之喻以顯事理無礙故曰譬如虗空體非羣相而不拒彼諸相發揮以喻妙覺性空體絕諸妄而不妨隨業發現也且空中明暗等相本非虗空而不異虗空是知妙覺明心發現諸相本非妙明而不異妙明此則不空之義顯矣觀相元妄觀性元真唯一妙心元非水火云何復問不相容者蓋真妙覺心具有廣大業用故循業發現而地水火風各各發明則各各現若俱發明則一時俱現然俱現者如水中日影隨人東西各行不可作一異會也知此四大各徧之疑泮然冰釋矣上喻顯理事無礙五顯迷悟同源以結事理無礙富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周徧法界是故於中風動空澄日明雲暗眾生迷悶背覺合塵故發塵勞有世間相我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場徧十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性議曰此結顯事理無礙帶顯事事無礙也謂如來藏性本圓周徧若以色空傾奪則隨色空周徧法界且事徧即理徧也但眾生迷悶不悟背覺合塵故發塵勞有世間相以顯事理無礙也我以妙明不生不滅合如來藏而如來藏唯妙覺明圓照法界故能一多相含小大攝入毛端現剎塵裏轉輪良以滅塵合覺故發真如妙覺明性此帶顯事事無礙也上示不空藏性竟三開空不空如來藏示中道觀體分四初約遮照以顯圓分四初約雙遮以顯圓而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那非尸羅非毗棃耶非羼提非禪那非般剌若非波羅蜜多如是乃至非怛闥阿竭此云如來非阿羅訶此云應供三耶三菩此云正徧知非大涅槃非常非樂非我非淨二約雙照以顯圓以是俱非世出世故即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗棃耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三苦即大涅槃即常即樂即我即淨三約同時以顯妙以是俱即世出世故即如來藏妙明心元離即離非是即非即四結示離言如何世間三有眾生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與眾生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足議曰此約遮照以顯圓也而如來藏清淨本然纖塵不立離一切法十法界相了不可得此約雙遮以顯圓也以是俱非世出世故而如來藏即一切法世出世間一法不捨此約雙照以顯圓也若言非言即猶是遮照未極一心必離即離非是即非即遮照同時心言路絕方顯一心之妙耳此則圓融果海妙絕言思安可以所知妄心而能測度用世語言而入之哉是須圓悟圓修方契一心之妙耳故譬琴瑟雖具妙音若無妙指終不能發妙指喻觀行也然汝與眾生寶覺真心各各圓滿與我無異如我按指則海印發光汝暫舉心則塵勞先起者何也良由愛念小乘不肯勤求得少為足耳上開空不空如來藏為中道觀體竟從初卷至此通開三種藏性為三觀體二示一心以顯頓悟頓得富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪迴今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切眾生何因有妄自蔽妙明受此淪溺佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在汝但不隨分別世間業果眾生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得議曰前已開示三種藏性雖為三觀之體然且猶屬修證不無漸次故滿慈復問何因有妄要明妄元無因以顯頓悟頓得方見天然妙性本自圓成不借功勛非從外得耳滿慈何因有妄一問最為徹底窮源學人日用但將此句時時參究莫謂教中無祖師意也世尊難以措口聊借演若迷頭之事發明以示妄元無因亦見頭非外得以妙覺明心本來無妄既稱為妄云何有因有因則不名妄但自諸妄想相因從迷積迷耳如是迷因乃因迷自有若知迷無因則妄無所依尚無有生云何有滅如寤時人說夢中事耳妄性如此因何為在汝但不隨分別三種相續三緣斷故則三因不生矣三緣即殺盜婬三因乃發業潤生二種無明為三緣之因謂若了三緣本空而根本無明當下不生則妙覺明心本來不迷一旦頓得正若演若狂心若歇頭非外得也又何藉劬勞修證乎故如貧子衣珠元不曾失非從外得也頓悟之旨於茲見矣上直指一心以顯頓得竟三示真妄雙絕以顯妙分二初當機執迷猶疑因緣自然即時阿難在大眾中頂禮佛足起立白佛世尊現說殺盜婬業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞其此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今說菩提不從因緣則王舍城拘舍棃等所說自然成第一義惟垂大悲開發迷悶議曰阿難聞說妙心頓得不假修行猶躡因緣之疑以啟自然之問也向以佛性借因緣而顯今則本有不修自得是說佛性自然則彼外道神我自然成第一義矣此約佛性不假功勛為自然非前妄見分別之自然也二世尊曲借旁通即事以顯真心絕待分六初總顯迷悟俱非佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是二顯真妄雙絕分二初例真絕分二初絕自然阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走次絕因緣若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣二例妄絕分二初絕自然本狂自然本有狂怖未狂之際狂何所潛次絕因緣不狂自然頭本無妄何為狂走三結妙絕言思若悟本頭識知狂走因緣自然俱為戲論四遣妄緣是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅五觀智雙泯滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離六泯同果海離合俱非此句方名無戲論法四結責勸修以發行菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙祇益戲論汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心婬火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦如摩登伽宿為婬女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記如何自欺尚留觀聽議曰此即事例顯真心絕待也阿難向執因緣自然之見特常情耳安可以入絕待真心哉故世尊以演若迷頭之事責之曰即演若迷頭之事若狂性因緣滅時則有自然頭之見但觀未狂已前何有因緣自然哉故曰理窮於是下示本無因緣自然故雙辯其相謂汝以離諸因緣便為自然者且如演若頭本自然則畢竟自然又何因緣故怖頭狂走則非自然矣此絕自然也若自然頭以因緣故狂何以不自然頭假因緣而失耶雖狂而頭本不失乃狂怖妄出耳縱狂而頭無變改何藉因緣耶此絕因緣也上辯頭不因自然因緣而有得失足知真性不屬因緣自然也下辯狂謂不但頭不屬因緣自然即狂亦無因緣自然若狂是自然於未狂之先狂何所潛耶此狂非自然也若狂不自然而頭本無妄何為狂走此狂亦非因緣也足知妄亦不屬因緣自然矣總而言之凡因緣自然之說皆妄計名言習氣但未一悟本頭耳若悟本頭識知狂走則因緣自然俱為戲論矣以此而觀則知天然妙性不屬因緣自然明矣故下合顯果海妙絕言思是故我言三緣斷故即菩提心者此但妄緣斷而覺性生但是生滅邊事若此滅生俱盡至於無功用道此雖觀智而對待未亡若有自然則名自然心生生滅心滅此猶屬生滅邊收又指無生滅者名為自然豈非妄見耶智雖泯而理未忘宗門到此但名法身邊事未是法身向上事猶如世間調和成味而指非和合者稱本然性耳此非絕待真心也必若本然非本然和合非和合和合本然一切俱離離合俱非至此則觀智俱泯心境兩忘聖凡情盡迷悟雙祛不墮法身泯同果海迥出言思此句方名無戲論法也前阿難陳悟謂不歷僧祗獲法身矣至此又以因緣自然為疑正是多聞名言習氣未忘豈可以戲論名言取菩提涅槃哉故如來大慈結責勸修曰菩提涅槃尚在遙遠非汝歷劫勤修無以取證縱汝憶持十二部經祇益戲論耳且汝多聞乃積劫熏習何以不免摩登伽難只須待我神呪令汝解脫耶是故汝雖歷劫憶持不如一日修無漏業且摩登婬女也耶輸婦人也祇一念熏修無漏善故或得出纏或蒙授記而汝丈夫何不勇猛熏修而返留滯於見聞觀聽之迹耶上開三種藏性以為三觀之體末後切勸修持故下請行二詳陳眾行以示三觀之相分二初特請行門阿難及諸大眾聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海世尊我今雖承如是法音知如來藏妙覺明心徧十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨議曰此當機請行也古德判為修道分愚判此為示觀相以阿難初請三觀前但約所顯理以為觀體今阿難發心修行遠取菩提非觀行不能入以觀妄相為行故向下十方如來同聲說偈正示觀相而二十五聖圓通乃示各人隨宜觀相之方便耳阿難蒙佛開示已悟法身真體自信妙覺明心本圓周徧含育十方諸佛剎土矣如來現今結責謂菩提涅槃尚在遙遠非歷劫修行而不能證殊非多聞可得此則譬如天王賜與華屋要因門入故此請行以三觀乃入法界之門今剋約本經旨趣故為示觀相二世尊委示行相分二初示自利妙圓理行分四初通示迷悟之根分四初總示發覺初心爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法眾生發菩提心開無上乘妙修行路宣示阿難及諸大眾汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義二別示二決定義分二初以不生滅心為本修因分三初示能觀之心云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故二示所觀之境分三初示生滅源則汝身中堅相為地潤溼為水煖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁二喻生滅相云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是議曰此下正示生滅之元先立二決定義為發覺初心也將示不生滅心為本修因先示五濁生滅之相意在即生滅以證無生即五蘊以證法身也眾生所以迷倒者良由迷一心而為業識依見相而為色心依色心而成五蘊由是妄分根塵識界唯以五蘊為生死之本也今將返妄歸真若離此五蘊身心更無可修之地故以觀五蘊為入道之門若因地倒還因地起也前徵心辯見以破者破此五蘊身心是妄耳會歸藏性必從五蘊為首也眾生相續則以五蘊為苦本也故今修行必觀五蘊妄相以發軔也即末後開示陰魔蓋由觀五蘊不得其妙故墮魔屬也結會總示五蘊邊際使知歸宿也此佛出世說法之本意專為打破眾生五蘊身心耳獨於此經周備故使觀者必先得其要則若理若觀皆有所歸矣世尊許說之初乃曰於佛如來妙三摩提不生疲倦者以最初許曰有三摩提名大佛頂首楞嚴王今先誡令於此大定勿生疲倦耳以此證之則前顯理為觀體今說行門為觀相無疑矣二決定義謂決定而不可易者一審因地發心二審煩惱根本意謂若生滅入照則當下真常若煩惱知根則迎刃而解矣修行之要莫切於此故令審觀因地發心與果地覺為同為異意使以果地覺為本因心殆非生滅心可契不生滅果也故令照明世間諸生滅法皆可壞相獨虗空不壞者以無作故此則的指無作妙行為根本也且不生滅者即圓湛妙明清淨真心也祇因最初一念妄動而為無明遂形所相而成四大之妄色因起妄見摶取四大而為身因此四纏即將圓明妙心分為見聞覺知而成五蘊之眾生譬如清冷之水投之以灰沙塵土渾濁不分此五蘊穢濁之因從此而有也三別明生滅阿難汝見虗空徧十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁又汝朝夕生滅不停知見每故留於世間業運每常遷於國土相織妄成是第四重名眾生濁汝等見聞元無異性眾塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁議曰上總顯五濁生滅之元下別示五濁生滅之相然五濁依五蘊而立者意謂清淨界中本無眾生何有劫見煩惱眾生命濁等事只因迷本元明結為色心而為五蘊之眾生即渾濁真心故有五種之妄相也見空相織為劫濁者此約色蘊以明劫濁也劫者梵語劫波此云時分長時之稱也且此明依色蘊應云四大相纏今以空見而言者以迷妄最初有虗空而為色體乃妄見先所攬者故因頑空以渾濁真心而成妄見此見吸取空相久結為色而成色心由此葢覆真心故約空以明色蘊也此中相織約義而言但取綿密相纏不分蓋約生滅不停有織成義非若世之經緯為織也空見不分者謂迷妙空而為頑空則空本徧也迷妙明而為妄見則見亦徧也二妄混合而為一故云不分且空本是真如之實體見本是圓明之妙覺今既迷而混為一正似投灰土於清水則兩失之矣故但有空而無真體但有見而無真覺由此二妄生滅相纏乃有色心故為色蘊之始也名劫濁者以清淨界中本無有時今由色心初集之時便為長時之本故依色蘊名為劫濁汝身現摶四大等為見濁者指受蘊為見濁也此見乃五識執受之妄見也指四大六根而為見濁者蓋妄認四大為自身相為妄見也意謂汝之色身本非有也乃現摶取四大以為體遂將圓明妙心壅令留礙分為見聞覺知隔越而不通且彼四大本無知覺今壅識心於內旋無知而令有知遂執受為我以無知投於知見之內知覺融貫於無知之中自相渾濁生滅不停妄見執此為受用根以於清淨心中妄見有此執受之色根故依受蘊名為見濁又汝心中意識誦習等名煩惱濁者此依想蘊而立也想乃六識之妄想煩惱性空此妄想本非有也由汝心中尋常誦習慣熟之往事習氣內鼓忽然起念欲有所知所見之境引起宿習故曰性發知見隨其妄想而所念之塵境即分明形容於妄想心中此所謂妄認六塵緣影為自心相故曰容現六塵然此妄想緣塵而有離塵則無實體離覺則了無自性以此妄想生滅不停擾亂於清淨心中故依想蘊名煩惱濁又汝心中朝夕不停等名眾生濁者此依行蘊而立也謂此眾生本非有也由汝妄想生滅不停知見每欲留於世間故念念造業而善惡業力念念流變於十二類生以去留生滅為眾生本渾濁真心故依行蘊名眾生濁汝等見聞元無異性等名命濁者此依識蘊而立也然此命根本非有也由汝元一妙圓真心本無同異之相良由四大壅分識性而為見聞覺知則眾塵隔越故無狀異生性中本為一體故相知用中六根割據故相背故同無一定之同異無各各之異兩失其準此識連持色心而為命根同異渾濁相織妄成故依此識蘊名為命濁原此五濁於妙圓心中本無所有但由五蘊生滅渾濁真心故為濁耳是皆迷妄之源也故此下約返妄歸真以示觀行三示觀行之因分三初明因真果正阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證二喻斷惑淺深分二初喻漸斷如澄濁水貯於淨器靜深不動沙土自沈清水現前名為初伏客塵煩惱二喻頓斷去泥純水名為永斷根本無明三結真窮惑盡明相精純一切變現不為煩惱皆合涅槃清淨妙德議曰此略示觀行之相也意謂欲令渾濁之覺遠契涅槃清淨之妙德應先擇死生之根本擇猶摘也專依不生滅性以旋生滅旋猶漩也如水之漩澓也謂念念漩妄以歸真也伏還元覺得元明覺為因地心如此方能圓成果地修證故如澄濁水清水現前名為初伏客塵煩惱此漸斷也去泥純水名為永斷根本無明此頓斷也當等覺後心將入妙矣真窮惑盡則合涅槃清淨妙德矣斯由不生滅心觀行之功也二審煩惱根本意擇圓根分六初敕令詳審第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位二正指結根阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始眾生世界生纏縛故於器世間不能超越議曰此審煩惱根本也發業是根本無明潤生是愛取二惑生死實由此二而有通名煩惱然此二種依根而辯者謂此二法元無實體但依六識妄想為用故於六根門頭緣塵取境純是無明用事以資愛取故念念愛取處處貪著生死結於根塵之中故令審知虗妄根塵何處顛倒以根塵相交結處即顛倒處乃生死結根之所在也若欲解結當就結根而解之故審六根優劣意取圓根虗而易解所以用其選擇耳將選圓根先示六根之優劣欲令知所選耳三顯根因妄織阿難云何名為眾生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切眾生織妄相成身中貿遷世界相涉而此界性設雖十方定位可明世間祇目東西南北上下無位中無定方四數必明與世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百四顯力用不齊分六初眼根阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德二耳根如耳周聽十方無遺動若邇遙靜無邊際當空耳根圓滿一千二百功德二鼻根如鼻齅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德四舌根如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德五身根如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德六意根如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德五誡選圓根阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進六使一門深入十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨議曰此示六根優劣也上云由此眾生世界生纏縛故於器世間不能超越故知眾生世界但就正報之身而言所云世界者世約妄念遷流界約一身而有左右前後故為界也以一念纔興居然遷流便有三世方雖有十祇言四方此三世四方只就一身而觀故曰身中貿遷以界與世互相交涉所謂織妄相成也三四四三宛轉十二者謂一念法爾具該三世全徧於一身不出於左右前後之四方則每方各有三世此三四以成十二也其四方全被一念之所融貫則每世皆有四方此四三以成十二也以此相織故曰宛轉初則一念為一疊但有十二耳妄念重變前念已滅後念續生最極微細以初起一念無本即此一念已包三世流於四方故成十二此一疊也第二疊者即於東方三世每世各有一根本共成三十則四方合一百二十故曰百第二疊也第三疊者就百二十上各各有十則成千二百此三疊也此以世涉方其界例此可知最初一念不立本者以從無住本立一切法故然生滅妄念微細流注謂一念中有九十剎那一剎那中有九百生滅其實剎那剎那窮劫不盡今但以三疊而言者謂約生滅一念法爾遷流具該三世雖窮劫亦只言三世耳故就生滅根身以明六根之業用各各本該一千二百之功能但約徧不徧處圓不圓根定其力用優劣耳若眼根見前不能見後約功能不到處則三分闕一只具八百耳則圓聞十方故全具千二鼻則約出入息闕於中交亦只八百舌則宣揚妙理圓滿千二身以離合離則不知亦只八百意則默容十方三世無不周徧故千二百此全約功能以論也六根優劣已示於此眾生顛倒於生死之中而不能超越者但依六根緣塵取境無明發業愛取潤生起惑造業結成生死之根故長劫沉淪今若逆生死流返妄歸真只就此六根門頭返窮流根至不生滅地耳不必捨此別求也以此六根本是妙明真心中所現之物故根根塵塵皆可還源今但就圓根取其易入功用易成故須選擇令於一門深入果能入一無妄則六知根一時清淨矣三略示妄盡還源分二初當機疑請阿難白佛言世尊云何逆流深入一門能令六根一時清淨二世尊的示分十初總明機淺法深佛告阿難汝今已得須陀洹果已滅三界眾生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得何況此中生住異滅分齊頭數二令觀六一虗妄今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何闕身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六三的示真妄兩忘阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生四責迷執一汝須陀洹雖得六銷猶未亡一五喻出形名如太虗空參合羣器由器形異名之異空除器觀空說空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是六別示妄源分二初別顯妄源分六初眼根由明暗等二種相形於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色二耳根由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲三鼻根由通塞等二種相發於妙圓中黏湛發齅齅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香四舌根由恬變等二種相參於妙圓中黏湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味五身根由離合等二種相摩於妙圓中黏湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸六意根由生滅等二種相續於妙圓中黏湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法二總結虗妄阿難如是六根由彼覺明有明明覺失彼精了黏妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞齅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄七指歸觀心汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏八智起惑忘伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫不由前塵所起知見九略顯大用明不循根寄根明發由是六根互相為用阿難汝豈不知今此會中阿那律陀無目而見䟦難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念十顯妄盡還源阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯消冰應念化成無上知覺阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辯知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙議曰此略示妄盡還源也阿難聞入一無妄六根一時清淨之說未悟故興此問以啟本無一六之談因示六妄本源以明所歸之地耳故世尊先審此根為一為六者意顯此本元非一六義也但由無始顛倒於圓湛體中一六義生故譬虗空參合羣器遂名為異除器觀空又說空為一且虗空豈因器以成同異同尚強名云何更說是一非一耶了知此義則六受用根如此而已不可作一六解也問六根本是妙湛圓明之真心何以成此六根之妄想耶答由明暗等下正示初成六根之妄相以示六妄之源也由明暗等者意顯六根本非有也但由迷妙圓之真心妄成阿賴耶識謂之識精以因明立所遂有四大之妄塵由明暗相形以擊湛明之真體因此黏湛而發妄見見精映色久而取著故結色成根而根初成之時乃四大之淨色以籠識精及麤而為浮塵根於外故識精從此流逸而奔於色等塵此眼根之所以成也由動靜二塵以發耳根由通塞二塵以發鼻根由恬變二塵以發舌根用離合二塵以發身根由生滅二塵以發意根皆例如眼根此六根之所以成也意根屬心無形而根元亦名清淨四大者謂初由妄見吸取父母之精血而識栖託於中及五根既就而初結肉團居中名肉團心故此屬四大名浮塵根而有一竅識精從此以奔法塵乃無明殻最初所結清淨四大名勝義根以裹藏識意根處此杳冥之中故如幽室見聖人之心有七竅言其虗而明耳已上通示六根生起之妄源故總結之曰如是六根由彼覺明妄有明明之覺故失彼真精黏妄而發其精光耳皆以緣塵而有離塵則無體矣故曰無滅無生了知安寄初以不知是妄故認無明為主宰愛取為受用故依之而造業也下示觀心故曰汝今若欲返妄歸真但不循六塵隨拔一根脫黏內伏伏歸元真則本有真心光明一旦發耀若從一根耀性發明則五黏隨脫不隨前塵所起知見盡是真光獨露耳由此真明則不循六根之妄但寄根以明疑由是六根開通互相為用此所以令汝速證安樂妙常亦汝六根更非他物也下引不循六根之人豈不信哉阿難下正示還源謂今汝諸根若圓拔已則內瑩發光如是浮塵根身及器世間如湯消冰應念化成無上知覺矣如水成冰冰還成水豈假於外哉且妄知妄見皆借前塵今不由前塵不因明而自然開發本有之真見則諸暗相永不能昏矣所以障蔽妙明者根塵之過也若根塵既消云何覺明之無明不成圓明之妙覺哉是知真妄還源總不出六根之外也上略顯妄盡還源四密示最初方便分二初當機重疑斷滅分二初以真疑妄阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應世尊如果位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果二以妄疑真世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先說湛精圓常違越誠言終成戲論云何如來真實語者惟垂大慈開我蒙悋議曰此將示聞性真常以密揀耳根為最初方便故當機先設斷滅之疑也阿難聞說六根離塵無體遂疑為斷滅故問佛果七種皆是常住若果念心離於前塵本無所有則斷滅矣云何將此畢竟斷滅以為修因欲獲如來七常住果耶故進退循環求而不知遂起如來自語相違之疑二巧示真常分五初責許除疑佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑二擊鐘以驗即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大眾俱言我聞鐘歇無聲佛又問言汝今聞不阿難大眾俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大眾又言俱聞佛問阿難汝云何聞云何不聞阿難大眾俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絕則名無聞如來又敕羅睺擊鐘問阿難言爾今聲不阿難大眾俱言有聲少選聲銷佛又問言爾今聲不阿難大眾答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大眾俱言有聲佛問阿難汝云何聲云何無聲阿難大眾俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絕則名無聲三正顯真常分五初揀定佛語阿難及諸大眾汝今云何自語矯亂大眾阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者二正示是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無三責迷汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性四喻顯如重睡人眠熟牀枕其家有人於彼睡時擣練舂米其人夢中聞舂擣聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏五顯結縱汝形銷命光遷謝此性云何為汝銷滅四總結顛倒以諸眾生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉五指歸觀心分三初滅塵同覺若棄生滅守於真常二智起惑亡常光現前根塵識心應時銷落三塵消覺淨想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺議曰此下世尊巧示真常也阿難因疑此心離塵無體將為斷滅世尊試將俗事以驗令其除疑故令羅睺擊鐘以驗初擊鐘時問曰聞否意在驗聞性也如來又敕羅睺擊鐘乃問聲否是約聲塵以驗也先已報言無聞矣次又擊時再問而報有聲若聞性果無則隨時已滅不應又聞此聲矣故責之曰報答無定以知有知無自是聲塵或有或無耳豈彼聞性為汝有無哉若實無聞誰知無者以此足徵聞恒真常也乃正示之曰聲於聞中自有生滅非汝聞性為有為無乃責之曰汝尚惑聲為聞何怪以常為斷故不應言離彼動靜前塵便說聞無性也故說睡夢之人形寐而聞性不昏以此足知縱汝形消命光遷謝此性云何為汝消滅耶此結顯真常之義也下示顛倒以諸眾生循諸色聲逐念流轉不循所常逐諸生滅故生生雜染流轉下指歸觀心若棄生滅守於真常一旦常光現前則根塵識心應時消落矣想相識情二俱遠離則根塵頓消而汝法眼應時清明云何不成無上知覺耶此已巧示真常意顯耳根可為最初方便次下指結根元將明下手功夫耳上總示迷悟之根竟
