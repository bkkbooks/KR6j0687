body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋伽譯語菩薩戒弟子清河房融筆受明南嶽沙門憨山釋德清述二正示一心三觀之相分二初當機以真疑妄阿難白佛言世尊如來雖説第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示議曰此下將示三觀之相欲顯即妄即真故約生滅以問也阿難聞前第二義門已知生死結根但不知今日身心云何是結從何名解乃疑不知真妄之元此特請解結之方所謂下手之處即是最初方便也此大定法門非小因緣故十方諸佛放光攝授同聲説偈也二佛示迷悟同源分四初本尊安慰爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂二諸佛證成分二初光證道同即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祗陀林灌如來頂是諸大衆得未曾有次言顯一真於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物三當機重請阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物四世尊宣示分二初長行分六初指真源不二佛告阿難根塵同源縛脫無二二示無明體空識性虗妄猶如空華三明根塵妄發阿難由塵發知因根有相四明妄元無體相見無性同於交蘆五示迷悟同源是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨六指歸真際云何是中更容他物爾時世尊欲重宣此義而説偈言議曰諸佛先示迷悟同源然後乃示觀相也以阿難雨淚翹誠哀請之心極切故世尊摩頂安慰而後告也即時十方世界六種震動者表破根本無明則六根翻破故震動也世界本唯一真故云普佛微塵如來各有寶光同時來灌釋迦頂者以表釋迦所説頂法與諸佛道同也諸佛異口同音告阿難者以阿難初請十方如來得成菩提妙奢摩他三摩禪那最初方便故今正示觀相諸佛同告以表十方諸如來一道出生死即所示者乃諸佛最初之方便也使汝輪轉生死結根唯汝六根更無他物令汝速證安樂解脫亦汝六根更非他物以示諸佛修證皆同欲令阿難諦信不疑也此非阿難所知故致疑重請本尊先指真源以示之曰根塵同一真源縛脫本無二致斯則直指一心更無剩法矣疑謂既是一真無奈現有無明識性故曰識性虗妄猶如空華本無所有此言無明體空也疑是本空然則根塵從何而有故曰由塵以發知即所既妄立生汝妄能也因根有相謂無明雖空今既結成根則有妄相此明根塵妄發也即此見相二分原是無明所成無明既是本空則此相見亦了無自性故喻如交蘆蓋蘆體本空而交處亦空此明妄元無體也知見立知等者謂無明根塵一一本空空則一法不有唯一真獨存但汝於所知所見性自天然不必更立知見若強立一知見則是無明之本矣是故即今返妄歸真不必別修但於知見不起妄見即是涅槃無漏真淨矣此示迷悟同源也云何是中更容他物耶此結指真際而修行之要莫切於此矣有未盡之義故重説偈言二偈頌正示觀相分六初依一心立三觀之相真性宗本有為空空觀緣生故如幻假觀無為無起滅不實如空華中觀二即一心為所觀之境言妄顯諸真妄真同二妄真妄雙絶猶非真非真云何見所見根境兩忘中間無實性是故若交蘆無明體空結解同所因迷悟同源聖凡無二路歸源無二汝觀交中性空有二俱非直觀中道迷晦即無明發明便解脫正出同源所以三依圓根為入理之門解結因次第六解一亦亡根選擇圓通入流成正覺四指生相無明為所斷之惑陀那微細識習氣成暴流真非真恐迷我常不開演五頓證一心顯三觀之用自心取自心非幻成幻法真妄互立不取無非幻妄滅真亡非幻尚不生幻法云何立真窮惑盡六諸佛同證結三觀之名是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗達磨十方薄伽梵一路涅槃門議曰此真性下至發明便解脫為應頌正示三觀之相義也真性乃宗本也謂真如妙性為萬法之宗故首標之有為空此示空觀也謂諸有為法依真而立雖有而性常自空即此為空觀以空則唯一真如了無一法寂滅湛然故當奢摩他義也緣生故如幻此示假觀也謂真如體空以不變而隨緣故成諸法以諸法本無但以緣會而生緣會而生則未生無有有而性常自空故如幻耳明照諸法當體如幻故當三摩義也無為無起滅不實如空華此示中觀也謂真如無為本無起滅今既隨緣成事似有起滅以幻體不實了無起處故如空華以空華本無起滅而空體體一向寂然謂真性寂然不礙隨緣雖任隨緣而真源湛寂斯則空有齊彰中道頓顯故當禪那義也然此三觀總依一心以示其相即首楞嚴大定此定乃解結之祕訣破惑之神符也佛佛成道皆以此為密因而阿難最初便問此定以迷妄根深故先破妄以顯三觀之體及問行門乃審生死結根今既知結根故請解結之方至此諸佛方同聲顯示者足見此法甚深非諦信不疑者未可輕易拈出也言妄顯諸真一偈半乃示即一心真源為所觀之境謂依一心建立三觀以此三觀還照一心故為觀境謂寂滅一心真妄雙絶且真之名但由妄顯若言妄言真總皆是妄故曰妄真同二妄且此心猶不説真與非真云何而有能見所見是知能所皆因無明而立若了無明體空則根塵自泯能所雙忘以根塵交處全體本空空則不結不結則根塵頓消而解結之妙無尚此矣結解同所因下為伽陀乃出同源之所以也謂迷一心而為無明妄立能所對待根塵因此而結今解亦因此而解以聖凡同稟一心元無二路今汝但觀根塵相交之中本無實性從何而結耶無明妄立故非空雖有而無自性故非有言空言有皆依無明而湛寂一心空有兩絶故二俱非汝但觀此交中之性迷晦即是無明若發明即成解脫矣何難之有哉解結因次第下一偈意依圓根為入理之門謂既有六結須次第解之故曰因次第若六結解而一亦不存故曰六解一亦亡以此故須選擇圓根即可入流成正覺也陀那下的指根本無明為所斷之惑謂能斷者三觀此識甚深微細薰變難思以習氣內鼓使湛淵心體遂成瀑流以真妄和合故曰真非真恐迷謂恐外道二乘妄執為我起斷常見故尋常不敢開演也今所斷者正此識耳自心取自心下五句示頓證一心以顯三觀之用由迷真心而成業識變起根塵諸法不達自心所現故執取而起惑造業豈非自心取自心耶因一取字故令非幻之真而成虗幻之妄法今若返妄歸真更無別法只不取則根塵頓消真且不立幻法從何而立耶此真窮惑盡只在了此發業無明本空而潤生之愛取則當下消亡此所以不勞肯綮而頓證無生也歸真之要莫切於此是名妙蓮華下三句總結觀名謂此大定是名妙蓮華以本來無染故猶蓮華無堅不摧故名金剛王寶覺即有以觀空故曰如幻三摩提彈指超無學者此顯法利能收速效也阿毗達摩此云無比法顯法勝也十方薄伽梵一路涅槃門顯佛佛同修同證也一往開示妙義盡萃此章故判為正示觀相此外更無顯了若此者幸深觀之上示三觀之相竟三略示解結方之分三初經家敘致於是阿難及諸大衆聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句二當機啓請分二初問六解一亡心猶未達六解一亡二問舒結倫次舒結倫次惟垂大慈再愍斯會及與將來施以法音洗滌沈垢議曰此下略示解結之方也阿難因聞解結次第以未知六解一亡舒結倫次意請明下手之方也三世尊巧示分二初答六解一亡分三初示根結所由分五初借顯妄迷一心而成五陰即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾二借顯妄結五陰而成六根於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結三借顯一六義生佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾祇有六結終不至七亦不停五云何如來祇許初時第二第三不名為結四借顯六根同異佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生我今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名五結合六根同異佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異議曰此巧示六結同異之元也如來取劫波羅天所奉華巾將為結本者以巾有五色意表迷一真而為五蘊將依此而妄分六根也佛告阿難下徵示一六義生也以此華巾先實一條次第綰成六結正表元依一精明分成六和合也此寶華巾下至生畢竟異借顯六根同異也上示巾結所由二示六解一亡分二初借顯六解一亡佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成二法合真妄不生佛言六解一亡亦復如是由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相議曰此示六解一亡以顯本無一六義也佛問阿難汝必嫌此六結願樂一成云何能得者意使阿離自悟六解一亡之義也蓋以一喻無明六喻六根阿離領知結若不生一尚無名云何成六故佛印許亦復如是此乃借事以明故下正示之曰由汝無始知見妄發發妄不息如目勞而見狂華故於元湛精明一真體中無因亂起一切世間山河大地而真淨界中生死涅槃皆即狂勞顛倒華相是所謂妄真同二妄妄滅而真亦不存六解一亡義見於此三示解結之方分五初借顯二邊無力阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難我今以手左右各牽竟不能解汝設方便云何解成二借顯中道收功阿難白佛言世尊當於結心解即分散三借令直觀中道佛告阿難如是如是若欲除結當於結心四正示成佛真因阿難我説佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由五結示由根證入是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待議曰此正示解結之方也阿難問云此勞同結云何解除雖就巾結而問意在即請解根結之方故以此勞同結為請世尊巧示乃以手左右偏掣而問阿難皆云不能解者意顯二邊無力也乃返令阿難汝設方便云何解成阿難答曰當於結心解即分散然如來豈不自知解結當心而返徵阿難者正是欲令自知下手之處故佛印許當於結心意令直觀中道也下示成佛真因欲令當機諦信不疑故佛自陳一切世出世法皆了元因矧此修行豈不知其節要耶今則隨汝心中還擇六根根結若除則塵相自滅諸妄消亡不真何待此的示由根證入也上總答六解一亡二答舒結倫次分四初借顯生因識有阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生二借顯滅從色除今日當須次第而解六結同體結不同時則結解時云何同除三法合解結次第分三初由中道斷見思以證人空佛言六根解除亦復如是此根初解先得人空二由中道斷塵沙以證法空空性圓明成法解脫三由中道斷無明以證無生解脫法已俱空不生四結歸觀心是名菩薩從三摩地得無生忍議曰此答舒結倫次也結由次第而綰者借顯生因識有今亦次第而解者借顯滅從色除也上皆借事以顯下以法合解結次第此根初解先得人空者謂由奢摩中道觀任運先斷見思滅分段生死故曰先得人空此從觀行以滿十信也空性圓明成法解脫者謂由三摩中道觀滅塵沙惑分破無明乃從初住以去歷三賢以至登地也解脫法已俱空不生者此由禪那中道觀入初地中中流入薩婆若海此歷十地以極等覺也故結歸觀心乃曰是名菩薩從三摩地得無生忍解結之方無尚此矣自非如來大慈何以曲盡如此哉上示解結之方竟議曰按經通途阿難最初啓請十方如來得成菩提妙奢摩他三摩禪那最初方便蓋三觀乃佛佛成道之本所謂一道出生死其最初方便乃各各發心悟道之本因正如解結之功夫也從前如來已為阿難巧示解結之方審明下手之處不啻三令五申矣至此重假二十五聖旁通者正示各各最初悟道之方便也如趨王城家家有路透長安但出門一步即在各人腳跟下隨方取便耳故圓覺修心而有二十五輪之觀法此經有二十五聖之妙門即其人人悟處皆可還源但取圓通本根處而易入故選耳根為第一此正除結當心敕二十五聖之意也四廣示最初方便分四初當機特請當根阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授二世尊借證密授分二初世尊借問爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學我今問汝最初發心悟十八界誰為圓通從何方便入三摩地議曰此下廣示最初方便也阿難大衆已悟一六亡義但猶未達圓通本根冀望開示所得密言者已領六解一亡之義謂諸如來所説之法也還同本悟者謂先悟實相但於華屋未得門入猶與未聞等也世尊不自開示乃問在會菩薩聲聞者意借各人所入之初心方便以顯門門皆可證入也冀佛冥授故如來默然假衆以説二諸聖證成分三初諸聖宣示分二初二十四聖別證分四初六塵分六一聲塵憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上議曰此下二十五聖由三科七大此從聲塵而入者也憍陳那此云火器以先世為事火外道因以命族五比丘乃佛最初得度者佛出家時淨梵乃命家族三人一阿顯婆二跋提三摩訶男拘利舅氏二人一憍陳那二十力迦葉敕此五人隨衛後捨佛各修異道及如來成道思度五人遂之鹿苑三轉四諦法輪問言解否陳那答言已解佛印許阿若多此云解此由聞聲得悟者二色塵優婆尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上議曰此由色塵而入者也優波尼沙陀此云近少亦云塵性空由悟色性以得名從不淨觀以至白骨微塵歸於虗空三香塵香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齋見諸比丘燒沈水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上議曰此由香塵而入者也菩薩以童真入道故稱童子觀香非木非空非煙非火則香嚴體空去無所著來無所從則塵境如如由是意消發明無漏四味塵藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知若醋鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上議曰此由味塵而入者也堪紹佛種故稱法王子藥王多劫知味非一時也了知味性本空約身心即根識與味塵對觀非即非離則中道自顯分別味因則無明體空了證無生五觸塵跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上議曰此由觸塵而入者也跋陀婆羅此云賢護忽悟水因既不洗塵境空也亦不洗體根空也根塵既空而中間安然得無所有此脫根塵而入空性六法塵摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊説我頭陀為最妙法開明銷滅諸漏佛問圓通如我所證法因為上議曰此由法塵而入者也摩訶迦葉此以大飲光氏名畢鉢羅頭陀第一供佛舍利等敘往因也觀六塵變壞生滅也唯以空寂無生也以觀生滅得證無生故曰空法二五根分五初眼根阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一議曰此下由五根而入者也阿那律此云無貧是佛堂弟白飯王之子多樂睡眠佛呵之曰咄咄胡為寐螺螄蚌蛤類一睡一千年不聞佛名字因此發憤不睡失明依教修行遂得天眼通不因眼觀見十方者所謂明不循根不明自發則諸暗相永不能昏二鼻根周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一議曰此由鼻根而入者也周利槃特迦此云蛇奴亦云繼道以生於路邊故性最愚鈍以前世為法師祕吝佛法故感愚報五百比丘同教一偈經九十日不能記憶世尊教止散亂觀出入息遂得心開返息循空離出入息也三舌根憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一議曰此由舌根而入者也憍梵鉢提此云牛呞牛事虗哨感報如之非體非物則根塵兩忘故內脫身心外遺世界四身根畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來説諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一議曰此由身根而入者也畢陵伽婆蹉此云餘習昔為婆羅門餘習多慢如罵河神曰小婢之類初入道時聞佛所説世間無常苦空之法故云不可樂事心思法門而路中不覺毒刺傷足此苦事也我念身有知而知此深痛雖有知覺覺此深痛返觀覺心清淨無有痛能痛此覺心者是所謂純覺遺身五意根須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一議曰此由意根而入者也須菩提此云空生又云善現以生時庫藏皆空解空為上因久知空寂故從佛得聞性覺真空遂得開悟同佛知見者蓋言分同佛所觀空理非全同也非所非盡謂非所之非亦盡三六識分六初眼識舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於路中逢迦葉波兄弟相逐宣説因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生佛問圓通如我所證心見發光光極知見斯為第一議曰此由眼識而入者也舍利弗此云鶖子連母名也曠劫以來心見清淨則宿因已深世出世間種種變化謂四諦生滅法也心見發光光極知見謂不由前塵所起知見二耳識普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就佛問圓通我説本因心聞發明分別自在斯為第一議曰此由耳識而入者也行彌法界曰普位鄰極聖曰賢若耳識分別則有限量今以心聞故心遍十方而聞亦遍法界蓋衆生所有知見不出此心之外故能一一分別也但有心契普賢行者即為攝受擁護以由心聞故分別自在三鼻識孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及俱絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸消鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以消息息久發明明圓滅漏斯為第一議曰此由鼻識而入者也孫陀羅難陀此云豔喜兼妻得名也乃佛親弟出家之初因心散動故佛教令觀鼻端白所以注心不涉攀緣故為依鼻識也前數息但依根耳諸出入息化為光明以離識故心光發越照十方界四舌識富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣説苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我説法無上佛問圓通我以法音降伏魔怨消滅諸漏斯為第一議曰此由舌識而入者也富樓那此云滿彌多羅此云慈尼女稱乃其母也從曠劫來辨才無礙則宿因已深宣説苦空四諦生滅之法而能達於實相是謂微妙開示者也以舌識宣揚妙法而得漏盡是所謂善解法義隨説悟入五身識優波離即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一議曰此由身識而入者也優波離此云近執如來為太子時親近執事之臣也謂殺盜淫妄性本是罪不待制止犯而成業故云性業其餘即因過始制制前犯即無罪故云遮業以二業既空故身心寂滅以身戒圓明故身自在心戒圓明故心自在六意識大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣説如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十力得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一議曰此由意識而入者也目犍連此云采菽氏名拘律陀此云無節樹優樓頻螺此云木瓜癃伽耶此云城亦山名那提此云河三迦葉波所住之處也因緣深義謂無生法也以意識生滅今悟無生故心得通達旋湛謂不逐生滅前塵故心光發宣上由十八界而悟入者下由七大而悟入者四七大分七初火大烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王説多淫人成猛火聚教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一議曰此由火大而入者也烏芻瑟摩此云火頭此火大非外火也乃就自心欲火而觀化多淫心成智慧火所謂性火耳因如來藏具有真空性火凡淫機一動助發淫心故生為欲火死為業火然淫欲為生死根本由性火以成今遍觀百骸四肢諸冷暖觸本自性空故淫心滅而智光現前所謂生大寶𦦨二地大持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛現在世時世多飢荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齋我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一議曰此由地大而入者也持地菩薩先平世界地是未達塵性本空故因毗舍浮佛教平心地即得心開以心地平等則一切平等故見自身微塵與外微塵等無差別是悟微塵性空本無內外也性不相觸者如以空合空故也塵性既空則一切皆空故刀兵亦無所觸耳古人將頭臨白刃猶似斬春風者以悟塵性空故塵銷智圓則本如來藏矣三水大月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盼而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前説如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一議曰此由水大而入者也當為比丘當爾時也定成水觀有弟子者即見水滿一室是知唯識所變也昔有僧居山入火觀則遠見遍山火光故知性水性火圓滿周遍但循業發現耳初未忘身以定有出入故亡身之後對待情忘故內身之水與香水海性合真空無二無別方顯性水真空本圓周遍一味流通性無二故四風大琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此羣動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一議曰此由風大而入者也此風大但觀諸衆生身皆是妄緣風力所轉故一切羣動俱屬妄緣本性寂滅故曰諸動無二則知動無去來之相而衆生顛倒但於寂滅性中鼓發狂閙耳動本無動故於東方不動佛國為法王子身無動止心無生滅故身心發光洞徹無礙也五空大虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一議曰此由空大而入者也虗空是色之體因迷真空妄結四大故失空性今以四大寶珠照十方微塵佛剎化成虗空者以觀四大圓明體合真空是所謂得無邊身也自心現大圓鏡故光照十方盡虗空際此心合真空也以大圓鏡智平等顯現故也諸剎來入鏡內涉入我身身同虗空不相妨礙者良以鏡智圓照身心寂滅依正平等所以善入國土廣行佛事也得大隨順者則一一皆入平等法界矣六識大彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地歷劫已來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依地及遍計執得無生忍斯為第一議曰此由識大而入者也彌勒久修唯識法門往昔出家心重世名者以迷智成識堅執我愛故心重世名以耽染六塵遊戲諸根故好遊族姓以根塵識三和合為界界者種族義以久修唯心識定歷事多佛了悟萬法唯識故求世名心歇滅無有至然燈佛方成妙圓識心三昧乃了國土淨穢皆是自心變現無量如來皆從識性流出故得授記次補佛處由觀唯識得圓成實遠離依他及遍計執故得無生法忍也七見大大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一議曰此由見大而入者也唯此見大乃八識之見分也以迷大圓鏡智而為無明成阿賴耶識發起妄見故為見分以妄見根身器界一切衆生執取染汙故成穢土今將返妄歸真故以念佛攝歸淨土則妄見一破諸穢頓除故以念佛為破妄見之要術也以此妄見本是智光故大勢所師之佛為無量光此見由迷智變起故如母之於子也妄見妄流隨情造業故如子逃逝諸佛智願攝化衆生故如母憶子若有返妄歸真之志則如子憶母也子母相憶豈無見面之時若衆生念念回光返照無有不見自心之佛也如染香人者以由熏變之力也故大勢依此見大攝念佛人皆歸淨土都攝六根等者以妄見根塵念念執取念念成染造種種業故臨終見地獄惡相墮落生死今念佛人於六根門頭一切見聞覺知純一淨心唯佛現前念念成淨故臨終見佛故云都攝六根淨念相繼此正不思議熏變之力淨土唯心見於此矣然見乃生死之本若參禪則曰不用求真唯須息見若念佛則轉染見而成淨見唯一見分有用與不用此禪淨之分也
